<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chowtime Production System</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{
  --maroon:#5c0f1e;
  --maroon-dark:#3d0a14;
  --gold:#c99a2e;
  --gold-light:#e8c874;
  --cream:#faf6ee;
  --paper:#ffffff;
  --ink:#2a1c1c;
  --line:#e6dcc8;
  --good:#2f7a4f;
  --bad:#a5333e;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--cream);color:var(--ink);}
header.app{background:linear-gradient(135deg,var(--maroon),var(--maroon-dark));color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25);}
header.app .brand{display:flex;align-items:center;gap:10px;}
header.app .brand .mark{width:36px;height:36px;border-radius:8px;background:var(--gold);color:var(--maroon-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;}
header.app h1{font-size:16px;margin:0;letter-spacing:.3px;}
header.app .sub{font-size:11px;opacity:.8;}
nav.tabs{display:flex;overflow-x:auto;background:var(--maroon-dark);position:sticky;top:60px;z-index:49;-webkit-overflow-scrolling:touch;}
nav.tabs button{flex:0 0 auto;background:none;border:none;color:#e9d9b8;padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;}
nav.tabs button.active{color:#fff;border-bottom:3px solid var(--gold);background:rgba(255,255,255,.06);}
main{max-width:1100px;margin:0 auto;padding:16px;padding-bottom:60px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card h2{margin:0 0 12px;font-size:15px;color:var(--maroon);border-bottom:2px solid var(--gold-light);padding-bottom:8px;}
.grid{display:grid;gap:10px;}
.grid.cols-2{grid-template-columns:1fr 1fr;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:640px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}}
label{display:block;font-size:11px;font-weight:700;color:#6b5a3a;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#fffdf9;}
input:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
button.btn{background:var(--maroon);color:#fff;border:none;padding:10px 16px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;}
button.btn:hover{background:var(--maroon-dark);}
button.btn.gold{background:var(--gold);color:var(--maroon-dark);}
button.btn.gold:hover{background:var(--gold-light);}
button.btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);}
button.btn.danger{background:var(--bad);}
button.btn.sm{padding:6px 10px;font-size:12px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;}
th{background:#f6efdf;color:var(--maroon-dark);font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;}
tbody tr:hover{background:#fbf6ea;}
.table-wrap{overflow-x:auto;}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.pill.good{background:#e4f3e8;color:var(--good);}
.pill.bad{background:#fbe6e7;color:var(--bad);}
.pill.gold{background:#f8edd0;color:#8a6a10;}
.kpi{display:flex;flex-direction:column;gap:2px;}
.kpi .num{font-size:22px;font-weight:800;color:var(--maroon);}
.kpi .lbl{font-size:11px;color:#8a7a5a;text-transform:uppercase;font-weight:700;}
.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap;}
.msg{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px;}
.msg.info{background:#eef3fb;color:#2b5590;}
.msg.warn{background:#fdf3d8;color:#8a6a10;}
.msg.err{background:#fbe6e7;color:var(--bad);}
.tag-rm{cursor:pointer;color:var(--bad);font-weight:800;margin-left:8px;}
.foot-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
.empty{text-align:center;padding:30px;color:#9a8a6a;font-size:13px;}
.payslip{border:2px solid var(--maroon);border-radius:8px;padding:18px;max-width:480px;margin:0 auto;background:#fffdf7;}
.payslip h3{color:var(--maroon);text-align:center;margin:0 0 4px;letter-spacing:1px;}
.payslip .sub{text-align:center;font-size:11px;color:#8a7a5a;margin-bottom:14px;}
.payslip table td{padding:4px 6px;font-size:12.5px;}
.payslip .total-row td{font-weight:800;border-top:2px solid var(--maroon);}
@media print{
  header.app,nav.tabs,.no-print{display:none!important;}
  main{padding:0;max-width:100%;}
  .card{box-shadow:none;border:none;}
}
.badge-conn{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;}
.badge-conn.on{background:#2f7a4f33;color:#c9e8d3;}
.badge-conn.off{background:#a5333e33;color:#f5c6ca;}
</style>
</head>
<body>

<header class="app">
  <div class="brand">
    <div class="mark">CT</div>
    <div>
      <h1>Chowtime Production System</h1>
      <div class="sub" id="headerSub">Piece-rate output &amp; payroll tracker</div>
    </div>
  </div>
  <span id="connBadge" class="badge-conn off">Offline (local)</span>
</header>

<nav class="tabs" id="tabs"></nav>

<main id="main"></main>

<script>
/* ================= DATA LAYER ================= */
const DEFAULT_PRODUCTS = [
  {code:'NGT', label:'C. Nuggets'},
  {code:'LS',  label:'Longganisa Strips'},
  {code:'DP',  label:'Dumplings'},
  {code:'FILLET', label:'Chicken Fillet'},
  {code:'NGW', label:'Nugget Wrap'}
];
const DEFAULT_SKUS = [
  {code:'CUP', rate:0.15},{code:'BOX', rate:0.25},{code:'SOY', rate:5},
  {code:'BUFF', rate:5},{code:'GA', rate:5},{code:'CHEESE', rate:5},
  {code:'SHM', rate:5},{code:'SC', rate:5},{code:'TERI', rate:5},
  {code:'BBQ', rate:5},{code:'CHILI PASTE', rate:12.5},{code:'JUICE', rate:5}
];

let DB = null;
let USE_FIREBASE = false;

let state = {
  staff: {},        // id -> {name, jobTitle, idNumber, account, rates:{code:rate}}
  products: DEFAULT_PRODUCTS,
  production: {},   // "YYYY-MM-DD" -> { staffId: {NGT:qty,...} }
  skus: DEFAULT_SKUS,
  materials: {},    // cutoffKey -> { skuCode: qty }
  sideJobs: {},     // cutoffKey -> { staffId: amount }
  ledger: {},        // staffId -> [ {id,type:'loan'|'fine'|'ca'|'payment'|'cashfund_add'|'cashfund_deduct',amount,date,note} ]
  deductions: {}     // cutoffKey -> { staffId: {sss,philhealth,pagibig} }
};

const LS_STATE_KEY = 'chowtimeProduction_state_v1';
const LS_CFG_KEY = 'chowtimeProduction_fbConfig_v1';

function loadLocalState(){
  try{
    const raw = localStorage.getItem(LS_STATE_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      Object.keys(state).forEach(k=>{ if(saved[k]!==undefined) state[k]=saved[k]; });
    }
  }catch(e){ console.warn('Local storage unavailable, running in-memory only for this session.'); }
}
function persistLocalState(){
  try{ localStorage.setItem(LS_STATE_KEY, JSON.stringify(state)); }catch(e){}
}
function saveState(key, val){
  state[key] = val;
  persistLocalState();
  if(USE_FIREBASE && DB){
    DB.ref('chowtimeProduction/'+key).set(val || {});
  }
}
// Use this instead of multiple saveState() calls in a row when several sections change together
// (e.g. renaming a product code touches staff rates + production history + the product list at
// once). Multiple separate saveState() calls each fire the live listener as soon as they land,
// and a still-in-flight write can get silently overwritten by a snapshot taken between writes.
// A single update() writes everything atomically so the listener only ever sees the final result.
function saveStateMulti(updates){
  Object.keys(updates).forEach(k=>{ state[k]=updates[k]; });
  persistLocalState();
  if(USE_FIREBASE && DB){
    DB.ref('chowtimeProduction').update(updates);
  }
}
function initFirebase(cfgStr, fromSaved){
  try{
    const cfg = JSON.parse(cfgStr);
    if(firebase.apps.length) firebase.app().delete();
    firebase.initializeApp(cfg);
    DB = firebase.database();
    USE_FIREBASE = true;
    document.getElementById('connBadge').textContent = 'Connected (synced)';
    document.getElementById('connBadge').className = 'badge-conn on';
    try{ localStorage.setItem(LS_CFG_KEY, cfgStr); }catch(e){}

    // Reconcile once before listening live: if the cloud copy is empty (or missing whole
    // sections) but this device already has local data, push the local copy up FIRST so a
    // fresh/empty cloud database never wipes out data that only ever lived on this device.
    DB.ref('chowtimeProduction').once('value').then(snap=>{
      const cloud = snap.val() || {};
      const sections = ['staff','products','production','skus','materials','sideJobs','ledger','deductions'];
      const updates = {};
      sections.forEach(key=>{
        const cloudHas = cloud[key] && Object.keys(cloud[key]).length>0;
        const localHas = state[key] && Object.keys(state[key]).length>0;
        if(!cloudHas && localHas) updates[key] = state[key];
      });
      const pushLocal = Object.keys(updates).length
        ? DB.ref('chowtimeProduction').update(updates)
        : Promise.resolve();
      pushLocal.finally(()=>{
        DB.ref('chowtimeProduction').on('value', snap2=>{
          const v = snap2.val() || {};
          state.staff = v.staff || {};
          state.products = v.products || DEFAULT_PRODUCTS;
          state.production = v.production || {};
          state.skus = v.skus || DEFAULT_SKUS;
          state.materials = v.materials || {};
          state.sideJobs = v.sideJobs || {};
          state.ledger = v.ledger || {};
          state.deductions = v.deductions || {};
          persistLocalState();
          render();
        });
      });
    });
    return true;
  }catch(e){
    if(!fromSaved) alert('Invalid Firebase config: '+e.message);
    return false;
  }
}

/* ================= HELPERS ================= */
function uid(){ return 'x'+Math.random().toString(36).slice(2,10); }
function fmt(n){ n = Number(n)||0; return n.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function cutoffKeyFor(dateISO){
  const [y,m,d] = dateISO.split('-').map(Number);
  const half = d<=15 ? '1' : '2';
  return `${y}-${String(m).padStart(2,'0')}-C${half}`;
}
function cutoffLabel(key){
  const [y,m,half] = key.split('-');
  const monthName = new Date(Number(y), Number(m)-1, 1).toLocaleString('en-US',{month:'short'});
  return half==='C1' ? `${monthName} 1–15, ${y}` : `${monthName} 16–end, ${y}`;
}
function creditedQtyForStaff(dayData, productCode, staffId){
  if(!dayData || !dayData.products || !dayData.products[productCode]) return 0;
  const p = dayData.products[productCode];
  const staffOnBatch = p.staff || [];
  if(!staffOnBatch.includes(staffId)) return 0;
  if(!staffOnBatch.length) return 0;
  return (Number(p.qty)||0) / staffOnBatch.length;
}
function dailyIncomeForStaff(dayData, staffId){
  const s = state.staff[staffId]; if(!s) return 0;
  let total = 0;
  state.products.forEach(p=>{
    const qty = creditedQtyForStaff(dayData, p.code, staffId);
    const rate = Number((s.rates && s.rates[p.code]) || 0);
    total += qty*rate;
  });
  return total;
}
function cutoffDatesForKey(key){
  const [y,m,half] = key.split('-');
  const year=Number(y), month=Number(m);
  const start = half==='C1' ? 1 : 16;
  const end = half==='C1' ? 15 : new Date(year, month, 0).getDate();
  const dates=[];
  for(let d=start; d<=end; d++){
    dates.push(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  return dates;
}
function staffCutoffProduction(staffId, cutoffKey){
  const dates = cutoffDatesForKey(cutoffKey);
  let total = 0; const byProduct = {};
  state.products.forEach(p=>byProduct[p.code]=0);
  dates.forEach(dISO=>{
    const day = state.production[dISO];
    if(!day) return;
    state.products.forEach(p=>{
      byProduct[p.code] += creditedQtyForStaff(day, p.code, staffId);
    });
    total += dailyIncomeForStaff(day, staffId);
  });
  return {total, byProduct};
}
function ledgerBalance(staffId){
  const entries = state.ledger[staffId] || [];
  let loanOwed=0, cashFund=0, totalOwedRaised=0, totalPaid=0;
  entries.forEach(e=>{
    if(e.type==='loan' || e.type==='fine' || e.type==='ca'){ loanOwed += Number(e.amount); totalOwedRaised += Number(e.amount); }
    if(e.type==='payment'){ loanOwed -= Number(e.amount); totalPaid += Number(e.amount); }
    if(e.type==='cashfund_add') cashFund += Number(e.amount);
    if(e.type==='cashfund_deduct') cashFund -= Number(e.amount);
  });
  return {loanOwed, cashFund, totalOwedRaised, totalPaid};
}
function activeStaffList(){
  return Object.entries(state.staff).map(([id,s])=>({id,...s}));
}
function allCutoffKeysWithData(){
  const keys = new Set();
  Object.keys(state.production).forEach(d=>keys.add(cutoffKeyFor(d)));
  Object.keys(state.materials).forEach(k=>keys.add(k));
  Object.keys(state.sideJobs).forEach(k=>keys.add(k));
  return Array.from(keys).sort().reverse();
}

/* ================= RENDER ================= */
const SUPERVISOR_MODE = new URLSearchParams(window.location.search).get('mode') === 'supervisor';
if(SUPERVISOR_MODE){
  const hs = document.getElementById('headerSub');
  if(hs) hs.textContent = 'Supervisor view — production entry only';
}
const ALL_TABS = [
  {tab:'dashboard', label:'Dashboard'},
  {tab:'entry', label:'Production Entry'},
  {tab:'staff', label:'Staff & Rates'},
  {tab:'materials', label:'Materials & Side Jobs'},
  {tab:'loans', label:'Deductions'},
  {tab:'payslip', label:'Payslip'},
  {tab:'settings', label:'Settings'}
];
const SUPERVISOR_ALLOWED_TABS = ['entry','materials'];
const VISIBLE_TABS = SUPERVISOR_MODE ? ALL_TABS.filter(t=>SUPERVISOR_ALLOWED_TABS.includes(t.tab)) : ALL_TABS;
let activeTab = SUPERVISOR_MODE ? 'entry' : 'dashboard';
function renderNav(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = VISIBLE_TABS.map(t=>`<button data-tab="${t.tab}" class="${t.tab===activeTab?'active':''}">${t.label}</button>`).join('');
}
renderNav();
document.getElementById('tabs').addEventListener('click', e=>{
  if(e.target.tagName==='BUTTON'){
    activeTab = e.target.dataset.tab;
    document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===activeTab));
    render();
  }
});

function render(){
  if(SUPERVISOR_MODE && !SUPERVISOR_ALLOWED_TABS.includes(activeTab)){
    activeTab = 'entry';
    renderNav();
  }
  const main = document.getElementById('main');
  main.innerHTML='';
  if(activeTab==='dashboard') renderDashboard(main);
  if(activeTab==='entry') renderEntry(main);
  if(activeTab==='staff') renderStaff(main);
  if(activeTab==='materials') renderMaterials(main);
  if(activeTab==='loans') renderLoans(main);
  if(activeTab==='payslip') renderPayslip(main);
  if(activeTab==='settings') renderSettings(main);
}

/* ---------- DASHBOARD ---------- */
let dashCutoff = null;
function renderDashboard(main){
  const keys = Array.from(new Set([cutoffKeyFor(todayISO()), ...allCutoffKeysWithData()]));
  if(!dashCutoff || !keys.includes(dashCutoff)) dashCutoff = cutoffKeyFor(todayISO());
  const selKey = dashCutoff;
  const staffList = activeStaffList();

  let totalGross=0, totalQty=0, topStaff=null, topAmt=-1;
  const prodTotals = {}; state.products.forEach(p=>prodTotals[p.code]=0);
  const perStaff = staffList.map(s=>{
    const {total, byProduct} = staffCutoffProduction(s.id, selKey);
    totalGross += total;
    Object.keys(byProduct).forEach(k=>{ prodTotals[k]+=byProduct[k]; totalQty+=byProduct[k]; });
    if(total>topAmt){ topAmt=total; topStaff=s.name; }
    const bal = ledgerBalance(s.id);
    return {s, total, byProduct, bal};
  });

  main.innerHTML = `
  <div class="card no-print">
    <h2>Report a cutoff</h2>
    <div class="row">
      <div><label>Cutoff period</label>
        <select id="dashCutoffSel">${keys.map(k=>`<option value="${k}" ${k===selKey?'selected':''}>${cutoffLabel(k)}</option>`).join('')}</select>
      </div>
      <button class="btn ghost" id="printSummaryBtn">Print / Save PDF</button>
      <button class="btn gold" id="emailSummaryBtn">Email this summary</button>
    </div>
  </div>

  <div class="msg info">Reporting cutoff: <strong>${cutoffLabel(selKey)}</strong> — figures below auto-total from daily entries.</div>
  <div class="grid cols-4">
    <div class="card kpi"><div class="num">₱${fmt(totalGross)}</div><div class="lbl">Production payroll (this cutoff)</div></div>
    <div class="card kpi"><div class="num">${fmt(totalQty).split('.')[0]}</div><div class="lbl">Units produced</div></div>
    <div class="card kpi"><div class="num">${staffList.length}</div><div class="lbl">Active staff</div></div>
    <div class="card kpi"><div class="num">${topStaff||'—'}</div><div class="lbl">Top producer</div></div>
  </div>

  <div class="card">
    <h2>Production by item — ${cutoffLabel(selKey)}</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th>Qty</th></tr></thead>
      <tbody>
        ${state.products.map(p=>{
          const qty = prodTotals[p.code]||0;
          return `<tr><td>${p.label} <span style="color:#9a8a6a">(${p.code})</span></td><td>${fmt(qty)}</td></tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <h2>Cutoff summary — all staff — ${cutoffLabel(selKey)}</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Staff</th><th>Role</th>${state.products.map(p=>`<th>${p.code}</th>`).join('')}<th>Production ₱</th><th>Deductions owed</th><th>Cash fund</th></tr></thead>
      <tbody>
        ${perStaff.length? perStaff.map(({s,total,byProduct,bal})=>{
          return `<tr>
            <td><strong>${s.name}</strong></td><td>${s.jobTitle||''}</td>
            ${state.products.map(p=>`<td>${fmt(byProduct[p.code]||0).split('.')[0]}</td>`).join('')}
            <td>₱${fmt(total)}</td>
            <td>${bal.loanOwed>0?`<span class="pill bad">₱${fmt(bal.loanOwed)}</span>`:'<span class="pill good">clear</span>'}</td>
            <td>₱${fmt(bal.cashFund)}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="${4+state.products.length}" class="empty">No staff yet — add staff in the Staff &amp; Rates tab.</td></tr>`}
        <tr class="total-row" style="font-weight:800"><td colspan="2">TOTAL</td>${state.products.map(p=>`<td>${fmt(prodTotals[p.code]||0).split('.')[0]}</td>`).join('')}<td>₱${fmt(totalGross)}</td><td></td><td></td></tr>
      </tbody>
    </table></div>
  </div>

  <div class="card no-print">
    <h2>Past cutoffs on record</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Cutoff</th><th>Total production payroll (₱)</th></tr></thead>
      <tbody>
        ${keys.length? keys.map(k=>{
          let sum=0; staffList.forEach(s=> sum += staffCutoffProduction(s.id,k).total );
          return `<tr><td>${cutoffLabel(k)}</td><td>₱${fmt(sum)}</td></tr>`;
        }).join('') : `<tr><td colspan="2" class="empty">No records yet.</td></tr>`}
      </tbody>
    </table></div>
  </div>
  `;

  document.getElementById('dashCutoffSel').onchange = e=>{ dashCutoff = e.target.value; render(); };
  document.getElementById('printSummaryBtn').onclick = ()=> window.print();
  document.getElementById('emailSummaryBtn').onclick = ()=>{
    const to = prompt('Send this cutoff summary to (email address):', '');
    if(!to) return;
    const lines = [];
    lines.push(`CHOWTIME PRODUCTION — CUTOFF SUMMARY`);
    lines.push(cutoffLabel(selKey));
    lines.push('');
    lines.push(`Total production payroll: ₱${fmt(totalGross)}`);
    lines.push(`Units produced: ${fmt(totalQty).split('.')[0]}`);
    lines.push(`Active staff: ${staffList.length}`);
    lines.push('');
    lines.push('PER STAFF');
    perStaff.forEach(({s,total,bal})=>{
      lines.push(`  ${s.name} (${s.jobTitle||''}): ₱${fmt(total)}  |  Deductions owed: ₱${fmt(bal.loanOwed)}  |  Cash fund: ₱${fmt(bal.cashFund)}`);
    });
    lines.push('');
    lines.push('BY ITEM');
    state.products.forEach(p=>{
      const qty = prodTotals[p.code]||0;
      if(qty>0) lines.push(`  ${p.label}: ${fmt(qty)}`);
    });
    const subject = `Chowtime Production — Cutoff Summary — ${cutoffLabel(selKey)}`;
    window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join('\n'))}`;
  };
}

/* ---------- PRODUCTION ENTRY ---------- */
let entryDate = todayISO();
function renderEntry(main){
  const staffList = activeStaffList();
  const day = state.production[entryDate] || {attendance:{}, ca:{}, products:{}};
  // default: if no attendance saved yet for this date, treat everyone as present
  const hasAttendance = day.attendance && Object.keys(day.attendance).length>0;
  const attendance = {};
  staffList.forEach(s=> attendance[s.id] = hasAttendance ? !!day.attendance[s.id] : true);

  main.innerHTML = `
  <div class="card">
    <h2>Daily production entry</h2>
    <div class="row">
      <div style="min-width:200px"><label>Date</label><input type="date" id="entryDateInput" value="${entryDate}"></div>
      <div><label>Cutoff period</label><input type="text" value="${cutoffLabel(cutoffKeyFor(entryDate))}" readonly style="background:#f6efdf;font-weight:700;color:var(--maroon)"></div>
    </div>
  </div>
  ${staffList.length? `
  <div class="card">
    <h2>Who's in today</h2>
    <div class="msg info">This attendance list is the default group that shares each batch below. Uncheck anyone who was off, or uncheck someone per-item further down if they didn't work on that particular product.</div>
    <div class="grid cols-4">
      ${staffList.map(s=>`
        <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:600;color:var(--ink);font-size:13px">
          <input type="checkbox" class="attCheck" data-staff="${s.id}" ${attendance[s.id]?'checked':''} style="width:auto"> ${s.name}
        </label>
      `).join('')}
    </div>
  </div>

  <div class="card">
    <h2>Batches produced today</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th>Total qty made</th><th>Credited to</th></tr></thead>
      <tbody>
        ${state.products.map(p=>{
          const pd = (day.products && day.products[p.code]) || {};
          const qty = pd.qty!=null ? pd.qty : '';
          const creditedSet = pd.staff ? new Set(pd.staff) : new Set(staffList.filter(s=>attendance[s.id]).map(s=>s.id));
          return `<tr>
            <td><strong>${p.label}</strong><br><span style="font-size:10px;color:#9a8a6a">${p.code}</span></td>
            <td><input type="number" min="0" step="any" style="width:100px" class="batchQty" data-code="${p.code}" value="${qty}" placeholder="0"></td>
            <td>
              <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${staffList.map(s=>`
                <label style="display:flex;align-items:center;gap:4px;text-transform:none;font-weight:500;font-size:12px">
                  <input type="checkbox" class="creditCheck" data-code="${p.code}" data-staff="${s.id}" ${creditedSet.has(s.id)?'checked':''} style="width:auto"> ${s.name}
                </label>
              `).join('')}
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <h2>Cash advance today</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Staff</th><th>CA (₱)</th></tr></thead>
      <tbody>
        ${staffList.map(s=>{
          const ca = (day.ca && day.ca[s.id]) || '';
          return `<tr><td>${s.name}</td><td><input type="number" min="0" step="any" style="width:100px" class="caInput" data-staff="${s.id}" value="${ca}" placeholder="0"></td></tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    ${SUPERVISOR_MODE? `
      <h2>Ready to save</h2>
      <div class="msg info">Batch quantities and attendance above will be saved for ${entryDate}.</div>
    ` : `
      <h2>Computed income for ${entryDate} (preview)</h2>
      <div class="table-wrap"><table>
        <thead><tr><th>Staff</th><th>Credited qty × rate</th><th>Day income</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table></div>
    `}
    <div class="foot-actions">
      <button class="btn gold" id="saveEntryBtn">Save entry for ${entryDate}</button>
    </div>
  </div>
  ` : `<div class="card"><div class="empty">Add staff first in the Staff &amp; Rates tab before recording production.</div></div>`}
  `;

  if(!staffList.length) return;

  document.getElementById('entryDateInput').onchange = e=>{ entryDate = e.target.value; renderEntry(main); };

  document.querySelectorAll('.attCheck').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      // when attendance changes, re-check any product row that hasn't been manually customized yet is left as-is;
      // simplest: just refresh preview, leave per-item checkboxes as the user set them
      refreshPreview();
    });
  });
  document.querySelectorAll('.batchQty,.creditCheck').forEach(el=>{
    el.addEventListener('input', refreshPreview);
    el.addEventListener('change', refreshPreview);
  });

  function collectDayData(){
    const data = {attendance:{}, ca:{}, products:{}};
    document.querySelectorAll('.attCheck').forEach(cb=>{ data.attendance[cb.dataset.staff]=cb.checked; });
    document.querySelectorAll('.caInput').forEach(i=>{ const v=Number(i.value)||0; if(v>0) data.ca[i.dataset.staff]=v; });
    state.products.forEach(p=>{
      const qtyEl = document.querySelector(`.batchQty[data-code="${p.code}"]`);
      const qty = Number(qtyEl.value)||0;
      const staffIds = Array.from(document.querySelectorAll(`.creditCheck[data-code="${p.code}"]:checked`)).map(c=>c.dataset.staff);
      data.products[p.code] = {qty, staff: staffIds};
    });
    return data;
  }
  function refreshPreview(){
    const tbody = document.getElementById('previewBody');
    if(!tbody) return;
    const data = collectDayData();
    tbody.innerHTML = staffList.map(s=>{
      const parts = [];
      let income=0;
      state.products.forEach(p=>{
        const cq = creditedQtyForStaff(data, p.code, s.id);
        if(cq>0){
          const rate = (s.rates&&s.rates[p.code])||0;
          income += cq*rate;
          parts.push(`${p.code}: ${cq.toFixed(1)}×₱${rate}`);
        }
      });
      const ca = data.ca[s.id]||0;
      return `<tr><td>${s.name}</td><td style="font-size:11px;color:#6b5a3a">${parts.join(', ')||'—'}</td><td><strong>₱${fmt(income)}</strong>${ca?` <span class="pill gold">CA ₱${fmt(ca)}</span>`:''}</td></tr>`;
    }).join('');
  }
  refreshPreview();

  document.getElementById('saveEntryBtn').onclick = ()=>{
    const emptyBatches = state.products.filter(p=>{
      const qty = Number(document.querySelector(`.batchQty[data-code="${p.code}"]`).value)||0;
      const staffCount = document.querySelectorAll(`.creditCheck[data-code="${p.code}"]:checked`).length;
      return qty>0 && staffCount===0;
    });
    if(emptyBatches.length){
      alert('These items have a quantity but no one credited: '+emptyBatches.map(p=>p.label).join(', ')+'. Check at least one staff box for each, or clear the quantity.');
      return;
    }
    state.production[entryDate] = collectDayData();
    saveState('production', state.production);
    alert('Saved production for '+entryDate);
    render();
  };
}

/* ---------- STAFF & RATES ---------- */
let editingStaffId = null;
function renderStaff(main){
  const staffList = activeStaffList();
  const editing = editingStaffId ? state.staff[editingStaffId] : null;
  main.innerHTML = `
  <div class="card">
    <h2>${editing? `Edit staff member — ${editing.name}` : 'Add staff member'}</h2>
    <div class="grid cols-4">
      <div><label>Name</label><input id="nName" value="${editing?editing.name:''}"></div>
      <div><label>Role / Job title</label><input id="nJob" value="${editing?(editing.jobTitle||''):''}"></div>
      <div><label>ID number</label><input id="nId" placeholder="CT-0007" value="${editing?(editing.idNumber||''):''}"></div>
      <div><label>Bank / account no.</label><input id="nAcc" value="${editing?(editing.account||''):''}"></div>
      <div><label>Email (for payslips)</label><input id="nEmail" type="email" placeholder="name@example.com" value="${editing?(editing.email||''):''}"></div>
    </div>
    <h2 style="margin-top:16px">Piece rates (₱ per unit)</h2>
    <div class="grid cols-4">
      ${state.products.map(p=>`<div><label>${p.label} (${p.code})</label><input id="rate-${p.code}" type="number" step="any" min="0" value="${editing?((editing.rates&&editing.rates[p.code])!=null?editing.rates[p.code]:0):0.60}"></div>`).join('')}
    </div>
    <div class="foot-actions">
      ${editing?'<button class="btn ghost" id="cancelEditBtn">Cancel</button>':''}
      <button class="btn gold" id="addStaffBtn">${editing?'Save changes':'Add staff'}</button>
    </div>
  </div>

  <div class="card">
    <h2>Current staff (${staffList.length})</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Email</th>${state.products.map(p=>`<th>${p.code}</th>`).join('')}<th></th></tr></thead>
      <tbody>
      ${staffList.length? staffList.map(s=>`
        <tr>
          <td>${s.idNumber||'—'}</td>
          <td><strong>${s.name}</strong></td>
          <td>${s.jobTitle||''}</td>
          <td>${s.email||'<span style="color:#c77">not set</span>'}</td>
          ${state.products.map(p=>`<td>₱${fmt((s.rates&&s.rates[p.code])||0)}</td>`).join('')}
          <td><button class="btn ghost sm editRate" data-id="${s.id}">Edit</button> <button class="btn danger sm delStaff" data-id="${s.id}">Remove</button></td>
        </tr>
      `).join('') : `<tr><td colspan="${5+state.products.length}" class="empty">No staff added yet.</td></tr>`}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <h2>Product master list</h2>
    <div class="row">
      <div><label>New product code</label><input id="pCode" style="width:120px" placeholder="e.g. WRAP"></div>
      <div><label>Label</label><input id="pLabel" style="width:180px" placeholder="e.g. Spring Roll Wrap"></div>
      <button class="btn ghost" id="addProdBtn">Add product</button>
    </div>
    <div class="table-wrap" style="margin-top:10px"><table>
      <thead><tr><th>Code</th><th>Label</th><th></th></tr></thead>
      <tbody>
      ${state.products.map((p,i)=>`<tr><td>${p.code}</td><td>${p.label}</td><td><span class="tag-rm editProd" data-i="${i}" style="color:var(--maroon)">✎ edit</span> <span class="tag-rm" data-i="${i}">✕ remove</span></td></tr>`).join('')}
      </tbody>
    </table></div>
    <div class="msg warn" style="margin-top:10px">Removing a product does not delete past production records for it, but it will no longer appear in entry forms.</div>
  </div>
  `;

  document.getElementById('addStaffBtn').onclick = ()=>{
    const name = document.getElementById('nName').value.trim();
    if(!name){ alert('Enter a name'); return; }
    const rates={};
    state.products.forEach(p=> rates[p.code]=Number(document.getElementById('rate-'+p.code).value)||0);
    const info = {
      name, jobTitle: document.getElementById('nJob').value.trim(),
      idNumber: document.getElementById('nId').value.trim(),
      account: document.getElementById('nAcc').value.trim(),
      email: document.getElementById('nEmail').value.trim(),
      rates
    };
    if(editingStaffId){
      state.staff[editingStaffId] = info;
      editingStaffId = null;
    } else {
      state.staff[uid()] = info;
    }
    saveState('staff', state.staff);
    render();
  };
  const cancelBtn = document.getElementById('cancelEditBtn');
  if(cancelBtn) cancelBtn.onclick = ()=>{ editingStaffId=null; render(); };
  document.querySelectorAll('.delStaff').forEach(b=>b.onclick=()=>{
    if(confirm('Remove this staff member? Past production records will be kept but unlinked.')){
      delete state.staff[b.dataset.id];
      saveState('staff', state.staff);
      render();
    }
  });
  document.querySelectorAll('.editRate').forEach(b=>b.onclick=()=>{
    editingStaffId = b.dataset.id;
    render();
    main.scrollIntoView({behavior:'smooth'});
  });
  document.getElementById('addProdBtn').onclick = ()=>{
    const code = document.getElementById('pCode').value.trim().toUpperCase();
    const label = document.getElementById('pLabel').value.trim();
    if(!code||!label){ alert('Enter code and label'); return; }
    if(state.products.some(p=>p.code===code)){ alert('Code already exists'); return; }
    state.products.push({code,label});
    saveState('products', state.products);
    render();
  };
  document.querySelectorAll('.editProd').forEach(t=>t.onclick=()=>{
    const i = Number(t.dataset.i);
    const p = state.products[i];
    const newLabel = prompt(`Label for ${p.code}:`, p.label);
    if(newLabel===null) return;
    const newCodeRaw = prompt(`Code for "${newLabel.trim()||p.label}" (short, no spaces — changing this keeps all existing rates and production history, just renamed):`, p.code);
    if(newCodeRaw===null) return;
    const newCode = newCodeRaw.trim().toUpperCase();
    const newLabelTrim = newLabel.trim();
    if(!newCode || !newLabelTrim){ alert('Code and label cannot be empty'); return; }
    if(newCode!==p.code && state.products.some((pp,ix)=>ix!==i && pp.code===newCode)){
      alert('Another product already uses that code'); return;
    }
    const oldCode = p.code;
    const newProducts = state.products.slice();
    newProducts[i] = {code:newCode, label:newLabelTrim};
    if(newCode!==oldCode){
      // migrate rates on every staff member
      const newStaff = JSON.parse(JSON.stringify(state.staff));
      Object.values(newStaff).forEach(s=>{
        if(s.rates && Object.prototype.hasOwnProperty.call(s.rates, oldCode)){
          s.rates[newCode] = s.rates[oldCode];
          delete s.rates[oldCode];
        }
      });
      // migrate production history
      const newProduction = JSON.parse(JSON.stringify(state.production));
      Object.values(newProduction).forEach(day=>{
        if(day.products && Object.prototype.hasOwnProperty.call(day.products, oldCode)){
          day.products[newCode] = day.products[oldCode];
          delete day.products[oldCode];
        }
      });
      saveStateMulti({staff:newStaff, production:newProduction, products:newProducts});
    } else {
      saveState('products', newProducts);
    }
    render();
  });
  document.querySelectorAll('.tag-rm:not(.editProd)').forEach(t=>t.onclick=()=>{
    state.products.splice(Number(t.dataset.i),1);
    saveState('products', state.products);
    render();
  });
}

  ${SUPERVISOR_MODE ? '' : `
  <div class="card">
    <h2>Side jobs / income share pool</h2>

    <div class="row">
      <div><label>Pool amount (₱)</label><input id="poolAmt" type="number" step="any" style="width:140px" placeholder="0"></div>
      <button class="btn ghost" id="splitEvenBtn">Split evenly among checked staff</button>
    </div>
    <div class="table-wrap" style="margin-top:10px"><table>
      <thead><tr><th></th><th>Staff</th><th>Share (₱)</th></tr></thead>
      <tbody>
      ${staffList.length? staffList.map(s=>`
        <tr>
          <td><input type="checkbox" class="poolCheck" data-id="${s.id}" checked></td>
          <td>${s.name}</td>
          <td><input type="number" step="any" min="0" style="width:100px" class="sideAmt" data-id="${s.id}" value="${side[s.id]||''}" placeholder="0"></td>
        </tr>`).join('') : `<tr><td colspan="3" class="empty">No staff yet.</td></tr>`}
      </tbody>
    </table></div>
    <div class="foot-actions"><button class="btn gold" id="saveSideBtn">Save side job shares</button></div>
  </div>
  `}
  `;

  document.getElementById('matCutoffSel').onchange = e=>{ matCutoff = e.target.value; renderMaterials(main); };

  document.getElementById('saveMatBtn').onclick = ()=>{
    const newSkus = state.skus.map(sku=>{
      const rateEl = document.querySelector(`.skuRate[data-code="${CSS.escape(sku.code)}"]`);
      return {code:sku.code, rate: rateEl ? (Number(rateEl.value)||0) : sku.rate};
    });
    const newMat = {};
    document.querySelectorAll('.skuQty').forEach(i=>{ newMat[i.dataset.code]=Number(i.value)||0; });
    const newMaterials = {...state.materials, [matCutoff]: newMat};
    saveStateMulti({skus:newSkus, materials:newMaterials});
    alert('Materials saved for '+cutoffLabel(matCutoff));
    render();
  };

  const splitBtn = document.getElementById('splitEvenBtn');
  if(splitBtn) splitBtn.onclick = ()=>{
    const pool = Number(document.getElementById('poolAmt').value)||0;
    const checked = Array.from(document.querySelectorAll('.poolCheck:checked')).map(c=>c.dataset.id);
    if(!checked.length){ alert('Check at least one staff member'); return; }
    const share = pool/checked.length;

    render();
  };

/* ---------- LOANS & CASH FUND ---------- */
function staffDebts(staffId){
  const entries = state.ledger[staffId] || [];
  const debts = entries.filter(e=>e.type==='loan'||e.type==='fine'||e.type==='ca');
  const typeLabels = {loan:'Loan', fine:'Fine / penalty', ca:'Cash advance'};
  return debts.map(d=>{
    const paid = entries.filter(e=>e.type==='payment' && e.debtId===d.id).reduce((a,e)=>a+Number(e.amount),0);
    return {...d, typeLabel:typeLabels[d.type]||d.type, paid, balance: Number(d.amount)-paid};
  }).sort((a,b)=> a.date<b.date?1:-1);
}
function staffDebtBalancesByType(staffId){
  const debts = staffDebts(staffId);
  const out = {loan:0, fine:0, ca:0};
  debts.forEach(d=>{ if(out[d.type]!=null) out[d.type]+=d.balance; });
  return out;
}

            <td>₱${fmt(d.amount)}</td>
            <td>₱${fmt(d.paid)}</td>
            <td>${d.balance>0.004?`<span class="pill bad">₱${fmt(d.balance)}</span>`:'<span class="pill good">paid off</span>'}</td>
            <td>${d.note||''}</td>
            <td><span class="tag-rm delLedger" data-key="${s.id}||${d.id}">✕</span></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('')}

  <div class="card">
    <h2>Payment history (all staff)</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Staff</th><th>Paid toward</th><th>Amount</th><th>Note</th><th></th></tr></thead>
      <tbody>
      ${renderPaymentRows()}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <h2>Cash fund ledger (all staff)</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Staff</th><th>Type</th><th>Amount</th><th>Note</th><th></th></tr></thead>
      <tbody>
      ${renderCashFundRows()}
      </tbody>
    </table></div>
  </div>
  `;

  document.getElementById('lStaff').onchange = e=>{ renderLoans._lastStaff = e.target.value; renderLoans(main); };
  document.getElementById('lType').onchange = e=>{ renderLoans._lastType = e.target.value; renderLoans(main); };

  document.getElementById('addLedgerBtn').onclick = ()=>{
    const staffId = document.getElementById('lStaff').value;
    const type = document.getElementById('lType').value;
    const amount = Number(document.getElementById('lAmt').value)||0;
    if(!staffId || amount<=0){ alert('Choose staff and enter a valid amount'); return; }
    const entry = {id:uid(), type, amount, date:document.getElementById('lDate').value, note:document.getElementById('lNote').value.trim()};
    if(type==='payment'){
      const debtId = document.getElementById('lDebtId').value;
      if(!debtId){ alert('Pick which debt this payment is for. If there are no open debts listed, this staff has nothing outstanding.'); return; }
      entry.debtId = debtId;
    }
    if(!state.ledger[staffId]) state.ledger[staffId]=[];
    state.ledger[staffId].push(entry);
    saveState('ledger', state.ledger);
    renderLoans._lastStaff = staffId;
    render();
  };

  document.querySelectorAll('.delLedger').forEach(b=>b.onclick=()=>{
    const [sid,eid]=b.dataset.key.split('||');
    if(confirm('Remove this entry? If it\'s a loan/fine/CA with payments already tagged to it, those payment records will stay but no longer be linked to anything.')){
      state.ledger[sid] = (state.ledger[sid]||[]).filter(e=>e.id!==eid);
      saveState('ledger', state.ledger);
      render();
    }
  });
}
function renderPaymentRows(){
  const rows=[];
  Object.entries(state.ledger).forEach(([sid,entries])=>{
    const name = state.staff[sid]?state.staff[sid].name:'(removed staff)';
    const debtsById = {};
    (entries||[]).forEach(e=>{ if(e.type==='loan'||e.type==='fine'||e.type==='ca') debtsById[e.id]=e; });
    (entries||[]).forEach(e=>{
      if(e.type!=='payment') return;
      const debt = debtsById[e.debtId];
      const typeLabels = {loan:'Loan', fine:'Fine / penalty', ca:'Cash advance'};
      const target = debt? `${typeLabels[debt.type]||debt.type} (${debt.date})` : '<span style="color:#c77">unlinked</span>';
      rows.push({date:e.date, html:`<tr><td>${e.date}</td><td>${name}</td><td>${target}</td><td>₱${fmt(e.amount)}</td><td>${e.note||''}</td><td><span class="tag-rm delLedger" data-key="${sid}||${e.id}">✕</span></td></tr>`});
    });
  });
  if(!rows.length) return `<tr><td colspan="6" class="empty">No payments logged yet.</td></tr>`;
  rows.sort((a,b)=> a.date<b.date?1:-1);
  return rows.map(r=>r.html).join('');
}
function renderCashFundRows(){
  const rows=[];
  Object.entries(state.ledger).forEach(([sid,entries])=>{
    const name = state.staff[sid]?state.staff[sid].name:'(removed staff)';
    (entries||[]).forEach(e=>{
      if(e.type!=='cashfund_add' && e.type!=='cashfund_deduct') return;
      const typeLabel = {cashfund_add:'Cash fund +',cashfund_deduct:'Cash fund −'}[e.type];
      rows.push({date:e.date, html:`<tr><td>${e.date}</td><td>${name}</td><td>${typeLabel}</td><td>₱${fmt(e.amount)}</td><td>${e.note||''}</td><td><span class="tag-rm delLedger" data-key="${sid}||${e.id}">✕</span></td></tr>`});
    });
  });
  if(!rows.length) return `<tr><td colspan="6" class="empty">No cash fund entries yet.</td></tr>`;
  rows.sort((a,b)=> a.date<b.date?1:-1);
  return rows.map(r=>r.html).join('');
}

/* ---------- PAYSLIP ---------- */
function renderPayslip(main){
  const staffList = activeStaffList();
  const keys = allCutoffKeysWithData();
  if(!keys.includes(cutoffKeyFor(todayISO()))) keys.unshift(cutoffKeyFor(todayISO()));

  main.innerHTML = `
  <div class="card no-print">
    <h2>Generate payslip</h2>
    <div class="grid cols-2">
      <div><label>Staff</label><select id="psStaff">${staffList.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
      <div><label>Cutoff period</label><select id="psCutoff">${keys.map(k=>`<option value="${k}">${cutoffLabel(k)}</option>`).join('')}</select></div>
    </div>
    <h2 style="margin-top:14px">Statutory &amp; other deductions</h2>
    <div class="grid cols-3">
      <div><label>SSS</label><input id="psSss" type="number" step="any" value="0"></div>
      <div><label>PhilHealth</label><input id="psPhil" type="number" step="any" value="0"></div>
      <div><label>Pag-IBIG</label><input id="psPagibig" type="number" step="any" value="0"></div>
    </div>
    <div class="foot-actions"><button class="btn gold" id="genBtn">Generate</button></div>
  </div>
  <div id="payslipOut"></div>
  `;

  document.getElementById('genBtn').onclick = ()=>genPayslip();
  document.getElementById('psStaff').onchange = ()=>genPayslip();
  document.getElementById('psCutoff').onchange = ()=>genPayslip();
  function genPayslip(){
    const sid = document.getElementById('psStaff').value;
    const ck = document.getElementById('psCutoff').value;
    const s = state.staff[sid];
    if(!s) return;
    const {total, byProduct} = staffCutoffProduction(sid, ck);
    const side = (state.sideJobs[ck]||{})[sid] || 0;
    const gross = total + side;
    const sss = Number(document.getElementById('psSss').value)||0;
    const phil = Number(document.getElementById('psPhil').value)||0;
    const pagibig = Number(document.getElementById('psPagibig').value)||0;

    // this cutoff's actual deduction is whatever "Payment received" was logged this cutoff —
    // categorized by which debt (loan/fine/CA) each payment was tagged to. Issuing a loan,
    // fine, or cash advance itself doesn't touch payroll; only a logged payment does, whenever
    // and however much it's actually paid.
    const dates = new Set(cutoffDatesForKey(ck));
    const entries = (state.ledger[sid]||[]).filter(e=>dates.has(e.date));
    const allDebts = staffDebts(sid);
    const debtsById = {}; allDebts.forEach(d=>{ debtsById[d.id]=d; });
    const paymentsThisCutoff = entries.filter(e=>e.type==='payment');
    const payByType = {loan:0, fine:0, ca:0, unlinked:0};
    paymentsThisCutoff.forEach(p=>{
      const d = debtsById[p.debtId];
      if(d && payByType[d.type]!=null) payByType[d.type]+=Number(p.amount);
      else payByType.unlinked+=Number(p.amount);
    });
    const deductionPayment = paymentsThisCutoff.reduce((a,e)=>a+Number(e.amount),0);
    const balByType = staffDebtBalancesByType(sid);
    const cashfund = entries.filter(e=>e.type==='cashfund_deduct').reduce((a,e)=>a+Number(e.amount),0);
    const currentBalance = ledgerBalance(sid).loanOwed;
    let caTotal = 0;
    cutoffDatesForKey(ck).forEach(d=>{
      const day = state.production[d];
      if(day && day.ca) caTotal += Number(day.ca[sid]||0);
    });

    const totalDeduction = sss+phil+pagibig+deductionPayment+caTotal+cashfund;
    const net = gross - totalDeduction;

    const deductionRows = [
      {label:'Loan payment', pay:payByType.loan, bal:balByType.loan},
      {label:'Fine / penalty payment', pay:payByType.fine, bal:balByType.fine},
      {label:'Cash advance payment', pay:payByType.ca, bal:balByType.ca}
    ].filter(r=>r.pay>0.004 || r.bal>0.004);

    document.getElementById('payslipOut').innerHTML = `
    <div class="card">
      <div class="payslip">
        <h3>CHOWTIME PRODUCTION</h3>
        <div class="sub">Official Payslip — ${cutoffLabel(ck)}</div>
        <table style="width:100%">
          <tr><td>Employee ID</td><td>${s.idNumber||'—'}</td></tr>
          <tr><td>Name</td><td><strong>${s.name}</strong></td></tr>
          <tr><td>Position</td><td>${s.jobTitle||''}</td></tr>
        </table>
        <h4 style="color:var(--maroon);margin:12px 0 4px">Production earnings</h4>
        <table style="width:100%">
          ${state.products.map(p=>{
            const qty = byProduct[p.code]||0;
            const rate = (s.rates&&s.rates[p.code])||0;
            return `<tr><td>${p.label}</td><td>${fmt(qty)}</td><td>₱${fmt(rate)}</td><td>₱${fmt(qty*rate)}</td></tr>`;
          }).join('')}
          ${side>0?`<tr><td colspan="3">Side job / income share</td><td>₱${fmt(side)}</td></tr>`:''}
          <tr class="total-row"><td colspan="3">Gross Salary</td><td>₱${fmt(gross)}</td></tr>
        </table>
        <h4 style="color:var(--maroon);margin:12px 0 4px">Deductions</h4>
        <table style="width:100%">
          <tr><td>SSS</td><td>₱${fmt(sss)}</td></tr>
          <tr><td>PhilHealth</td><td>₱${fmt(phil)}</td></tr>
          <tr><td>Pag-IBIG</td><td>₱${fmt(pagibig)}</td></tr>
          <tr><td>Cash Advance (same-day)</td><td>₱${fmt(caTotal)}</td></tr>
          ${deductionRows.map(r=>`
            <tr><td>${r.label}</td><td>₱${fmt(r.pay)}</td></tr>
            <tr><td style="padding-left:16px;font-size:11px;color:#8a7a5a">→ remaining balance</td><td style="font-size:11px;color:#8a7a5a">₱${fmt(r.bal)}</td></tr>
          `).join('')}
          ${payByType.unlinked>0?`<tr><td>Other payment (unlinked)</td><td>₱${fmt(payByType.unlinked)}</td></tr>`:''}
          <tr><td>Cash Fund payout</td><td>₱${fmt(cashfund)}</td></tr>
          <tr class="total-row"><td>Total Deductions</td><td>₱${fmt(totalDeduction)}</td></tr>
        </table>
        <table style="width:100%">
          <tr class="total-row"><td>NET SALARY</td><td>₱${fmt(net)}</td></tr>
        </table>
        <div class="sub" style="margin-top:10px">Account: ${s.account||'—'} &nbsp;•&nbsp; Total remaining balance (all deductions): ₱${fmt(currentBalance)} &nbsp;•&nbsp; Generated ${new Date().toLocaleDateString()}</div>
      </div>
      <div class="foot-actions no-print">
        <button class="btn ghost" onclick="window.print()">Print / Save PDF</button>
        <button class="btn ghost" id="emailBtn">Email payslip</button>
        <button class="btn gold" id="pushFeedBtn">Send to HRIS feed</button>
      </div>
      <div id="feedStatus" class="msg info no-print" style="display:none;margin-top:10px"></div>
    </div>`;

    document.getElementById('emailBtn').onclick = ()=>{
      if(!s.email){
        alert(`No email on file for ${s.name}. Add one in the Staff & Rates tab (tap "Edit" next to their name), then try again.`);
        return;
      }
      const lines = [];
      lines.push(`CHOWTIME PRODUCTION — PAYSLIP`);
      lines.push(cutoffLabel(ck));
      lines.push('');
      lines.push(`Employee ID: ${s.idNumber||'—'}`);
      lines.push(`Name: ${s.name}`);
      lines.push(`Position: ${s.jobTitle||''}`);
      lines.push('');
      lines.push('PRODUCTION EARNINGS');
      state.products.forEach(p=>{
        const qty = byProduct[p.code]||0;
        const rate = (s.rates&&s.rates[p.code])||0;
        if(qty>0) lines.push(`  ${p.label}: ${fmt(qty)} x ₱${fmt(rate)} = ₱${fmt(qty*rate)}`);
      });
      if(side>0) lines.push(`  Side job / income share: ₱${fmt(side)}`);
      lines.push(`  Gross Salary: ₱${fmt(gross)}`);
      lines.push('');

      lines.push(`  SSS: ₱${fmt(sss)}`);
      lines.push(`  PhilHealth: ₱${fmt(phil)}`);
      lines.push(`  Pag-IBIG: ₱${fmt(pagibig)}`);

      deductionRows.forEach(r=>{

      });
      if(payByType.unlinked>0) lines.push(`  Other payment (unlinked): ₱${fmt(payByType.unlinked)}`);
      lines.push(`  Cash Fund payout: ₱${fmt(cashfund)}`);
      lines.push(`  Total Deductions: ₱${fmt(totalDeduction)}`);

      lines.push('');
      lines.push(`Account: ${s.account||'—'}`);

      lines.push('');

      const subject = `Chowtime Production Payslip — ${cutoffLabel(ck)}`;

/* Publishes a read-only summary to a NEW, isolated Firebase node so it never
   touches or overwrites anything the existing HRIS files (chowtime-payroll.html,
   chowtime-kiosk.html, chowtime-setup.html) already read or write. Nothing in
   those files needs to change for this to be safe — it only becomes "connected"
   the day you choose to add a small read-only lookup to the HRIS payroll page. */
function pushToHrisFeed(staffId, cutoffKey, payload){
  const statusEl = document.getElementById('feedStatus');
  statusEl.style.display='block';
  if(!USE_FIREBASE || !DB){
    statusEl.className='msg warn no-print';
    statusEl.textContent = 'Not connected to Firebase yet — go to Settings and paste your firebaseConfig first, then this figure can be sent to the shared database.';
    return;
  }
  DB.ref(`hrisProductionFeed/${cutoffKey}/${staffId}`).set(payload)
    .then(()=>{
      statusEl.className='msg info no-print';
      statusEl.textContent = `Sent — saved under hrisProductionFeed/${cutoffKey}/${staffId} in Firebase. This is a separate node; your existing HRIS payroll page is untouched unless you later add a lookup for it.`;
    })
    .catch(err=>{
      statusEl.className='msg err no-print';
      statusEl.textContent = 'Could not send: '+err.message;
    });
}

function exportCsv(){
  const rows = [['Date','Staff', ...state.products.map(p=>p.code+' (credited qty)'),'CA','Day Income']];
  Object.keys(state.production).sort().forEach(dISO=>{
    const day = state.production[dISO];
    activeStaffList().forEach(s=>{
      const credited = state.products.map(p=>creditedQtyForStaff(day, p.code, s.id).toFixed(2));
      const ca = (day.ca && day.ca[s.id]) || 0;
      const income = dailyIncomeForStaff(day, s.id);
      if(income===0 && ca===0) return; // skip staff with nothing recorded that day
      rows.push([dISO, s.name, ...credited, ca, income.toFixed(2)]);
    });
  });
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  downloadBlob(csv, 'chowtime_production_log.csv', 'text/csv');
}
function exportJson(){
  downloadBlob(JSON.stringify(state,null,2), 'chowtime_production_backup.json', 'application/json');
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
