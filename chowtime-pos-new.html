const EMOJI_LIST = ["🍗","🥩","🐟","🍖","🌭","🥟","🍝","🍚","🧋","🥤","🍌","🍳","🍱","🥗","🍜","🍛","🍲","🫔","🌮","🌯","🥪","🧆","🧇","🥞","🍔","🍟","🌽","🥕","🧅","🍄"];
const CAT_LIST = ["Bestsellers","Silog Meals","Rice Toppings","Merienda","Drinks","Add-ons","Specials"];

function MenuEditor({menuItems,setMenuItems,db,user,showT}){
  const [view,setView]         = useState("list");   // list | edit | additem
  const [editItem,setEditItem] = useState(null);
  const [filterCat,setFilter]  = useState("All");
  const [srch,setSrch]         = useState("");
  const [saving,setSaving]     = useState(false);

  // ── blank template for new item
  const blankItem = ()=>({
    id:"m"+Date.now(),
    name:"",basePrice:0,emoji:"🍗",cat:"Bestsellers",
    desc:"",avail:true,
    variants:[{id:"v"+Date.now(),label:"Regular",priceAdd:0}],
    options:[],promos:[]
  });

  const openEdit = (item)=>{ setEditItem(JSON.parse(JSON.stringify(item))); setView("edit"); };
  const openAdd  = ()=>{ setEditItem(blankItem()); setView("additem"); };

  const saveItem = async(item)=>{
    setSaving(true);
    const isNew = view==="additem";
    // Save to Firestore
    try{
      await setDoc(doc(db,"menu",item.id),{...item,updatedBy:user.name,updatedAt:serverTimestamp()});
    }catch(e){ console.warn("Menu save:",e); }
    // Update local state
    if(isNew){
      setMenuItems(p=>[...p,item]);
      showT(item.name+" added to menu ✓");
    } else {
      setMenuItems(p=>p.map(m=>m.id===item.id?item:m));
      showT(item.name+" updated ✓");
    }
    setSaving(false);
    setView("list");
    setEditItem(null);
  };

  const deleteItem = async(item)=>{
    if(!confirm("Delete "+item.name+"? This cannot be undone."))return;
    try{ await deleteDoc(doc(db,"menu",item.id)); }catch(e){}
    setMenuItems(p=>p.filter(m=>m.id!==item.id));
    showT(item.name+" deleted","warn");
    setView("list");setEditItem(null);
  };

  const toggleAvail = async(item)=>{
    const updated={...item,avail:!item.avail};
    try{ await updateDoc(doc(db,"menu",item.id),{avail:updated.avail,updatedBy:user.name}); }catch(e){}
    setMenuItems(p=>p.map(m=>m.id===item.id?updated:m));
    showT(item.name+" "+(updated.avail?"enabled ✓":"hidden 🚫"));
  };

  const filtered = menuItems
    .filter(i=>filterCat==="All"||i.cat===filterCat)
    .filter(i=>i.name.toLowerCase().includes(srch.toLowerCase()));

  // ── LIST VIEW ──
  if(view==="list") return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        h("h2",{style:{margin:0,fontSize:17,fontWeight:800}},"🍽️ Menu Management"),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},menuItems.length+" items · "+menuItems.filter(i=>i.avail).length+" active")
      ),
      h("div",{style:{display:"flex",gap:7}},
        h("div",{style:{position:"relative"}},
          h("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:C.muted}},"🔍"),
          h("input",{value:srch,onChange:e=>setSrch(e.target.value),placeholder:"Search...",
            style:{padding:"7px 9px 7px 26px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none",width:140}})
        ),
        h("button",{onClick:openAdd,
          style:{padding:"8px 16px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},
          "+ Add Item")
      )
    ),
    // Category filter tabs
    h("div",{style:{display:"flex",gap:0,borderBottom:"1px solid "+C.border,marginBottom:14,overflowX:"auto"}},
      ["All",...CAT_LIST].map(c=>h("button",{key:c,onClick:()=>setFilter(c),
        style:{padding:"8px 14px",border:"none",background:"transparent",
          color:filterCat===c?C.primary:C.muted,
          fontWeight:filterCat===c?700:400,fontSize:11,cursor:"pointer",
          borderBottom:`2px solid ${filterCat===c?C.primary:"transparent"}`,
          whiteSpace:"nowrap"}},
        c+" ("+(c==="All"?menuItems.length:menuItems.filter(i=>i.cat===c).length)+")"
      ))
    ),
    // Item cards grid
    filtered.length===0
      ?h("div",{style:{textAlign:"center",padding:"40px",color:C.muted}},
          h("div",{style:{fontSize:40,marginBottom:8}},"🍽️"),
          h("div",null,"No items found. "),
          h("button",{onClick:openAdd,style:{color:C.primary,background:"none",border:"none",cursor:"pointer",fontWeight:700,fontSize:12}},"+ Add your first item")
        )
      :h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:9}},
        filtered.map(item=>h("div",{key:item.id,
          style:{background:"#fff",borderRadius:12,border:`2px solid ${item.avail?C.border:"#eee"}`,
            overflow:"hidden",opacity:item.avail?1:.65,position:"relative"}},
          // Top: emoji + availability toggle
          h("div",{style:{height:80,background:item.avail?`${C.primary}0D`:"#f5f5f5",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,position:"relative"}},
            item.emoji,
            h("div",{style:{position:"absolute",top:7,right:7}},
              h("button",{onClick:()=>toggleAvail(item),
                style:{width:34,height:19,borderRadius:10,border:"none",
                  background:item.avail?C.success:"#ccc",
                  cursor:"pointer",position:"relative",transition:"all .2s"}},
                h("div",{style:{width:13,height:13,borderRadius:"50%",background:"#fff",
                  position:"absolute",top:3,transition:"all .2s",
                  left:item.avail?"calc(100% - 16px)":"3px",
                  boxShadow:"0 1px 3px rgba(0,0,0,.25)"}})
              )
            ),
            !item.avail&&h("div",{style:{position:"absolute",inset:0,background:"rgba(255,255,255,.5)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},"🚫")
          ),
          h("div",{style:{padding:"9px 11px"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}},
              h("div",{style:{fontWeight:800,fontSize:12,color:item.avail?C.text:"#999",flex:1,marginRight:4}},item.name),
              h("div",{style:{fontSize:13,fontWeight:900,color:item.avail?C.primary:"#bbb",flexShrink:0}},"₱"+item.basePrice)
            ),
            h("div",{style:{fontSize:8,color:C.muted,marginBottom:3}},item.cat),
            item.desc&&h("div",{style:{fontSize:9,color:C.muted,lineHeight:1.4,marginBottom:6,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.desc),
            // Badges
            h("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}},
              item.variants.length>0&&h("span",{style:{fontSize:8,padding:"2px 6px",background:"#E3F2FD",color:C.info,borderRadius:20,fontWeight:600}},item.variants.length+" sizes"),
              item.options.length>0&&h("span",{style:{fontSize:8,padding:"2px 6px",background:"#F3E5F5",color:"#6A1B9A",borderRadius:20,fontWeight:600}},item.options.length+" options"),
              item.promos.length>0&&h("span",{style:{fontSize:8,padding:"2px 6px",background:"#FFF0F0",color:C.primary,borderRadius:20,fontWeight:600}},"🔥 "+item.promos.length+" promo"),
            ),
            h("button",{onClick:()=>openEdit(item),
              style:{width:"100%",padding:"7px",background:C.bg,border:"1px solid "+C.border,
                borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",color:C.text}},
              "✏️ Edit Item")
          )
        ))
      )
  );

  // ── ITEM EDITOR (Edit or Add) ──
  if(view==="edit"||view==="additem"){
    const item = editItem;
    const isNew = view==="additem";
    const setField = (k,v)=>setEditItem(p=>({...p,[k]:v}));

    // Variant helpers
    const addVariant  = ()=>setEditItem(p=>({...p,variants:[...p.variants,{id:"v"+Date.now(),label:"",priceAdd:0}]}));
    const rmVariant   = (id)=>setEditItem(p=>({...p,variants:p.variants.filter(v=>v.id!==id)}));
    const setVariant  = (id,k,v)=>setEditItem(p=>({...p,variants:p.variants.map(vv=>vv.id===id?{...vv,[k]:v}:vv)}));

    // Option group helpers
    const addOptionGroup = ()=>setEditItem(p=>({...p,options:[...p.options,{id:"o"+Date.now(),label:"",required:false,multi:false,choices:[{id:"c"+Date.now(),label:"",priceAdd:0}]}]}));
    const rmOptionGroup  = (oid)=>setEditItem(p=>({...p,options:p.options.filter(o=>o.id!==oid)}));
    const setOpt         = (oid,k,v)=>setEditItem(p=>({...p,options:p.options.map(o=>o.id===oid?{...o,[k]:v}:o)}));
    const addChoice      = (oid)=>setEditItem(p=>({...p,options:p.options.map(o=>o.id===oid?{...o,choices:[...o.choices,{id:"c"+Date.now(),label:"",priceAdd:0}]}:o)}));
    const rmChoice       = (oid,cid)=>setEditItem(p=>({...p,options:p.options.map(o=>o.id===oid?{...o,choices:o.choices.filter(c=>c.id!==cid)}:o)}));
    const setChoice      = (oid,cid,k,v)=>setEditItem(p=>({...p,options:p.options.map(o=>o.id===oid?{...o,choices:o.choices.map(c=>c.id===cid?{...c,[k]:v}:c)}:o)}));

    // Promo helpers
    const addPromo  = ()=>setEditItem(p=>({...p,promos:[...p.promos,{id:"p"+Date.now(),label:"",discount:"bogo",tag:"BOGO",priceAdd:0}]}));
    const rmPromo   = (pid)=>setEditItem(p=>({...p,promos:p.promos.filter(pr=>pr.id!==pid)}));
    const setPromo  = (pid,k,v)=>setEditItem(p=>({...p,promos:p.promos.map(pr=>pr.id===pid?{...pr,[k]:v}:pr)}));

    const canSave = item.name.trim()&&item.basePrice>0;

    return h("div",null,
      // Header
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          h("button",{onClick:()=>{setView("list");setEditItem(null);},
            style:{padding:"6px 12px",background:C.bg,border:"1px solid "+C.border,borderRadius:7,fontSize:11,cursor:"pointer"}},"← Back"),
          h("h2",{style:{margin:0,fontSize:16,fontWeight:800}},isNew?"➕ Add New Item":"✏️ Edit — "+item.name)
        ),
        h("div",{style:{display:"flex",gap:7}},
          !isNew&&h("button",{onClick:()=>deleteItem(item),
            style:{padding:"8px 14px",background:"#FFEBEE",border:"1px solid #FFCDD2",borderRadius:8,color:C.danger,fontWeight:700,fontSize:12,cursor:"pointer"}},
            "🗑️ Delete"),
          h("button",{onClick:()=>saveItem(item),disabled:!canSave||saving,
            style:{padding:"8px 18px",background:canSave?`linear-gradient(135deg,${C.primary},${C.dark})`:"#ddd",
              border:"none",borderRadius:8,color:canSave?"#fff":"#999",fontWeight:700,fontSize:12,cursor:canSave?"pointer":"not-allowed"}},
            saving?"Saving...":"💾 Save Item")
        )
      ),

      h("div",{style:{display:"grid",gridTemplateColumns:"300px 1fr",gap:12,alignItems:"start"}},

        // LEFT COLUMN — basic info
        h("div",null,
          // Basic info card
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px",marginBottom:10}},
            h("div",{style:{fontWeight:800,fontSize:12,marginBottom:12,color:C.primary}},"📋 Basic Info"),

            // Emoji picker
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"EMOJI"),
              h("div",{style:{display:"flex",gap:6,alignItems:"center",marginBottom:6}},
                h("div",{style:{width:48,height:48,background:`${C.primary}10`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}},item.emoji),
                h("input",{value:item.emoji,onChange:e=>setField("emoji",e.target.value),
                  style:{width:60,padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:20,textAlign:"center",outline:"none"}})
              ),
              h("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
                EMOJI_LIST.map(e=>h("button",{key:e,onClick:()=>setField("emoji",e),
                  style:{width:30,height:30,border:`1px solid ${item.emoji===e?C.primary:C.border}`,
                    background:item.emoji===e?"#FFF0F0":"#fff",borderRadius:6,fontSize:16,cursor:"pointer"}},e))
              )
            ),

            // Name
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"ITEM NAME *"),
              h("input",{value:item.name,onChange:e=>setField("name",e.target.value),
                placeholder:"e.g. Chicken Fillet",
                style:{width:"100%",padding:"9px",border:`1px solid ${item.name?C.border:C.danger}`,borderRadius:7,fontSize:13,fontWeight:700,outline:"none",boxSizing:"border-box"}})
            ),

            // Base price
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"BASE PRICE (₱) *"),
              h("input",{type:"number",value:item.basePrice||"",onChange:e=>setField("basePrice",parseFloat(e.target.value)||0),
                placeholder:"0",
                style:{width:"100%",padding:"9px",border:`1px solid ${item.basePrice>0?C.border:C.danger}`,borderRadius:7,fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box",color:C.primary}})
            ),

            // Category
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"CATEGORY"),
              h("select",{value:item.cat,onChange:e=>setField("cat",e.target.value),
                style:{width:"100%",padding:"9px",border:"1px solid "+C.border,borderRadius:7,fontSize:12,outline:"none"}},
                CAT_LIST.map(c=>h("option",{key:c,value:c},c)))
            ),

            // Description
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"DESCRIPTION"),
              h("textarea",{value:item.desc,onChange:e=>setField("desc",e.target.value),
                placeholder:"Short description shown on menu...",
                style:{width:"100%",padding:"9px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none",resize:"none",height:60,boxSizing:"border-box",fontFamily:"inherit"}})
            ),

            // Availability toggle
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:C.bg,borderRadius:8}},
              h("div",null,
                h("div",{style:{fontSize:11,fontWeight:700}},"Available on POS"),
                h("div",{style:{fontSize:9,color:C.muted}},"Toggle to hide from ordering screen")
              ),
              h("button",{onClick:()=>setField("avail",!item.avail),
                style:{width:42,height:23,borderRadius:12,border:"none",
                  background:item.avail?C.success:"#ccc",cursor:"pointer",position:"relative"}},
                h("div",{style:{width:17,height:17,borderRadius:"50%",background:"#fff",
                  position:"absolute",top:3,transition:"all .2s",
                  left:item.avail?"calc(100% - 20px)":"3px",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}})
              )
            )
          ),

          // Preview card
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"14px"}},
            h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:10}},"PREVIEW"),
            h("div",{style:{background:`${C.primary}0D`,borderRadius:10,padding:"14px",textAlign:"center"}},
              h("div",{style:{fontSize:44,marginBottom:6}},item.emoji),
              h("div",{style:{fontWeight:800,fontSize:13}},item.name||"Item Name"),
              h("div",{style:{fontSize:11,color:C.muted,margin:"3px 0 6px"}},item.desc||"Description"),
              h("div",{style:{fontSize:17,fontWeight:900,color:C.primary}},"₱"+(item.basePrice||0)),
              h("div",{style:{fontSize:9,color:C.muted,marginTop:3}},item.cat)
            )
          )
        ),

        // RIGHT COLUMN — variants, options, promos
        h("div",null,

          // VARIANTS / SIZES
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px",marginBottom:10}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
              h("div",null,
                h("div",{style:{fontWeight:800,fontSize:12,color:C.info}},"📦 Sizes / Variants"),
                h("div",{style:{fontSize:9,color:C.muted,marginTop:1}},"e.g. Solo, +Drink, 1pc, 2pcs, Regular, Large")
              ),
              h("button",{onClick:addVariant,
                style:{padding:"5px 12px",background:"#E3F2FD",border:"none",borderRadius:7,color:C.info,fontWeight:700,fontSize:11,cursor:"pointer"}},
                "+ Add Size")
            ),
            item.variants.length===0&&h("div",{style:{textAlign:"center",padding:"12px",color:C.muted,fontSize:11,background:C.bg,borderRadius:7}},"No sizes yet — add at least one (e.g. Regular)"),
            item.variants.map((v,vi)=>h("div",{key:v.id,style:{display:"flex",gap:8,alignItems:"center",marginBottom:7,padding:"8px 10px",background:C.bg,borderRadius:8}},
              h("span",{style:{fontSize:9,color:C.muted,width:16}},vi+1+"."),
              h("input",{value:v.label,onChange:e=>setVariant(v.id,"label",e.target.value),
                placeholder:"Size name (e.g. Solo, +Drink)",
                style:{flex:2,padding:"7px 9px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none"}}),
              h("div",{style:{display:"flex",alignItems:"center",gap:4,flexShrink:0}},
                h("span",{style:{fontSize:11,color:C.muted}},"₱+"),
                h("input",{type:"number",value:v.priceAdd||"",onChange:e=>setVariant(v.id,"priceAdd",parseFloat(e.target.value)||0),
                  placeholder:"0",
                  style:{width:65,padding:"7px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none",textAlign:"center"}})
              ),
              h("input",{value:v.tag||"",onChange:e=>setVariant(v.id,"tag",e.target.value),
                placeholder:"Label (opt)",
                style:{width:70,padding:"7px",border:"1px solid "+C.border,borderRadius:6,fontSize:10,outline:"none"}}),
              h("button",{onClick:()=>rmVariant(v.id),
                style:{width:22,height:22,background:"#FFEBEE",border:"none",borderRadius:5,color:C.danger,cursor:"pointer",fontSize:13,flexShrink:0}},"×")
            ))
          ),

          // OPTIONS / ADD-ONS
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px",marginBottom:10}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
              h("div",null,
                h("div",{style:{fontWeight:800,fontSize:12,color:"#6A1B9A"}},"🎛️ Options / Add-ons"),
                h("div",{style:{fontSize:9,color:C.muted,marginTop:1}},"e.g. Flavor, Sauce, Add-ons, Cooking style")
              ),
              h("button",{onClick:addOptionGroup,
                style:{padding:"5px 12px",background:"#F3E5F5",border:"none",borderRadius:7,color:"#6A1B9A",fontWeight:700,fontSize:11,cursor:"pointer"}},
                "+ Add Option Group")
            ),
            item.options.length===0&&h("div",{style:{textAlign:"center",padding:"12px",color:C.muted,fontSize:11,background:C.bg,borderRadius:7}},"No options yet — add for flavor choices, sauces, etc."),
            item.options.map(opt=>h("div",{key:opt.id,style:{border:"1px solid #EDE7F6",borderRadius:9,padding:"12px",marginBottom:8}},
              // Option group header
              h("div",{style:{display:"flex",gap:7,alignItems:"center",marginBottom:10}},
                h("input",{value:opt.label,onChange:e=>setOpt(opt.id,"label",e.target.value),
                  placeholder:"Group name (e.g. Flavor, Sauce)",
                  style:{flex:1,padding:"7px 9px",border:"1px solid "+C.border,borderRadius:6,fontSize:12,fontWeight:700,outline:"none"}}),
                h("label",{style:{display:"flex",alignItems:"center",gap:4,fontSize:10,cursor:"pointer",flexShrink:0}},
                  h("input",{type:"checkbox",checked:opt.required,onChange:e=>setOpt(opt.id,"required",e.target.checked)}),
                  "Required"),
                h("label",{style:{display:"flex",alignItems:"center",gap:4,fontSize:10,cursor:"pointer",flexShrink:0}},
                  h("input",{type:"checkbox",checked:opt.multi,onChange:e=>setOpt(opt.id,"multi",e.target.checked)}),
                  "Multi-select"),
                h("button",{onClick:()=>rmOptionGroup(opt.id),
                  style:{width:22,height:22,background:"#FFEBEE",border:"none",borderRadius:5,color:C.danger,cursor:"pointer",fontSize:13,flexShrink:0}},"×")
              ),
              // Choices
              h("div",{style:{paddingLeft:8}},
                opt.choices.map((ch,ci)=>h("div",{key:ch.id,style:{display:"flex",gap:7,alignItems:"center",marginBottom:5}},
                  h("span",{style:{fontSize:9,color:C.muted,width:14}},ci+1+"."),
                  h("input",{value:ch.label,onChange:e=>setChoice(opt.id,ch.id,"label",e.target.value),
                    placeholder:"Choice (e.g. Spicy, BBQ)",
                    style:{flex:1,padding:"6px 8px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none"}}),
                  h("div",{style:{display:"flex",alignItems:"center",gap:3,flexShrink:0}},
                    h("span",{style:{fontSize:10,color:C.muted}},"₱+"),
                    h("input",{type:"number",value:ch.priceAdd||"",onChange:e=>setChoice(opt.id,ch.id,"priceAdd",parseFloat(e.target.value)||0),
                      placeholder:"0",
                      style:{width:55,padding:"6px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none",textAlign:"center"}})
                  ),
                  h("button",{onClick:()=>rmChoice(opt.id,ch.id),
                    style:{width:20,height:20,background:"#FFEBEE",border:"none",borderRadius:4,color:C.danger,cursor:"pointer",fontSize:11,flexShrink:0}},"×")
                )),
                h("button",{onClick:()=>addChoice(opt.id),
                  style:{padding:"4px 10px",background:C.bg,border:"1px dashed #CE93D8",borderRadius:6,color:"#6A1B9A",fontSize:10,cursor:"pointer",fontWeight:600,marginTop:3}},
                  "+ Add Choice")
              )
            ))
          ),

          // PROMOS / DEALS
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
              h("div",null,
                h("div",{style:{fontWeight:800,fontSize:12,color:"#FF4B2B"}},"🔥 Promos / Deals"),
                h("div",{style:{fontSize:9,color:C.muted,marginTop:1}},"e.g. BOGO, Meal Deal, Bundle")
              ),
              h("button",{onClick:addPromo,
                style:{padding:"5px 12px",background:"#FFF0F0",border:"none",borderRadius:7,color:"#FF4B2B",fontWeight:700,fontSize:11,cursor:"pointer"}},
                "+ Add Promo")
            ),
            item.promos.length===0&&h("div",{style:{textAlign:"center",padding:"12px",color:C.muted,fontSize:11,background:C.bg,borderRadius:7}},"No promos — add BOGO or bundle deals here"),
            item.promos.map(p=>h("div",{key:p.id,style:{border:"1px solid #FFCCBC",borderRadius:9,padding:"11px",marginBottom:7,background:"#FFF8F6"}},
              h("div",{style:{display:"flex",gap:7,marginBottom:7}},
                h("input",{value:p.label,onChange:e=>setPromo(p.id,"label",e.target.value),
                  placeholder:"Promo name (e.g. Buy 1 Get 1 Free)",
                  style:{flex:1,padding:"7px 9px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,fontWeight:700,outline:"none"}}),
                h("button",{onClick:()=>rmPromo(p.id),
                  style:{width:22,height:22,background:"#FFEBEE",border:"none",borderRadius:5,color:C.danger,cursor:"pointer",fontSize:13,flexShrink:0}},"×")
              ),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}},
                h("div",null,
                  h("div",{style:{fontSize:8,color:C.muted,marginBottom:3}},"TYPE"),
                  h("select",{value:p.discount,onChange:e=>setPromo(p.id,"discount",e.target.value),
                    style:{width:"100%",padding:"6px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none"}},
                    h("option",{value:"bogo"},"BOGO (Free item)"),
                    h("option",{value:"bundle"},"Bundle (+item)"),
                    h("option",{value:"discount"},"Discount %")
                  )
                ),
                h("div",null,
                  h("div",{style:{fontSize:8,color:C.muted,marginBottom:3}},"TAG LABEL"),
                  h("input",{value:p.tag,onChange:e=>setPromo(p.id,"tag",e.target.value),
                    placeholder:"e.g. BOGO",
                    style:{width:"100%",padding:"6px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none",boxSizing:"border-box"}})
                ),
                h("div",null,
                  h("div",{style:{fontSize:8,color:C.muted,marginBottom:3}},"ADD-ON PRICE (₱)"),
                  h("input",{type:"number",value:p.priceAdd||"",onChange:e=>setPromo(p.id,"priceAdd",parseFloat(e.target.value)||0),
                    placeholder:"0 = FREE",
                    style:{width:"100%",padding:"6px",border:"1px solid "+C.border,borderRadius:6,fontSize:11,outline:"none",boxSizing:"border-box"}})
                )
              )
            ))
          )
        )
      )
    );
  }

  return null;
}

// ─── BRANCH MENU PAGE (toggle + price override) ──────────
function BranchMenuPage({menuItems,setMenuItems,branchId,curBranch,user,db,showT}){
  const [overrides,setOverrides] = useState({}); // {itemId: {avail,price}}
  const [editPrice,setEditPrice] = useState(null); // itemId being edited
  const [tempPrice,setTempPrice] = useState("");
  const [saving,setSaving]       = useState(null);
  const [filterCat,setFilter]    = useState("All");

  // Load existing overrides for this branch
  useEffect(()=>{
    const q = query(collection(db,"menu_overrides"),where("branch","==",branchId));
    const unsub = onSnapshot(q, snap=>{
      const ov={};
      snap.docs.forEach(d=>{
        const data=d.data();
        ov[data.itemId]={avail:data.avail,price:data.price,docId:d.id};
      });
      setOverrides(ov);
    },()=>{});
    return()=>unsub();
  },[branchId]);

  const getPrice = (item)=> overrides[item.id]?.price ?? item.basePrice;
  const getAvail = (item)=> overrides[item.id]?.avail ?? item.avail ?? true;

  const saveOverride = async(item, fields)=>{
    setSaving(item.id);
    const existing = overrides[item.id]||{};
    const payload = {
      branch:branchId,
      branchName:curBranch.full,
      itemId:item.id,
      itemName:item.name,
      avail: fields.avail ?? existing.avail ?? true,
      price: fields.price ?? existing.price ?? null,
      updatedBy:user.name,
      updatedAt:serverTimestamp()
    };
    try{
      await setDoc(doc(db,"menu_overrides",branchId+"_"+item.id),payload);
      showT(item.name+" updated ✓");
    }catch(e){ showT("Save failed","err"); }
    setSaving(null);
  };

  const toggleAvail = async(item)=>{
    const newAvail = !getAvail(item);
    await saveOverride(item,{avail:newAvail});
    setOverrides(p=>({...p,[item.id]:{...p[item.id],avail:newAvail}}));
    showT(item.name+" "+(newAvail?"enabled ✓":"hidden 🚫"));
  };

  const savePrice = async(item)=>{
    const price = parseFloat(tempPrice);
    if(isNaN(price)||price<=0){showT("Invalid price","warn");return;}
    await saveOverride(item,{price});
    setOverrides(p=>({...p,[item.id]:{...p[item.id],price}}));
    setEditPrice(null);setTempPrice("");
  };

  const resetPrice = async(item)=>{
    await saveOverride(item,{price:null});
    setOverrides(p=>{const n={...p};if(n[item.id])delete n[item.id].price;return n;});
    showT(item.name+" price reset to default ✓");
    setEditPrice(null);setTempPrice("");
  };

  const cats = ["All",...new Set(menuItems.map(i=>i.cat))];
  const filtered = menuItems.filter(i=>filterCat==="All"||i.cat===filterCat);
  const overrideCount = Object.values(overrides).filter(o=>o.price!=null).length;
  const hiddenCount   = Object.values(overrides).filter(o=>o.avail===false).length;

  return h("div",null,
    h(SectionHeader,{title:"Branch Menu — "+curBranch.name}),

    // Info banner
    h("div",{style:{background:"#E3F2FD",border:"1px solid #90CAF9",borderRadius:10,
      padding:"10px 14px",marginBottom:13,fontSize:11,color:"#1565C0"}},
      "🍽️ Toggle items ON/OFF for this branch only. Set a different price if needed — other branches won't be affected."
    ),

    // Stats
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:13}},
      h(Stat,{label:"Total Items",value:menuItems.length,icon:"🍽️",color:C.primary}),
      h(Stat,{label:"Active",value:menuItems.filter(i=>getAvail(i)).length,icon:"✅",color:C.success}),
      h(Stat,{label:"Hidden",value:hiddenCount,icon:"🚫",color:C.muted}),
      h(Stat,{label:"Price Overrides",value:overrideCount,icon:"💰",color:C.warning})
    ),

    // Category tabs
    h("div",{style:{display:"flex",gap:0,borderBottom:"1px solid "+C.border,marginBottom:13,overflowX:"auto"}},
      cats.map(c=>h("button",{key:c,onClick:()=>setFilter(c),
        style:{padding:"7px 13px",border:"none",background:"transparent",
          color:filterCat===c?C.primary:C.muted,
          fontWeight:filterCat===c?700:400,fontSize:11,cursor:"pointer",
          borderBottom:`2px solid ${filterCat===c?C.primary:"transparent"}`,
          whiteSpace:"nowrap"}},
        c))
    ),

    // Item list
    h("div",{style:{display:"grid",gap:7}},
      filtered.map(item=>{
        const avail   = getAvail(item);
        const price   = getPrice(item);
        const hasOvr  = overrides[item.id]?.price!=null;
        const isEdit  = editPrice===item.id;
        const isSaving= saving===item.id;

        return h("div",{key:item.id,
          style:{background:"#fff",borderRadius:11,
            border:`2px solid ${avail?hasOvr?"#FF9500":C.border:"#eee"}`,
            opacity:avail?1:.6,transition:"all .2s",
            padding:"11px 14px",display:"flex",alignItems:"center",gap:12}},

          // Emoji
          h("div",{style:{width:44,height:44,borderRadius:10,
            background:avail?`${C.primary}10`:"#f5f5f5",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:24,flexShrink:0,position:"relative"}},
            item.emoji,
            !avail&&h("div",{style:{position:"absolute",inset:0,background:"rgba(255,255,255,.6)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🚫")
          ),

          // Info
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontWeight:700,fontSize:12,color:avail?C.text:C.muted}},item.name),
            h("div",{style:{fontSize:8,color:C.muted,marginTop:1}},item.cat),
            // Price display
            h("div",{style:{display:"flex",alignItems:"center",gap:7,marginTop:4}},
              h("div",{style:{fontSize:13,fontWeight:900,
                color:hasOvr?C.warning:avail?C.primary:C.muted}},
                "₱"+price.toFixed(2)),
              hasOvr&&h("div",{style:{fontSize:9,color:C.muted,textDecoration:"line-through"}},
                "₱"+item.basePrice.toFixed(2)),
              hasOvr&&h("span",{style:{fontSize:8,padding:"1px 6px",background:"#FFF8E1",
                color:C.warning,borderRadius:10,fontWeight:700,border:"1px solid #FFE082"}},
                "BRANCH PRICE")
            )
          ),

          // Price override controls
          h("div",{style:{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}},
            // Edit price section
            isEdit
              ?h("div",{style:{display:"flex",gap:5,alignItems:"center"}},
                  h("span",{style:{fontSize:11,color:C.muted}},"₱"),
                  h("input",{
                    type:"number",
                    value:tempPrice,
                    onChange:e=>setTempPrice(e.target.value),
                    autoFocus:true,
                    onKeyDown:e=>{if(e.key==="Enter")savePrice(item);if(e.key==="Escape"){setEditPrice(null);setTempPrice("");}},
                    placeholder:item.basePrice,
                    style:{width:70,padding:"5px 8px",border:"2px solid "+C.warning,
                      borderRadius:7,fontSize:13,fontWeight:700,outline:"none",textAlign:"center"}
                  }),
                  h("button",{onClick:()=>savePrice(item),
                    style:{padding:"5px 9px",background:C.warning,border:"none",
                      borderRadius:6,color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}},
                    "✓"),
                  hasOvr&&h("button",{onClick:()=>resetPrice(item),
                    style:{padding:"5px 9px",background:"#f5f5f5",border:"1px solid #ddd",
                      borderRadius:6,color:C.muted,fontSize:10,cursor:"pointer"}},
                    "Reset"),
                  h("button",{onClick:()=>{setEditPrice(null);setTempPrice("");},
                    style:{padding:"5px 8px",background:"none",border:"none",
                      color:C.muted,fontSize:13,cursor:"pointer"}},
                    "×")
                )
              :h("button",{
                  onClick:()=>{setEditPrice(item.id);setTempPrice(price.toString());},
                  style:{padding:"4px 10px",background:hasOvr?"#FFF8E1":"#f5f5f5",
                    border:`1px solid ${hasOvr?C.warning:C.border}`,
                    borderRadius:6,color:hasOvr?C.warning:C.muted,
                    fontSize:10,fontWeight:hasOvr?700:400,cursor:"pointer"}},
                  hasOvr?"✏️ ₱"+price.toFixed(2):"Set Price"),

            // Toggle switch
            h("div",{style:{display:"flex",alignItems:"center",gap:6}},
              h("button",{onClick:()=>toggleAvail(item),disabled:isSaving,
                style:{width:38,height:21,borderRadius:11,border:"none",
                  background:avail?C.success:"#ccc",
                  cursor:"pointer",position:"relative",transition:"all .2s",flexShrink:0}},
                h("div",{style:{width:15,height:15,borderRadius:"50%",background:"#fff",
                  position:"absolute",top:3,transition:"all .2s",
                  left:avail?"calc(100% - 18px)":"3px",
                  boxShadow:"0 1px 3px rgba(0,0,0,.3)"}})
              ),
              h("span",{style:{fontSize:9,color:avail?C.success:C.muted,fontWeight:700,minWidth:22}},
                avail?"ON":"OFF")
            )
          )
        );
      })
    )
  );
}

// ─── BOM MANAGER COMPONENT ───────────────────────────────
const UNITS = ["pc","pack","box","sack","kg","g","L","mL","cup","gal","tray","dozen","set","sheet","bottle","can","bag"];

function BOMPage({menuItems,db,user,showT}){
  const [boms,setBoms]         = useState({}); // {menuItemId: [{ingId,ingName,qty,unit}]}
  const [ingredients,setIngs]  = useState([]); // master ingredient list
  const [view,setView]         = useState("list"); // list | edit_bom | edit_ing
  const [selItem,setSelItem]   = useState(null); // menu item being edited
  const [editBom,setEditBom]   = useState([]); // current BOM rows
  const [ingModal,setIngModal] = useState(false);
  const [newIng,setNewIng]     = useState({name:"",unit:"pc",cat:"Frozen",cost:0,minStock:0});
  const [srch,setSrch]         = useState("");
  const [saving,setSaving]     = useState(false);

  // Load BOM from Firestore
  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"bom"), snap=>{
      const data={};
      snap.docs.forEach(d=>{ data[d.id]=d.data().items||[]; });
      setBoms(data);
    },()=>{});
    return()=>unsub();
  },[]);

  // Load master ingredients
  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"ingredients"), snap=>{
      if(!snap.empty)
        setIngs(snap.docs.map(d=>({...d.data(),id:d.id})));
      else
        setIngs(INIT_INVENTORY.map(i=>({...i,cost:i.cost||0})));
    },()=>{ setIngs(INIT_INVENTORY.map(i=>({...i,cost:i.cost||0}))); });
    return()=>unsub();
  },[]);

  const openBOM = (item)=>{
    setSelItem(item);
    setEditBom(boms[item.id]||[]);
    setView("edit_bom");
  };

  const saveBOM = async()=>{
    if(!selItem)return;
    setSaving(true);
    try{
      await setDoc(doc(db,"bom",selItem.id),{
        menuItemId:selItem.id,
        menuItemName:selItem.name,
        items:editBom,
        updatedBy:user.name,
        updatedAt:serverTimestamp()
      });
      showT(selItem.name+" BOM saved ✓");
      setView("list");
    }catch(e){showT("Save failed","err");}
    setSaving(false);
  };

  const addIngRow = ()=>setEditBom(p=>[...p,{ingId:"",ingName:"",qty:1,unit:"pc"}]);
  const removeRow = (i)=>setEditBom(p=>p.filter((_,idx)=>idx!==i));
  const setRow = (i,k,v)=>setEditBom(p=>p.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const pickIng = (rowIdx,ing)=>{
    setEditBom(p=>p.map((r,i)=>i===rowIdx?{...r,ingId:ing.id,ingName:ing.name,unit:ing.unit}:r));
  };

  const saveIngredient = async()=>{
    if(!newIng.name){showT("Enter ingredient name","warn");return;}
    const id = "ing_"+Date.now();
    const ing = {...newIng,id,stock:0};
    try{
      await setDoc(doc(db,"ingredients",id),{...ing,createdBy:user.name,createdAt:serverTimestamp()});
      showT(newIng.name+" added ✓");
      setNewIng({name:"",unit:"pc",cat:"Frozen",cost:0,minStock:0});
      setIngModal(false);
    }catch(e){showT("Error saving","err");}
  };

  const filteredMenu = menuItems.filter(i=>i.name.toLowerCase().includes(srch.toLowerCase()));
  const hasBOM = (item)=> boms[item.id]&&boms[item.id].length>0;

  // ── LIST VIEW ──
  if(view==="list") return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        h("h2",{style:{margin:0,fontSize:17,fontWeight:800}},"🧪 Bill of Materials"),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},
          menuItems.filter(i=>hasBOM(i)).length+"/"+menuItems.length+" items have BOM")
      ),
      h("div",{style:{display:"flex",gap:7}},
        h("button",{onClick:()=>setIngModal(true),
          style:{padding:"8px 14px",background:"#fff",border:"1px solid "+C.border,
            borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}},"⚗️ Manage Ingredients"),
        h("div",{style:{position:"relative"}},
          h("input",{value:srch,onChange:e=>setSrch(e.target.value),
            placeholder:"Search menu...",
            style:{padding:"8px 12px 8px 30px",border:"1px solid "+C.border,
              borderRadius:8,fontSize:11,outline:"none",width:160}}),
          h("span",{style:{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",
            fontSize:12,color:C.muted}},"🔍")
        )
      )
    ),

    // Info banner
    h("div",{style:{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:10,
      padding:"10px 14px",marginBottom:13,fontSize:11,color:"#1B5E20"}},
      "🧪 Set the ingredients (BOM) per menu item. Every order will automatically deduct from branch inventory based on BOM quantities."
    ),

    // Menu items grid
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}},
      filteredMenu.map(item=>{
        const itemBOM = boms[item.id]||[];
        const hasB = itemBOM.length>0;
        return h("div",{key:item.id,
          style:{background:"#fff",borderRadius:11,
            border:`2px solid ${hasB?C.success:C.border}`,
            overflow:"hidden"}},
          h("div",{style:{height:70,background:hasB?"#E8F5E9":`${C.primary}0D`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:36,position:"relative"}},
            item.emoji,
            hasB&&h("div",{style:{position:"absolute",top:6,right:8,
              background:C.success,color:"#fff",fontSize:8,fontWeight:700,
              padding:"2px 6px",borderRadius:10}},
              itemBOM.length+" ing.")
          ),
          h("div",{style:{padding:"10px 12px"}},
            h("div",{style:{fontWeight:800,fontSize:12,marginBottom:3}},item.name),
            h("div",{style:{fontSize:10,color:C.primary,fontWeight:700,marginBottom:6}},
              "₱"+item.basePrice),
            hasB
              ?h("div",{style:{marginBottom:8}},
                itemBOM.slice(0,3).map((r,i)=>h("div",{key:i,
                  style:{fontSize:9,color:C.muted,display:"flex",gap:4,marginBottom:2}},
                  h("span",{style:{color:C.text,fontWeight:600}},r.qty+" "+r.unit),
                  r.ingName
                )),
                itemBOM.length>3&&h("div",{style:{fontSize:9,color:C.muted}},
                  "+"+(itemBOM.length-3)+" more ingredients")
              )
              :h("div",{style:{fontSize:10,color:C.muted,marginBottom:8,
                  background:"#FFF8E1",borderRadius:7,padding:"5px 8px"}},
                "⚠️ No BOM set yet"),
            h("button",{onClick:()=>openBOM(item),
              style:{width:"100%",padding:"7px",
                background:hasB?C.bg:`linear-gradient(135deg,${C.primary},${C.dark})`,
                border:hasB?"1px solid "+C.border:"none",
                borderRadius:7,color:hasB?C.text:"#fff",
                fontSize:11,fontWeight:700,cursor:"pointer"}},
              hasB?"✏️ Edit BOM":"+ Set BOM")
          )
        );
      })
    ),

    // Ingredient modal
    ingModal&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:900}},
      h("div",{style:{background:"#fff",width:500,borderRadius:16,padding:"22px",
        boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"80vh",display:"flex",flexDirection:"column"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:14}},
          h("b",{style:{fontSize:14}},"⚗️ Master Ingredients"),
          h("button",{onClick:()=>setIngModal(false),
            style:{background:"none",border:"none",fontSize:20,cursor:"pointer"}},"×")
        ),
        // Add new ingredient
        h("div",{style:{background:"#F5F5F7",borderRadius:10,padding:"12px",marginBottom:12}},
          h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:1}},
            "ADD NEW INGREDIENT"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 80px 80px",gap:7,marginBottom:7}},
            h("input",{value:newIng.name,onChange:e=>setNewIng(p=>({...p,name:e.target.value})),
              placeholder:"Ingredient name (e.g. C. Fillet)",
              style:{padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:12,outline:"none"}}),
            h("select",{value:newIng.unit,onChange:e=>setNewIng(p=>({...p,unit:e.target.value})),
              style:{padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}},
              UNITS.map(u=>h("option",{key:u,value:u},u))),
            h("input",{type:"number",value:newIng.cost||"",
              onChange:e=>setNewIng(p=>({...p,cost:parseFloat(e.target.value)||0})),
              placeholder:"Cost ₱",
              style:{padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:12,outline:"none"}})
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}},
            h("select",{value:newIng.cat,onChange:e=>setNewIng(p=>({...p,cat:e.target.value})),
              style:{padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}},

              onChange:e=>setNewIng(p=>({...p,minStock:parseInt(e.target.value)||0})),

            style:{width:"100%",padding:"9px",
              background:`linear-gradient(135deg,${C.primary},${C.dark})`,
              border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},
            "+ Add Ingredient")
        ),
        // Existing ingredients list
        h("div",{style:{flex:1,overflowY:"auto"}},
          h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:1}},
            "EXISTING INGREDIENTS ("+ingredients.length+")"),
          ingredients.map(ing=>h("div",{key:ing.id,
            style:{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
              borderRadius:8,border:"1px solid "+C.border,marginBottom:5,background:"#fafafa"}},
            h("div",{style:{width:32,height:32,borderRadius:8,background:`${C.primary}15`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:11,fontWeight:800,color:C.primary,flexShrink:0}},

              "Stock: "+(ing.stock||0)+" "+ing.unit)
          ))
        )
      )
    )
  );

  // ── BOM EDITOR ──
  if(view==="edit_bom") return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("button",{onClick:()=>setView("list"),
          style:{padding:"6px 12px",background:C.bg,border:"1px solid "+C.border,
            borderRadius:7,fontSize:11,cursor:"pointer"}},"← Back"),
        h("div",null,
          h("h2",{style:{margin:0,fontSize:16,fontWeight:800}},
            selItem?.emoji+" "+selItem?.name+" — BOM"),
          h("div",{style:{fontSize:10,color:C.muted,marginTop:1}},
            "Base Price: ₱"+selItem?.basePrice+" · Set ingredients needed per 1 serving")
        )
      ),
      h("button",{onClick:saveBOM,disabled:saving,
        style:{padding:"9px 20px",
          background:`linear-gradient(135deg,${C.primary},${C.dark})`,
          border:"none",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,
          cursor:"pointer"}},
        saving?"Saving...":"💾 Save BOM")
    ),

    // BOM rows
    h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,
      overflow:"hidden",marginBottom:10}},
      // Header
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 80px 100px 36px",
        padding:"8px 14px",background:"#f9f9f9",borderBottom:"1px solid #eee"}},
        ["Ingredient","Qty","Unit",""].map(h2=>h("div",{key:h2,
          style:{fontSize:8,fontWeight:700,color:C.muted,textTransform:"uppercase"}},h2))
      ),
      // Rows
      editBom.length===0&&h("div",{style:{textAlign:"center",padding:"24px",color:C.muted,fontSize:12}},
        "No ingredients yet — click '+ Add Ingredient' below"
      ),
      editBom.map((row,i)=>h("div",{key:i,
        style:{display:"grid",gridTemplateColumns:"1fr 80px 100px 36px",
          padding:"8px 14px",borderBottom:"1px solid #f5f5f5",alignItems:"center",gap:8}},
        // Ingredient selector
        h("div",{style:{position:"relative"}},
          h("select",{
            value:row.ingId,
            onChange:e=>{
              const ing = ingredients.find(x=>x.id===e.target.value);
              if(ing) pickIng(i,ing);
              else setRow(i,"ingId",e.target.value);
            },
            style:{width:"100%",padding:"7px 9px",border:"1px solid "+C.border,
              borderRadius:7,fontSize:11,outline:"none",
              color:row.ingId?C.text:C.muted}},
            h("option",{value:""},"— Select ingredient —"),
            ingredients.map(ing=>h("option",{key:ing.id,value:ing.id},ing.name+" ("+ing.unit+")"))
          )
        ),
        // Qty
        h("input",{type:"number",min:0,step:"0.001",value:row.qty,
          onChange:e=>setRow(i,"qty",parseFloat(e.target.value)||0),
          style:{padding:"7px",border:"1px solid "+C.border,borderRadius:7,
            fontSize:12,fontWeight:700,outline:"none",textAlign:"center",width:"100%",boxSizing:"border-box"}}),
        // Unit
        h("select",{value:row.unit,onChange:e=>setRow(i,"unit",e.target.value),
          style:{padding:"7px",border:"1px solid "+C.border,borderRadius:7,
            fontSize:11,outline:"none",width:"100%"}},
          UNITS.map(u=>h("option",{key:u,value:u},u))
        ),
        // Remove
        h("button",{onClick:()=>removeRow(i),
          style:{width:28,height:28,background:"#FFEBEE",border:"none",
            borderRadius:6,color:C.danger,cursor:"pointer",fontSize:14,fontWeight:700}},
          "×")
      )),
      // Add row button
      h("div",{style:{padding:"10px 14px"}},
        h("button",{onClick:addIngRow,
          style:{width:"100%",padding:"9px",background:C.bg,
            border:"1px dashed "+C.border,borderRadius:8,
            color:C.primary,fontWeight:700,fontSize:12,cursor:"pointer"}},
          "+ Add Ingredient Row")
      )
    ),

    // Cost summary
    editBom.length>0&&h("div",{style:{background:"#fff",borderRadius:12,
      border:"1px solid "+C.border,padding:"14px 16px"}},
      h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,marginBottom:10,letterSpacing:1}},
        "COST SUMMARY"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}},
        h("div",{style:{background:"#F5F5F7",borderRadius:9,padding:"10px 13px"}},
          h("div",{style:{fontSize:9,color:C.muted}},"INGREDIENT COST"),
          h("div",{style:{fontSize:16,fontWeight:900,color:C.text}},
            "₱"+editBom.reduce((s,r)=>{
              const ing=ingredients.find(x=>x.id===r.ingId);
              return s+(ing?ing.cost*(r.qty||0):0);
            },0).toFixed(2))
        ),
        h("div",{style:{background:"#E8F5E9",borderRadius:9,padding:"10px 13px"}},
          h("div",{style:{fontSize:9,color:C.muted}},"SELLING PRICE"),
          h("div",{style:{fontSize:16,fontWeight:900,color:C.success}},"₱"+(selItem?.basePrice||0).toFixed(2))
        ),
        h("div",{style:{background:"#FFF0F0",borderRadius:9,padding:"10px 13px"}},
          h("div",{style:{fontSize:9,color:C.muted}},"GROSS MARGIN"),
          h("div",{style:{fontSize:16,fontWeight:900,color:C.primary}},
            (()=>{
              const cost=editBom.reduce((s,r)=>{
                const ing=ingredients.find(x=>x.id===r.ingId);
                return s+(ing?ing.cost*(r.qty||0):0);
              },0);
              const price=selItem?.basePrice||0;
              return price>0?((price-cost)/price*100).toFixed(1)+"%":"—";
            })()
          )
        )
      )
    )
  );

  return null;
}

function BranchSettingsPage({branchId,curBranch,user,db,showT}){
  const [perms,setPerms]   = useState({});
  const [saving,setSaving] = useState(false);
  const [activeTab,setTab] = useState("cashier");

  // Load saved permissions for this branch
  useEffect(()=>{
    const unsub = onSnapshot(doc(db,"branch_settings",branchId), snap=>{
      if(snap.exists()) setPerms(snap.data().permissions||{});
      else {
        // Default — all enabled
        const def={};
        Object.entries(FEATURE_DEFS).forEach(([role,feats])=>{
          def[role]={};
          feats.forEach(f=>{ def[role][f.key]=true; });
        });
        setPerms(def);
      }
    },()=>{});
    return()=>unsub();
  },[branchId]);

  const toggle = (role,key)=>{
    setPerms(p=>({
      ...p,
      [role]:{...(p[role]||{}), [key]:!(p[role]?.[key]??true)}
    }));
  };

  const save = async()=>{
    setSaving(true);
    try{
      await setDoc(doc(db,"branch_settings",branchId),{
        branchId, branchName:curBranch.full,
        permissions:perms,
        updatedBy:user.name,
        updatedAt:serverTimestamp()
      });
      showT("Access settings saved ✓");
    }catch(e){showT("Save failed","err");}
    setSaving(false);
  };

  const roleColors = {cashier:"#34C759",crew:"#FF9500",stockclerk:"#AF52DE"};
  const roleLabels = {cashier:"💳 Cashier",crew:"👨‍🍳 Crew",stockclerk:"📦 Stock Clerk"};

  return h("div",null,
    h(SectionHeader,{title:"🛡️ Access Control — "+curBranch.name,
      action:save,actionLabel:saving?"Saving...":"💾 Save Settings"}),

    h("div",{style:{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:10,
      padding:"10px 14px",marginBottom:14,fontSize:11,color:"#1B5E20"}},
      "🛡️ Control which features each role can access in this branch. Manager always has full access. Changes take effect after staff re-login."
    ),

    // Role tabs
    h("div",{style:{display:"flex",gap:0,borderBottom:"2px solid "+C.border,marginBottom:14}},
      Object.keys(FEATURE_DEFS).map(role=>h("button",{key:role,onClick:()=>setTab(role),
        style:{padding:"10px 20px",border:"none",background:"transparent",
          color:activeTab===role?roleColors[role]:C.muted,
          fontWeight:activeTab===role?800:400,fontSize:12,cursor:"pointer",
          borderBottom:`3px solid ${activeTab===role?roleColors[role]:"transparent"}`,
          marginBottom:-2}},
        roleLabels[role]))
    ),

    // Feature toggles for active role
    h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
      h("div",{style:{padding:"12px 16px",background:roleColors[activeTab]+"18",
        borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("div",{style:{fontWeight:800,fontSize:13,color:roleColors[activeTab]}},roleLabels[activeTab]),
          h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},
            "Toggle features ON/OFF for this role in "+curBranch.name)
        ),
        h("div",{style:{fontSize:10,color:C.muted}},
          (FEATURE_DEFS[activeTab]||[]).filter(f=>!f.always&&(perms[activeTab]?.[f.key]??true)).length+
          "/"+(FEATURE_DEFS[activeTab]||[]).filter(f=>!f.always).length+" features enabled")
      ),
      (FEATURE_DEFS[activeTab]||[]).map(feat=>h("div",{key:feat.key,
        style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
          borderBottom:"1px solid #f5f5f5",
          background:feat.always?"#FAFFFE":"#fff"}},
        h("div",{style:{width:38,height:38,borderRadius:10,
          background:(perms[activeTab]?.[feat.key]??true)?roleColors[activeTab]+"18":"#f5f5f5",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},
          feat.icon),
        h("div",{style:{flex:1}},
          h("div",{style:{fontSize:12,fontWeight:700,
            color:(perms[activeTab]?.[feat.key]??true)?C.text:C.muted}},feat.label),
          h("div",{style:{fontSize:9,color:C.muted,marginTop:2}},
            feat.always?"Always enabled — cannot be disabled":
            (perms[activeTab]?.[feat.key]??true)?"✅ Enabled for this branch":"🚫 Disabled for this branch")
        ),
        feat.always
          ?h("div",{style:{fontSize:10,fontWeight:700,color:C.success,
              background:"#E8F5E9",padding:"4px 10px",borderRadius:20}},"ALWAYS ON")
          :h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
            h("button",{onClick:()=>toggle(activeTab,feat.key),
              style:{width:46,height:25,borderRadius:13,border:"none",
                background:(perms[activeTab]?.[feat.key]??true)?roleColors[activeTab]:"#ddd",
                cursor:"pointer",position:"relative",transition:"all .2s"}},
              h("div",{style:{width:19,height:19,borderRadius:"50%",background:"#fff",
                position:"absolute",top:3,transition:"all .2s",
                left:(perms[activeTab]?.[feat.key]??true)?"calc(100% - 22px)":"3px",
                boxShadow:"0 1px 4px rgba(0,0,0,.3)"}})
            ),
            h("div",{style:{fontSize:8,fontWeight:700,
              color:(perms[activeTab]?.[feat.key]??true)?roleColors[activeTab]:C.muted}},
              (perms[activeTab]?.[feat.key]??true)?"ON":"OFF")
          )
      ))
    ),

    // Manager note
    h("div",{style:{background:"#E3F2FD",border:"1px solid #90CAF9",borderRadius:10,
      padding:"10px 14px",marginTop:12,fontSize:11,color:"#1565C0"}},
      "👔 Manager role always has FULL ACCESS to all branch features. Cannot be restricted."
    )
  );
}

// ─── VOID REQUEST (Cashier submits, Manager approves) ─────
function VoidRequestPage({user,branchId,curBranch,db,orders,showT,isManager=false}){
  const [voidRequests,setVoidReqs] = useState([]);
  const [selOrder,setSelOrder]     = useState(null);
  const [selItems,setSelItems]     = useState({}); // {itemIdx: true/false}
  const [reason,setReason]         = useState("");
  const [submitting,setSubmitting] = useState(false);
  const [tab,setTab]               = useState(isManager?"pending":"new");

  useEffect(()=>{
    const q = query(
      collection(db,"void_requests"),
      where("branch","==",branchId),
      orderBy("timestamp","desc"),
      limit(50)
    );
    const unsub = onSnapshot(q,snap=>{
      setVoidReqs(snap.docs.map(d=>({...d.data(),_docId:d.id})));
    },()=>{});
    return()=>unsub();
  },[branchId]);

  const submitVoid = async()=>{
    if(!selOrder){showT("Select an order to void","warn");return;}
    if(!reason.trim()){showT("Enter reason for void","warn");return;}
    const voidedItems = (selOrder.items||[]).filter((_,i)=>selItems[i]!==false);
    if(!voidedItems.length){showT("Select at least 1 item to void","warn");return;}
    const isPartial = voidedItems.length < (selOrder.items||[]).length;
    const voidAmt = voidedItems.reduce((s,i)=>(s+(i.price||0)*(i.qty||1)),0);
    setSubmitting(true);
    try{
      await addDoc(collection(db,"void_requests"),{
        branch:branchId,
        branchName:curBranch.full,
        orderId:selOrder.id,
        orderTotal:selOrder.total,
        voidAmount:voidAmt,
        orderItems:selOrder.items,
        voidedItems,
        isPartial,
        requestedBy:user.name,
        reason,
        status:"pending",
        timestamp:serverTimestamp(),
        date:new Date().toISOString().slice(0,10)
      });
      showT((isPartial?"Partial":"Full")+" void request submitted ✓");
      setSelOrder(null);setSelItems({});setReason("");setTab("history");
    }catch(e){showT("Error submitting","err");}
    setSubmitting(false);
  };

  // When order selected, default all items to voided
  useEffect(()=>{
    if(selOrder){
      const all={};
      (selOrder.items||[]).forEach((_,i)=>{ all[i]=true; });
      setSelItems(all);
    }
  },[selOrder?.id]);

  const voidedItems = selOrder?(selOrder.items||[]).filter((_,i)=>selItems[i]!==false):[];
  const voidAmt = voidedItems.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);

  const approveVoid = async(req)=>{
    try{
      await updateDoc(doc(db,"void_requests",req._docId),{
        status:"approved",
        approvedBy:user.name,
        approvedAt:serverTimestamp()
      });

      if(req.isPartial){
        // Partial void — deduct void amount from order total, mark partial
        const order = orders.find(o=>o.id===req.orderId);
        const newTotal = (order?.total||0) - (req.voidAmount||0);
        await updateDoc(doc(db,"orders",req.orderId),{
          status:"partial-void",
          total:Math.max(0,newTotal),
          voidedItems:req.voidedItems,
          voidedBy:user.name,
          voidReason:req.reason,
          voidedAt:serverTimestamp()
        });
      } else {
        // Full void
        await updateDoc(doc(db,"orders",req.orderId),{
          status:"void",
          voidedBy:user.name,
          voidReason:req.reason,
          voidedAt:serverTimestamp()
        });
      }

      // BOM Restock — return ingredients to branch inventory
      const invCol = "inventory_"+req.branch;
      for(const item of (req.voidedItems||req.orderItems||[])){
        try{
          const bomSnap = await getDocs(query(collection(db,"bom"),where("menuItemId","==",item.id)));
          if(!bomSnap.empty){
            const bomItems = bomSnap.docs[0].data().items||[];
            for(const bRow of bomItems){
              if(!bRow.ingId) continue;
              const restoreQty = (bRow.qty||0)*(item.qty||1);
              try{
                await updateDoc(doc(db,invCol,bRow.ingId),{
                  stock:increment(restoreQty),
                  lastUpdated:serverTimestamp()
                });
              }catch(e){}
            }
          }
        }catch(e){}
      }

      showT((req.isPartial?"Partial void":"Order #"+req.orderId+" voided")+" ✓ Inventory restocked");
    }catch(e){showT("Error approving void","err");console.error(e);}
  };

  const rejectVoid = async(req)=>{
    await updateDoc(doc(db,"void_requests",req._docId),{
      status:"rejected",
      rejectedBy:user.name,
      rejectedAt:serverTimestamp()
    });
    showT("Void request rejected");
  };

  // Today's non-voided orders for this branch
  const today = new Date().toISOString().slice(0,10);
  const todayOrders = orders.filter(o=>
    o.branch===branchId &&
    o.status!=="void" && o.status!=="cancelled" &&
    (o.timestamp?.toDate?.()?.toISOString()||"").slice(0,10)===today
  );
  const pending = voidRequests.filter(r=>r.status==="pending");

  return h("div",null,
    h(SectionHeader,{title:"🚫 "+(isManager?"Void Requests — "+curBranch.name:"Request Void Transaction")}),

    // Pending alert for manager
    isManager&&pending.length>0&&h("div",{style:{background:"#FFEBEE",border:"1px solid #FFCDD2",
      borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:11,
      color:C.danger,fontWeight:700}},
      "⚠️ "+pending.length+" void request"+(pending.length>1?"s":"")+" pending your approval!"
    ),

    // Tabs
    h("div",{style:{display:"flex",gap:0,borderBottom:"2px solid "+C.border,marginBottom:14}},
      (isManager
        ?[["pending","⏳ Pending ("+pending.length+")"],["history","📋 History"]]
        :[["new","🚫 New Request"],["history","📋 My Requests"]]
      ).map(([t,l])=>h("button",{key:t,onClick:()=>setTab(t),
        style:{padding:"9px 18px",border:"none",background:"transparent",
          color:tab===t?C.danger:C.muted,fontWeight:tab===t?800:400,
          fontSize:12,cursor:"pointer",
          borderBottom:`3px solid ${tab===t?C.danger:"transparent"}`,marginBottom:-2}},l))
    ),

    // NEW VOID REQUEST (cashier)
    !isManager&&tab==="new"&&h("div",null,
      h("div",{style:{background:"#FFEBEE",border:"1px solid #FFCDD2",borderRadius:10,
        padding:"10px 14px",marginBottom:14,fontSize:11,color:"#C62828"}},
        "⚠️ Void requests need manager approval before the transaction is cancelled."
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        // Left: select order
        h("div",null,
          h("div",{style:{fontWeight:700,fontSize:12,marginBottom:8,color:C.danger}},"Select Order to Void"),
          todayOrders.length===0
            ?h("div",{style:{padding:"20px",textAlign:"center",color:C.muted,
                background:"#fff",borderRadius:10,border:"1px solid "+C.border,fontSize:11}},
              "No orders today yet")
            :h("div",{style:{display:"grid",gap:5,maxHeight:380,overflowY:"auto"}},
              todayOrders.map(o=>h("div",{key:o.id,
                style:{padding:"10px 13px",borderRadius:9,
                  border:`2px solid ${selOrder?.id===o.id?C.danger:C.border}`,
                  background:selOrder?.id===o.id?"#FFEBEE":"#fff"}},

                // Order header - click to select
                h("div",{onClick:()=>setSelOrder(selOrder?.id===o.id?null:o),
                  style:{display:"flex",justifyContent:"space-between",
                    marginBottom:4,cursor:"pointer"}},
                  h("span",{style:{fontSize:11,fontWeight:800,color:C.danger}},"#"+o.id),
                  h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                    h("span",{style:{fontSize:12,fontWeight:900,color:C.primary}},
                      "₱"+o.total?.toFixed(2)),
                    h("span",{style:{fontSize:9,color:selOrder?.id===o.id?C.danger:C.muted,fontWeight:700}},
                      selOrder?.id===o.id?"▲ Hide":"▼ Select items")
                  )
                ),

                // Item checkboxes - only show when selected
                selOrder?.id===o.id
                  ?h("div",null,
                    h("div",{style:{fontSize:8,fontWeight:700,color:C.muted,
                      letterSpacing:1,marginBottom:5}},"✅ SELECT ITEMS TO VOID:"),
                    (o.items||[]).map((item,itemIdx)=>
                      h("label",{key:itemIdx,
                        style:{display:"flex",alignItems:"center",gap:8,
                          padding:"6px 8px",borderRadius:7,marginBottom:3,cursor:"pointer",
                          background:selItems[itemIdx]!==false?"#FFEBEE":"#f5f5f5",
                          border:`1px solid ${selItems[itemIdx]!==false?"#FFCDD2":"#eee"}`}},
                        h("input",{
                          type:"checkbox",
                          checked:selItems[itemIdx]!==false,
                          onChange:e=>{
                            e.stopPropagation();
                            setSelItems(p=>({...p,[itemIdx]:e.target.checked}));
                          },
                          style:{width:15,height:15,accentColor:C.danger,flexShrink:0,cursor:"pointer"}
                        }),
                        h("div",{style:{flex:1}},
                          h("span",{style:{fontSize:11,fontWeight:700,
                            color:selItems[itemIdx]!==false?C.danger:C.muted}},
                            item.qty+"x "+item.name),
                          item.variant&&h("span",{style:{fontSize:9,color:C.muted}},
                            " · "+item.variant)
                        ),
                        h("span",{style:{fontSize:11,fontWeight:700,
                          color:selItems[itemIdx]!==false?C.primary:C.muted}},
                          "₱"+((item.price||0)*(item.qty||1)).toFixed(2))
                      )
                    ),
                    // Summary
                    h("div",{style:{marginTop:6,padding:"6px 10px",
                      background:"#FFEBEE",borderRadius:6,
                      display:"flex",justifyContent:"space-between",alignItems:"center"}},
                      h("span",{style:{fontSize:10,color:C.danger,fontWeight:600}},
                        voidedItems.length+"/"+(o.items||[]).length+" items selected"),
                      h("span",{style:{fontSize:12,fontWeight:900,color:C.danger}},
                        "Void: ₱"+voidAmt.toFixed(2))
                    )
                  )
                  :h("div",{onClick:()=>setSelOrder(o),style:{cursor:"pointer"}},
                    h("div",{style:{fontSize:9,color:C.muted}},
                      (o.items||[]).map(i=>i.qty+"x "+i.name).join(", ").slice(0,60)),
                    h("div",{style:{fontSize:8,color:C.muted,marginTop:2}},
                      o.cashier+" · "+(o.payMethod||"cash").toUpperCase())
                  )
              ))
            )
        ),
        // Right: reason + submit
        h("div",null,
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px"}},
            // Selected order summary
            selOrder
              ?h("div",{style:{background:"#FFEBEE",borderRadius:9,padding:"12px",marginBottom:14}},
                h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}},"SELECTED ORDER"),
                h("div",{style:{fontSize:14,fontWeight:900,color:C.danger}},"#"+selOrder.id),
                h("div",{style:{fontSize:18,fontWeight:900,color:C.primary,marginTop:2}},"₱"+selOrder.total?.toFixed(2)),
                h("div",{style:{fontSize:10,color:C.muted,marginTop:3}},
                  (selOrder.items||[]).map(i=>i.qty+"x "+i.name).join(", "))
              )
              :h("div",{style:{background:"#f5f5f5",borderRadius:9,padding:"16px",
                  textAlign:"center",color:C.muted,fontSize:11,marginBottom:14}},
                "← Select an order to void"),
            h("div",{style:{marginBottom:12}},
              h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:5}},"REASON FOR VOID *"),
              h("textarea",{value:reason,onChange:e=>setReason(e.target.value),
                placeholder:"e.g. Wrong order, customer changed mind, duplicate order...",
                style:{width:"100%",padding:"10px",border:`1px solid ${C.border}`,
                  borderRadius:8,fontSize:12,outline:"none",resize:"none",
                  height:80,boxSizing:"border-box",fontFamily:"inherit"}})
            ),
            h("button",{onClick:submitVoid,
              disabled:!selOrder||!reason.trim()||submitting||!voidedItems.length,
              style:{width:"100%",padding:"12px",
                background:selOrder&&reason&&voidedItems.length?C.danger:"#ddd",
                border:"none",borderRadius:9,color:"#fff",
                fontWeight:800,fontSize:13,cursor:selOrder&&reason?"pointer":"not-allowed"}},
              submitting?"Submitting...":`📤 ${voidedItems.length<(selOrder?.items?.length||0)?"Partial ":""}Void Request (₱${voidAmt.toFixed(2)})`)
          )
        )
