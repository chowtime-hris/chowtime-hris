// ─── UTILITIES ───────────────────────────────────────────
function ss(obj){return JSON.parse(JSON.stringify(obj,(_,v)=>v===undefined?null:v));}

function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  const bg=type==="err"?C.danger:type==="warn"?C.warning:type==="info"?C.info:"#1C1C1E";
  return h("div",{style:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"11px 22px",borderRadius:14,fontWeight:600,fontSize:13,zIndex:9999,boxShadow:"0 8px 40px rgba(0,0,0,.3)",display:"flex",alignItems:"center",gap:9,whiteSpace:"nowrap"}},
    h("span",{style:{color:C.accent}},"●"),msg
  );
}

function Stat({label,value,sub,icon,color}){
  return h("div",{style:{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid "+C.border}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
      h("div",null,
        h("div",{style:{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:.5,marginBottom:5,textTransform:"uppercase"}},label),
        h("div",{style:{fontSize:20,fontWeight:900,color:C.text}},value),
        sub&&h("div",{style:{fontSize:9,color:C.muted,marginTop:3}},sub)
      ),
      h("div",{style:{width:36,height:36,background:(color||C.primary)+"18",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}},icon)
    )
  );
}

function Badge({label,color,bg}){
  return h("span",{style:{fontSize:9,padding:"2px 7px",borderRadius:20,background:bg||((color||C.muted)+"18"),color:color||C.muted,fontWeight:700}},label);
}

function SectionHeader({title,action,actionLabel}){
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
    h("h2",{style:{margin:0,fontSize:17,fontWeight:800,color:C.text}},title),
    action&&h("button",{onClick:action,style:{padding:"7px 14px",background:C.primary,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},"+ "+actionLabel)
  );
}

function printReceipt(ord,branchName){
  const da=ord.discAmt||0,s=ord.subtotal||0,vatable=(s-da)/1.12,vat=(s-da)-vatable;
  const dtLabel=ord.discType?.label||"";
  const w=window.open("","_blank","width=400,height=720");

// ─── ITEM CUSTOMIZER ─────────────────────────────────────
function ItemCustomizer({item,onAdd,onClose}){
  const [selV,setSelV]=useState(item.variants[0]);
  const [selO,setSelO]=useState({});
  const [selP,setSelP]=useState(null);
  const [qty,setQty]=useState(1);
  const [note,setNote]=useState("");
  const tog=(oid,ch,multi)=>setSelO(p=>{
    const cur=p[oid]||[];
    if(multi){const ex=cur.find(c=>c.id===ch.id);return ex?{...p,[oid]:cur.filter(c=>c.id!==ch.id)}:{...p,[oid]:[...cur,ch]};}
    const ex=cur.find(c=>c.id===ch.id);return ex?{...p,[oid]:[]}:{...p,[oid]:[ch]};
  });
  const ck=(oid,cid)=>(selO[oid]||[]).some(c=>c.id===cid);
  const optsTotal=Object.values(selO).flat().reduce((s,c)=>s+(c.priceAdd||0),0);
  const unitPrice=item.basePrice+(selV?.priceAdd||0)+optsTotal+(selP?.priceAdd||0);
  const isBogo=selP?.discount==="bogo";
  const lineTotal=isBogo?unitPrice:unitPrice*qty;
  const missing=item.options.filter(o=>o.required&&!(selO[o.id]||[]).length).map(o=>o.label);

  const handleAdd=()=>{
    if(missing.length)return;
    onAdd({
      cartId:Date.now()+Math.random(),id:item.id,
      name:item.name,emoji:item.emoji,unitPrice,qty,
      variant:selV?.label,
      options:Object.values(selO).flat().map(c=>c.label),
      promo:selP?.label,isBogo,note,lineTotal
    });
  };

  const s=(style)=>style;
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:900},
    onClick:e=>e.target===e.currentTarget&&onClose()},
    h("div",{style:{background:"#fff",width:"100%",maxWidth:500,borderRadius:"20px 20px 0 0",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}},
      // Header
      h("div",{style:{background:`linear-gradient(135deg,${C.primary}12,#fff)`,padding:"16px 18px 0",position:"relative"}},
        h("button",{onClick:onClose,style:{position:"absolute",top:12,right:12,width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,.08)",border:"none",fontSize:16,cursor:"pointer"}},"×"),
        h("div",{style:{display:"flex",gap:12,alignItems:"center",paddingBottom:13,borderBottom:"1px solid "+C.border}},
          h("div",{style:{width:64,height:64,background:`${C.primary}10`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,flexShrink:0}},item.emoji),
          h("div",null,
            h("div",{style:{fontWeight:900,fontSize:16}},item.name),
            h("div",{style:{fontSize:11,color:C.muted,marginTop:2,lineHeight:1.4}},item.desc),
            h("div",{style:{fontSize:14,fontWeight:900,color:C.primary,marginTop:4}},"₱"+item.basePrice)
          )
        )
      ),
      // Scrollable body
      h("div",{style:{flex:1,overflowY:"auto",padding:"0 18px"}},
        // Promos
        item.promos.length>0&&h("div",{style:{padding:"13px 0",borderBottom:"1px solid "+C.border}},
          h("div",{style:{fontSize:11,fontWeight:800,marginBottom:8,display:"flex",gap:7,alignItems:"center"}},
            h("span",{style:{background:"#FF4B2B",color:"#fff",fontSize:9,padding:"2px 7px",borderRadius:20}},"🔥 DEALS"),
            "Promos"
          ),
          item.promos.map(p=>{
            const on=selP?.id===p.id;
            return h("button",{key:p.id,onClick:()=>setSelP(on?null:p),style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:`2px solid ${on?"#FF4B2B":C.border}`,background:on?"#FFF5F5":"#fff",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:6}},
              h("div",{style:{width:19,height:19,borderRadius:"50%",border:`2px solid ${on?"#FF4B2B":C.border}`,background:on?"#FF4B2B":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                on&&h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#fff"}})
              ),
              h("div",{style:{flex:1}},
                h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                  h("span",{style:{fontWeight:700,fontSize:12}},p.label),
                  h("span",{style:{background:"#FF4B2B",color:"#fff",fontSize:8,padding:"1px 6px",borderRadius:20}},p.tag)
                ),
                p.note&&h("div",{style:{fontSize:10,color:C.muted}},p.note)
              ),
              h("span",{style:{fontSize:11,color:p.priceAdd?C.primary:"#FF4B2B",fontWeight:700}},p.priceAdd?"+₱"+p.priceAdd:"FREE")
            );
          })
        ),
        // Variants
        item.variants.length>0&&h("div",{style:{padding:"13px 0",borderBottom:"1px solid "+C.border}},
          h("div",{style:{fontSize:11,fontWeight:800,marginBottom:8}},"Size / Quantity ",h("span",{style:{color:C.primary,fontSize:10}},"• Required")),
          item.variants.map(v=>{
            const on=selV?.id===v.id;
            return h("button",{key:v.id,onClick:()=>setSelV(v),style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:`2px solid ${on?C.primary:C.border}`,background:on?"#FFF0F0":"#fff",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:6}},
              h("div",{style:{width:19,height:19,borderRadius:"50%",border:`2px solid ${on?C.primary:C.border}`,background:on?C.primary:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                on&&h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#fff"}})
              ),
              h("div",{style:{flex:1,display:"flex",gap:7,alignItems:"center"}},
                h("span",{style:{fontWeight:700,fontSize:12}},v.label),
                v.tag&&h("span",{style:{background:`${C.primary}18`,color:C.primary,fontSize:9,padding:"1px 6px",borderRadius:20}},v.tag)
              ),
              h("span",{style:{fontSize:11,color:v.priceAdd?C.primary:C.muted,fontWeight:v.priceAdd?700:400}},v.priceAdd?"+₱"+v.priceAdd:"Base")
            );
          })
        ),
        // Options
        ...item.options.map(opt=>h("div",{key:opt.id,style:{padding:"13px 0",borderBottom:"1px solid "+C.border}},
          h("div",{style:{fontSize:11,fontWeight:800,marginBottom:4,display:"flex",gap:7,alignItems:"center"}},
            opt.label,
            h(Badge,{label:opt.required?"Required":"Optional",color:opt.required?C.danger:C.muted}),
            opt.multi&&h(Badge,{label:"Multi",color:C.info})
          ),
          missing.includes(opt.label)&&h("div",{style:{fontSize:10,color:C.danger,fontWeight:600,marginBottom:5}},"⚠️ Please choose one"),
          opt.choices.map(ch=>{
            const on=ck(opt.id,ch.id);
            return h("button",{key:ch.id,onClick:()=>tog(opt.id,ch,opt.multi),style:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,border:`2px solid ${on?C.primary:C.border}`,background:on?"#FFF0F0":"#fff",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:5}},
              opt.multi?h("div",{style:{width:18,height:18,borderRadius:4,border:`2px solid ${on?C.primary:C.border}`,background:on?C.primary:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},on&&h("span",{style:{color:"#fff",fontSize:10,fontWeight:900}},"✓"))
              :h("div",{style:{width:18,height:18,borderRadius:"50%",border:`2px solid ${on?C.primary:C.border}`,background:on?C.primary:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},on&&h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#fff"}})),
              h("span",{style:{flex:1,fontSize:12,fontWeight:on?700:400}},ch.label),
              h("span",{style:{fontSize:11,color:ch.priceAdd?C.primary:C.muted,fontWeight:ch.priceAdd?600:400}},ch.priceAdd?"+₱"+ch.priceAdd:"Free")
            );
          })
        )),
        // Note
        h("div",{style:{padding:"13px 0 18px"}},
          h("div",{style:{fontSize:11,fontWeight:800,marginBottom:7}},"📝 Special Instructions ",h("span",{style:{color:C.muted,fontWeight:400}},"• Optional")),
          h("textarea",{value:note,onChange:e=>setNote(e.target.value),placeholder:'"Extra spicy", "No rice", "Separate sauce"',style:{width:"100%",padding:"9px 11px",border:"1px solid "+C.border,borderRadius:9,fontSize:11,outline:"none",resize:"none",fontFamily:"inherit",boxSizing:"border-box",height:58}})
        )
      ),
      // Footer
      h("div",{style:{padding:"11px 18px 16px",borderTop:"1px solid "+C.border}},
        missing.length>0&&h("div",{style:{background:"#FFEBEE",borderRadius:8,padding:"7px 11px",marginBottom:8,fontSize:11,color:C.danger,fontWeight:600}},"⚠️ Select: "+missing.join(", ")),
        isBogo&&h("div",{style:{background:"#FFF8E1",borderRadius:8,padding:"7px 11px",marginBottom:8,fontSize:11,color:"#E65100",fontWeight:600}},"🎉 BOGO: Order "+qty+", get "+qty+" FREE!"),
        h("div",{style:{display:"flex",gap:9,alignItems:"center"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:7,background:C.bg,borderRadius:9,padding:"4px"}},
            h("button",{onClick:()=>setQty(q=>Math.max(1,q-1)),style:{width:30,height:30,borderRadius:7,border:"none",background:qty>1?"#fff":"#eee",cursor:qty>1?"pointer":"default",fontSize:16,fontWeight:700,color:qty>1?C.primary:C.muted}},"−"),
            h("span",{style:{minWidth:20,textAlign:"center",fontWeight:900,fontSize:14}},qty),
            h("button",{onClick:()=>setQty(q=>q+1),style:{width:30,height:30,borderRadius:7,border:"none",background:"#fff",cursor:"pointer",fontSize:16,fontWeight:700,color:C.primary}},"+")
          ),
          h("button",{onClick:handleAdd,disabled:!!missing.length,style:{flex:1,padding:"12px",background:missing.length?"#ddd":`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:10,color:missing.length?"#999":"#fff",fontWeight:800,fontSize:13,cursor:missing.length?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:9}},
            "Add to Order",
            h("span",{style:{background:"rgba(255,255,255,.22)",padding:"2px 9px",borderRadius:20,fontSize:12}},"₱"+lineTotal.toFixed(2))
          )
        )
      )
    )
  );
}

    if(!ordered.length){showT("Add at least 1 item","warn");return;}
    const po = {
      _type:"po", poNum:soNum,

// ─── DR ISSUE FORM (Commissary issues DR to branch) ──────
function DRIssueForm({po,db,user,showT,INIT_INVENTORY,advances,setAdvances}){
  const [deliveryDate,setDeliveryDate] = useState(po.deliveryDate||"");
  const [actualQtys,setActualQtys]     = useState(
    (po.items||[]).reduce((acc,i)=>({...acc,[i.id]:i.qty}),[])
  );
  const [prices,setPrices]   = useState(
    (po.items||[]).reduce((acc,i)=>({...acc,[i.id]:i.price||0}),[])
  );
  const [drNotes,setDrNotes] = useState("");
  const [expanded,setExpanded] = useState(false);
  const drNum = "DR-"+po.poNum?.replace("SO-","").replace("PO-","");
  const today = new Date().toISOString().slice(0,10);

  const totalAmt = (po.items||[]).reduce((s,i)=>{
    const qty = actualQtys[i.id]??i.qty;
    const price = prices[i.id]||0;
    return s + qty*price;
  },0);

  const issueDR = async()=>{
    if(!deliveryDate){showT("Set delivery date first","warn");return;}
    const delivered = (po.items||[]).map(i=>({
      ...i,
      actualQty: actualQtys[i.id]??i.qty,
      price: prices[i.id]||0,
      total: (actualQtys[i.id]??i.qty)*(prices[i.id]||0),
      discrepancy: (actualQtys[i.id]??i.qty) - i.qty
    }));
    const hasDisc = delivered.some(i=>i.discrepancy!==0);
    try{
      await updateDoc(doc(db,"advances",po._docId),{
        status:"approved", deliveryDate, drNum,
        deliveredItems:delivered,
        totalAmount:totalAmt,
        hasDiscrepancy:hasDisc,
        drNotes,
        issuedBy:user.name, issuedAt:serverTimestamp()

// ─── DR CHECK FORM (Branch confirms receipt, flags discrepancy) ──
function DRCheckForm({po,db,branchId,user,showT,INIT_INVENTORY,setAdvances,advances}){
  const [receivedQtys,setReceivedQtys]=useState(
    (po.deliveredItems||po.items||[]).reduce((acc,i)=>({...acc,[i.id]:i.actualQty??i.qty}),[])
  );
  const [discNotes,setDiscNotes]=useState("");
  const [expanded,setExpanded]=useState(true);

  const confirmReceipt=async()=>{
    const received=(po.deliveredItems||po.items||[]).map(i=>({
      ...i,
      receivedQty:receivedQtys[i.id]??i.actualQty??i.qty,
      discrepancy:(receivedQtys[i.id]??i.actualQty??i.qty)-(i.actualQty??i.qty)
    }));
    const hasDisc=received.some(i=>i.discrepancy!==0);
    try{
      await updateDoc(doc(db,"advances",po._docId),{
        status:"delivered",
        receivedItems:received,
        hasDiscrepancy:hasDisc,
        discrepancyNotes:discNotes,
        confirmedBy:user.name,
        confirmedAt:serverTimestamp()
      });
      // Update branch inventory with actual received qty
      const invCol="inventory_"+branchId;
      for(const item of received){
        try{
          await updateDoc(doc(db,invCol,item.id),{
            stock:increment(item.receivedQty||0),
            lastRestocked:serverTimestamp()
          });
        }catch(e){
          const base=INIT_INVENTORY.find(i=>i.id===item.id)||{};
          await setDoc(doc(db,invCol,item.id),{
            ...base,id:item.id,branch:branchId,
            stock:item.receivedQty||0,lastRestocked:serverTimestamp()
          });
        }
      }
      showT(hasDisc?"Receipt confirmed with discrepancy ⚠️":"Receipt confirmed ✓ Inventory updated!",hasDisc?"warn":"ok");
    }catch(e){showT("Error confirming receipt","err");}
  };

  const printDR=()=>{
    const w=window.open("","_blank","width=400,height=600");
    if(!w)return;
    const items=po.deliveredItems||po.items||[];
    w.document.write(`<!DOCTYPE html><html><head><title>DR</title>
    <style>*{margin:0;padding:0;}body{font-family:'Courier New',monospace;font-size:11px;width:80mm;margin:0 auto;padding:8px;}
    .c{text-align:center;}.b{font-weight:bold;}.hr{border-top:1px dashed #000;margin:6px 0;}
    .row{display:flex;justify-content:space-between;}</style></head><body>
    <div class="c"><b style="font-size:14px">DELIVERY RECEIPT</b><br>CHOWTIME COMMISSARY<br>${po.drNum||"DR-"+po.poNum}</div>
    <div class="hr"></div>
    <div class="row"><span>PO#: ${po.poNum}</span><span>${po.deliveryDate||po.date}</span></div>
    <div class="row"><span>Branch: ${branches.find(b=>b.id===po.branch)?.full||po.branch}</span></div>
    <div class="row"><span>Issued by: ${po.issuedBy||"Commissary"}</span></div>
    <div class="hr"></div>
    <div class="b">ITEMS DELIVERED:</div>
    ${items.map(i=>`<div class="row"><span>${i.name}</span><span>${i.actualQty??i.qty} ${i.unit}</span></div>
    <div style="padding-left:10px;font-size:9px">PO Qty: ${i.qty} ${i.unit}</div>`).join("")}
    <div class="hr"></div>
    <div>Received by: ________________</div>
    <div>Signature: ________________</div>
    <div>Date: ________________</div>
    <div class="hr"></div>
    <div class="c">CHOWTIME FAST-FOOD CHAIN<br>This DR is your proof of delivery.</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),400);
  };

  return h("div",{style:{background:"#fff",borderRadius:12,border:"2px solid "+C.info,marginBottom:10,overflow:"hidden"}},
    h("div",{style:{background:"#E3F2FD",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:12,fontWeight:800}},po.drNum||po.poNum+" — For Receipt"),
        h("div",{style:{fontSize:10,color:C.info,marginTop:1}},"Delivery Date: "+(po.deliveryDate||"—")+" · Issued by: "+(po.issuedBy||"Commissary"))
      ),
      h("button",{onClick:printDR,style:{padding:"5px 11px",background:C.info,border:"none",borderRadius:7,color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}},"🖨️ Print DR")
    ),
    h("div",{style:{padding:"12px 16px"}},
      h("div",{style:{fontSize:9,fontWeight:800,color:C.muted,marginBottom:8,letterSpacing:1}},"VERIFY ACTUAL RECEIVED QTY (edit if different from DR)"),
      h("div",{style:{display:"grid",gap:5}},
        (po.deliveredItems||po.items||[]).map(item=>{
          const drQty=item.actualQty??item.qty;
          const received=receivedQtys[item.id]??drQty;
          const diff=received-drQty;
          return h("div",{key:item.id,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:diff!==0?"#FFEBEE":"#f9f9f9",border:diff!==0?"1px solid #FFCDD2":"1px solid transparent"}},
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:11,fontWeight:700}},item.name),
              h("div",{style:{fontSize:9,color:C.muted}},"DR Qty: "+drQty+" "+item.unit+" (PO: "+item.qty+")")
            ),
            h("div",{style:{display:"flex",alignItems:"center",gap:7}},
              h("button",{onClick:()=>setReceivedQtys(p=>({...p,[item.id]:Math.max(0,(p[item.id]??drQty)-1)})),
                style:{width:26,height:26,borderRadius:6,border:"1px solid "+C.border,background:"#fff",cursor:"pointer",fontSize:14,fontWeight:900}},"−"),
              h("span",{style:{minWidth:32,textAlign:"center",fontWeight:900,fontSize:13,color:diff<0?C.danger:diff>0?C.info:C.success}},received),
              h("button",{onClick:()=>setReceivedQtys(p=>({...p,[item.id]:(p[item.id]??drQty)+1})),
                style:{width:26,height:26,borderRadius:6,border:`1px solid ${C.primary}`,background:"#FFF0F0",cursor:"pointer",fontWeight:900,color:C.primary,fontSize:14}},"+"),
              diff!==0&&h("span",{style:{fontSize:9,fontWeight:700,color:diff<0?C.danger:C.info}},
                (diff>0?"+":"")+diff+" ⚠️")
            )
          );
        })
      ),
      (po.deliveredItems||po.items||[]).some(i=>(receivedQtys[i.id]??i.actualQty??i.qty)!==(i.actualQty??i.qty))&&
        h("div",{style:{marginTop:10}},
          h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"DISCREPANCY NOTES"),
          h("textarea",{value:discNotes,onChange:e=>setDiscNotes(e.target.value),
            placeholder:"Describe missing/damaged items...",
            style:{width:"100%",padding:"8px",border:"1px solid "+C.warning,borderRadius:7,fontSize:11,outline:"none",resize:"none",height:52,boxSizing:"border-box",fontFamily:"inherit"}})
        ),
      h("button",{onClick:confirmReceipt,
        style:{marginTop:12,width:"100%",padding:"11px",background:`linear-gradient(135deg,${C.success},${"#2e7d32"}`,border:"none",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},
        "✅ Confirm Receipt & Update Inventory")
    )
  );
}

  const [showHistory,setShowHistory] = useState(false);

  // Load today's existing count + history from Firebase
  useEffect(()=>{
    if(!branchId)return;
    const q = query(
      collection(db,"cash_counts"),
      where("branch","==",branchId),
      orderBy("date","desc"),
      limit(30)
    );
    const unsub = onSnapshot(q, snap=>{
      const all = snap.docs.map(d=>({...d.data(),_docId:d.id}));
      setHistory(all);
      // Load today's count if exists
      const todayCount = all.find(c=>c.date===today);
      if(todayCount){
        setCounts(todayCount.counts||DENOMS.reduce((a,d)=>({...a,[d.value]:0}),{}));
        setRemit(todayCount.remittance?.toString()||"");
        setNote(todayCount.note||"");
        setSaved(true);
      }
      setLoading(false);
    },()=>setLoading(false));
    return()=>unsub();
  },[branchId,today]);

  const totalCash = DENOMS.reduce((s,d)=>s+(counts[d.value]||0)*d.value, 0);
  const billsTotal = DENOMS.filter(d=>d.type==="bill").reduce((s,d)=>s+(counts[d.value]||0)*d.value,0);
  const coinsTotal = DENOMS.filter(d=>d.type==="coin").reduce((s,d)=>s+(counts[d.value]||0)*d.value,0);

  // Net sales from POS orders today
  const todaySales = orders
    .filter(o=>o.branch===branchId&&o.status!=="cancelled")
    .reduce((s,o)=>s+(o.total||0),0);

  // Previous day closing → today's opening fund
  const prevRecord = history.find(c=>c.date<today&&c.closingBalance!==undefined);
  const openingFund = prevRecord?.closingBalance ?? 0;

  const remittanceAmt = parseFloat(remit)||0;
  const closingBalance = totalCash - remittanceAmt;
  const variance = totalCash - (openingFund + todaySales);

  const saveCashCount = async(isClosing=false)=>{
    if(totalCash===0&&!isClosing){showT("Enter denominations first","warn");return;}
    try{
      const payload = {
        branch: branchId,
        branchName: curBranch.full,
        date: today,
        counts,
        totalCash,
        billsTotal,
        coinsTotal,
        openingFund,
        todaySales,
        variance,
        remittance: remittanceAmt,
        closingBalance,
        note: countNote,
        countedBy: user.name,
        isClosing,
        timestamp: serverTimestamp(),
      };
      // Use date+branch as document ID so it upserts
      await setDoc(
        doc(db,"cash_counts",branchId+"_"+today),
        payload
      );
      setSaved(true);
      showT(isClosing?"Closing count saved! ₱"+closingBalance.toFixed(2)+" carried over ✓":"Cash count saved ✓");
    }catch(e){showT("Save failed","err");console.error(e);}
  };

  const printCount = (isClosing=false)=>{
    const w=window.open("","_blank","width=400,height=700");
    if(!w)return;
    w.document.write(`<!DOCTYPE html><html><head><title>Cash Count</title>
    <style>*{margin:0;padding:0;}body{font-family:'Courier New',monospace;font-size:11px;width:80mm;margin:0 auto;padding:8px;}
    .c{text-align:center;}.b{font-weight:bold;}.hr{border-top:1px dashed #000;margin:6px 0;}
    .row{display:flex;justify-content:space-between;margin-bottom:2px;}</style></head><body>
    <div class="c"><b>${isClosing?"CLOSING":"CASH COUNT"} REPORT</b><br>
    CHOWTIME - ${curBranch.full}<br>${today}<br>Counted by: ${user.name}</div>
    <div class="hr"></div>
    <div class="b">DENOMINATION BREAKDOWN:</div>
    ${DENOMS.map(d=>(counts[d.value]||0)>0?
      `<div class="row"><span>${d.label} x ${counts[d.value]}</span><span>P${((counts[d.value]||0)*d.value).toFixed(2)}</span></div>`:""
    ).join("")}
    <div class="hr"></div>
    <div class="row"><span>Bills Total:</span><span>P${billsTotal.toFixed(2)}</span></div>
    <div class="row"><span>Coins Total:</span><span>P${coinsTotal.toFixed(2)}</span></div>
    <div class="row b"><span>TOTAL CASH:</span><span>P${totalCash.toFixed(2)}</span></div>
    <div class="hr"></div>
    <div class="row"><span>Opening Fund:</span><span>P${openingFund.toFixed(2)}</span></div>
    <div class="row"><span>Today's Sales:</span><span>P${todaySales.toFixed(2)}</span></div>
    <div class="row"><span>Expected:</span><span>P${(openingFund+todaySales).toFixed(2)}</span></div>
    <div class="row ${variance!==0?'b':''}"><span>Variance:</span><span>${variance>=0?"+":""}P${variance.toFixed(2)}</span></div>
    ${isClosing?`<div class="hr"></div>
    <div class="row"><span>Total Cash:</span><span>P${totalCash.toFixed(2)}</span></div>
    <div class="row"><span>Remittance:</span><span>-P${remittanceAmt.toFixed(2)}</span></div>
    <div class="row b"><span>CLOSING BALANCE:</span><span>P${closingBalance.toFixed(2)}</span></div>
    <div style="font-size:9px;margin-top:4px">(This amount stays in cash box as tomorrow's opening fund)</div>`:""}
    <div class="hr"></div>
    ${countNote?`<div>Notes: ${countNote}</div><div class="hr"></div>`:""}
    <div>Counted by: ________________</div>
    <div>Manager: ________________</div>
    <div>Date/Time: ${new Date().toLocaleString("en-PH")}</div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),400);
  };

  if(loading) return h("div",{style:{textAlign:"center",padding:"40px",color:C.muted}},"Loading cash count...");

  const selHistory = history.find(c=>c.date===selDate);

  return h("div",null,
    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        h("h2",{style:{margin:0,fontSize:17,fontWeight:800}},"💰 Cash Count — "+curBranch.name),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},today+" · Counted by: "+user.name)
      ),
      h("div",{style:{display:"flex",gap:7}},
        h("button",{onClick:()=>setShowHistory(!showHistory),
          style:{padding:"7px 13px",background:"#fff",border:"1px solid "+C.border,borderRadius:8,fontSize:11,cursor:"pointer"}},
          showHistory?"← Current Count":"📅 History"),
        !showHistory&&h("button",{onClick:()=>printCount(false),
          style:{padding:"7px 13px",background:"#fff",border:"1px solid "+C.border,borderRadius:8,fontSize:11,cursor:"pointer"}},"🖨️ Print"),
        !showHistory&&h("button",{onClick:()=>saveCashCount(false),
          style:{padding:"7px 13px",background:C.info,border:"none",borderRadius:8,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}},"💾 Save"),
        !showHistory&&h("button",{onClick:()=>saveCashCount(true),
          style:{padding:"7px 13px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:8,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}},"🏁 Close Store")
      )
    ),

    // HISTORY VIEW
    showHistory&&h("div",null,
      h("div",{style:{display:"flex",gap:8,marginBottom:13,alignItems:"center"}},
        h("div",{style:{fontSize:10,color:C.muted}},"Select date:"),
        h("select",{value:selDate,onChange:e=>setSelDate(e.target.value),
          style:{padding:"6px 10px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}},
          history.map(c=>h("option",{key:c.date,value:c.date},c.date+(c.isClosing?" (Closing)":"")))
        )
      ),
      selHistory?h("div",null,
        // Summary cards
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:13}},
          h(Stat,{label:"Total Cash",value:"₱"+selHistory.totalCash?.toFixed(2),icon:"💵",color:C.primary}),
          h(Stat,{label:"Opening Fund",value:"₱"+(selHistory.openingFund||0).toFixed(2),icon:"🌅",color:C.info}),
          h(Stat,{label:"Remittance",value:"₱"+(selHistory.remittance||0).toFixed(2),icon:"🏦",color:C.warning}),
          h(Stat,{label:"Closing Balance",value:"₱"+(selHistory.closingBalance||0).toFixed(2),sub:"Tomorrow's opening",icon:"🌙",color:C.success})
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          h("div",{style:{background:"#fff",borderRadius:12,padding:"13px 15px",border:"1px solid "+C.border}},
            h("b",{style:{fontSize:12}},"Denomination Breakdown"),
            h("div",{style:{marginTop:9}},
              DENOMS.map(d=>{const qty=(selHistory.counts||{})[d.value]||0;return qty>0?h("div",{key:d.value,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f5f5f5"}},
                h("span",{style:{fontSize:11,fontWeight:600}},d.label+" × "+qty),
                h("span",{style:{fontSize:11,fontWeight:700,color:d.type==="bill"?C.info:C.muted}},"₱"+(qty*d.value).toFixed(2))
              ):null;})
            )
          ),
          h("div",{style:{background:"#fff",borderRadius:12,padding:"13px 15px",border:"1px solid "+C.border}},
            h("b",{style:{fontSize:12}},"Summary"),
            h("div",{style:{marginTop:9}},
              [["Bills Total","₱"+(selHistory.billsTotal||0).toFixed(2),C.info],
               ["Coins Total","₱"+(selHistory.coinsTotal||0).toFixed(2),C.muted],
               ["Total Cash","₱"+(selHistory.totalCash||0).toFixed(2),C.primary],
               ["Opening Fund","₱"+(selHistory.openingFund||0).toFixed(2),C.success],
               ["Today's Sales","₱"+(selHistory.todaySales||0).toFixed(2),C.primary],
               ["Variance",(selHistory.variance||0)>=0?"+"+(selHistory.variance||0).toFixed(2):(selHistory.variance||0).toFixed(2),(selHistory.variance||0)>=0?C.success:C.danger],
               ["Remittance","₱"+(selHistory.remittance||0).toFixed(2),C.warning],
               ["Closing Balance","₱"+(selHistory.closingBalance||0).toFixed(2),C.success],
              ].map(([l,v,col])=>h("div",{key:l,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f5f5f5"}},
                h("span",{style:{fontSize:11,color:C.muted}},l),
                h("span",{style:{fontSize:11,fontWeight:800,color:col}},v)
              ))
            ),
            selHistory.note&&h("div",{style:{marginTop:8,padding:"7px 10px",background:C.bg,borderRadius:7,fontSize:10,color:C.muted}},"📝 "+selHistory.note),
            h("button",{onClick:()=>printCount(selHistory.isClosing),
              style:{marginTop:10,width:"100%",padding:"8px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:7,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}},"🖨️ Reprint")
          )
        )
      ):h("div",{style:{textAlign:"center",padding:"30px",color:C.muted}},"No record for this date")
    ),

    // CURRENT COUNT VIEW
    !showHistory&&h("div",{style:{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:12}},

      // LEFT: Denomination entry
      h("div",null,
        // Opening fund info banner
        h("div",{style:{background:openingFund>0?"#E8F5E9":"#FFF8E1",border:"1px solid "+(openingFund>0?"#A5D6A7":"#FFE082"),borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",null,
            h("div",{style:{fontSize:10,fontWeight:700,color:openingFund>0?C.success:"#795548"}},"Yesterday's Closing Balance → Today's Opening Fund"),
            h("div",{style:{fontSize:18,fontWeight:900,color:openingFund>0?C.success:C.muted}},"₱"+openingFund.toFixed(2)),
            h("div",{style:{fontSize:9,color:C.muted}},prevRecord?"From "+prevRecord.date+" closing":"No previous record — set manually if needed")
          ),
          h("div",{style:{fontSize:24}},openingFund>0?"✅":"📭")
        ),

        // Bills
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden",marginBottom:10}},
          h("div",{style:{padding:"10px 14px",background:"#E3F2FD",borderBottom:"1px solid #BBDEFB",display:"flex",justifyContent:"space-between"}},
            h("b",{style:{fontSize:12,color:C.info}},"💵 Bills"),
            h("span",{style:{fontSize:12,fontWeight:800,color:C.info}},"₱"+billsTotal.toFixed(2))
          ),
          h("div",{style:{padding:"8px 14px"}},
            DENOMS.filter(d=>d.type==="bill").map(d=>h("div",{key:d.value,style:{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f5f5f5"}},
              h("div",{style:{width:52,height:26,borderRadius:6,background:d.color+"22",border:"1px solid "+d.color+"44",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                h("span",{style:{fontSize:10,fontWeight:900,color:d.color}},d.label)
              ),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:9,color:C.muted}},"× "+( counts[d.value]||0)+" = ₱"+((counts[d.value]||0)*d.value).toFixed(2))
              ),
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("button",{onClick:()=>setCounts(p=>({...p,[d.value]:Math.max(0,(p[d.value]||0)-1)})),
                  style:{width:28,height:28,borderRadius:7,border:"1px solid "+C.border,background:"#fff",cursor:"pointer",fontSize:15,fontWeight:700}},"−"),
                h("input",{type:"number",min:0,value:counts[d.value]||0,
                  onChange:e=>setCounts(p=>({...p,[d.value]:parseInt(e.target.value)||0})),
                  style:{width:52,textAlign:"center",padding:"4px",border:"1px solid "+C.border,borderRadius:6,fontSize:13,fontWeight:700,outline:"none"}}),
                h("button",{onClick:()=>setCounts(p=>({...p,[d.value]:(p[d.value]||0)+1})),
                  style:{width:28,height:28,borderRadius:7,border:"1px solid "+d.color,background:d.color+"18",cursor:"pointer",fontSize:15,fontWeight:700,color:d.color}},"+")
              )
            ))
          )
        ),

        // Coins
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
          h("div",{style:{padding:"10px 14px",background:"#F3E5F5",borderBottom:"1px solid #CE93D8",display:"flex",justifyContent:"space-between"}},
            h("b",{style:{fontSize:12,color:"#6A1B9A"}},"🪙 Coins"),
            h("span",{style:{fontSize:12,fontWeight:800,color:"#6A1B9A"}},"₱"+coinsTotal.toFixed(2))
          ),
          h("div",{style:{padding:"8px 14px"}},
            DENOMS.filter(d=>d.type==="coin").map(d=>h("div",{key:d.value,style:{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f5f5f5"}},
              h("div",{style:{width:52,height:26,borderRadius:6,background:d.color+"22",border:"1px solid "+d.color+"44",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                h("span",{style:{fontSize:10,fontWeight:900,color:d.color}},d.label)
              ),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:9,color:C.muted}},"× "+(counts[d.value]||0)+" = ₱"+((counts[d.value]||0)*d.value).toFixed(2))
              ),
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("button",{onClick:()=>setCounts(p=>({...p,[d.value]:Math.max(0,(p[d.value]||0)-1)})),
                  style:{width:28,height:28,borderRadius:7,border:"1px solid "+C.border,background:"#fff",cursor:"pointer",fontSize:15,fontWeight:700}},"−"),
                h("input",{type:"number",min:0,value:counts[d.value]||0,
                  onChange:e=>setCounts(p=>({...p,[d.value]:parseInt(e.target.value)||0})),
                  style:{width:52,textAlign:"center",padding:"4px",border:"1px solid "+C.border,borderRadius:6,fontSize:13,fontWeight:700,outline:"none"}}),
                h("button",{onClick:()=>setCounts(p=>({...p,[d.value]:(p[d.value]||0)+1})),
                  style:{width:28,height:28,borderRadius:7,border:"1px solid "+d.color,background:d.color+"18",cursor:"pointer",fontSize:15,fontWeight:700,color:d.color}},"+")
              )
            ))
          )
        )
      ),

      // RIGHT: Summary + Remittance
      h("div",null,
        // Total summary card
        h("div",{style:{background:`linear-gradient(135deg,${C.primary},${C.dark})`,borderRadius:13,padding:"16px 18px",marginBottom:10}},
          h("div",{style:{color:C.accent,fontSize:9,fontWeight:700,letterSpacing:2}},"CASH COUNT TOTAL"),
          h("div",{style:{color:"#fff",fontSize:28,fontWeight:900,margin:"6px 0"}},"₱"+totalCash.toFixed(2)),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}},
            h("div",{style:{background:"rgba(255,255,255,.12)",borderRadius:8,padding:"8px 10px"}},
              h("div",{style:{color:"rgba(255,255,255,.6)",fontSize:8}},"BILLS"),
              h("div",{style:{color:"#fff",fontSize:13,fontWeight:800}},"₱"+billsTotal.toFixed(2))
            ),
            h("div",{style:{background:"rgba(255,255,255,.12)",borderRadius:8,padding:"8px 10px"}},
              h("div",{style:{color:"rgba(255,255,255,.6)",fontSize:8}},"COINS"),
              h("div",{style:{color:"#fff",fontSize:13,fontWeight:800}},"₱"+coinsTotal.toFixed(2))
            )
          )
        ),

        // Variance vs expected
        h("div",{style:{background:Math.abs(variance)<0.01?"#E8F5E9":variance>0?"#E3F2FD":"#FFEBEE",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid "+(Math.abs(variance)<0.01?"#A5D6A7":variance>0?"#90CAF9":"#FFCDD2")}},
          h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:6}},"VARIANCE CHECK"),
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
            h("span",{style:{fontSize:11,color:C.muted}},"Opening Fund"),
            h("span",{style:{fontSize:11,fontWeight:700}},"₱"+openingFund.toFixed(2))
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
            h("span",{style:{fontSize:11,color:C.muted}},"POS Sales Today"),
            h("span",{style:{fontSize:11,fontWeight:700}},"₱"+todaySales.toFixed(2))
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"1px dashed #ddd",marginTop:3}},
            h("span",{style:{fontSize:11,color:C.muted}},"Expected Total"),
            h("span",{style:{fontSize:11,fontWeight:700}},"₱"+(openingFund+todaySales).toFixed(2))
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4}},
            h("span",{style:{fontSize:12,fontWeight:800}},"VARIANCE"),
            h("span",{style:{fontSize:14,fontWeight:900,color:Math.abs(variance)<0.01?C.success:variance>0?C.info:C.danger}},
              (variance>=0?"+":"")+"₱"+variance.toFixed(2))
          ),
          h("div",{style:{fontSize:9,color:C.muted,marginTop:4}},
            Math.abs(variance)<0.01?"✅ Count is accurate":
            variance>0?"📈 Cash is OVER expected":
            "⚠️ Cash is SHORT — check transactions"
          )
        ),

        // Remittance section
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"13px 15px",marginBottom:10}},
          h("b",{style:{fontSize:12}},"🏦 Closing — Remittance"),
          h("div",{style:{fontSize:10,color:C.muted,marginTop:2,marginBottom:10}},"Enter amount to be remitted/deposited. The rest stays in the cash box as tomorrow's opening fund."),
          h("div",{style:{marginBottom:8}},
            h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:1}},"REMITTANCE AMOUNT (₱)"),
            h("input",{type:"number",value:remit,onChange:e=>setRemit(e.target.value),placeholder:"0.00",
              style:{width:"100%",padding:"10px 12px",border:"2px solid "+C.warning,borderRadius:9,fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box",color:C.warning}})
          ),
          h("div",{style:{background:"#F3E5F5",borderRadius:9,padding:"10px 13px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,
              h("div",{style:{fontSize:9,color:"#6A1B9A",fontWeight:700}},"CLOSING BALANCE"),
              h("div",{style:{fontSize:9,color:C.muted}},"Stays in cash box = Tomorrow's Opening Fund")
            ),
            h("div",{style:{fontSize:20,fontWeight:900,color:closingBalance>=0?"#6A1B9A":C.danger}},"₱"+closingBalance.toFixed(2))
          )
        ),

        // Notes
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"13px 15px",marginBottom:10}},
          h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"NOTES (optional)"),
          h("textarea",{value:countNote,onChange:e=>setNote(e.target.value),
            placeholder:"e.g. Short ₱50 — customer returned wrong change",
            style:{width:"100%",padding:"8px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none",resize:"none",height:52,boxSizing:"border-box",fontFamily:"inherit"}})
        ),

        // Action buttons
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}},
          h("button",{onClick:()=>{saveCashCount(false);printCount(false);},
            style:{padding:"11px",background:"#fff",border:"1px solid "+C.border,borderRadius:9,fontWeight:700,fontSize:11,cursor:"pointer"}},
            "💾 Save Count"),
          h("button",{onClick:()=>{saveCashCount(true);printCount(true);},
            style:{padding:"11px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},
            "🏁 Close Store & Print")
        ),
        saved&&h("div",{style:{textAlign:"center",marginTop:8,fontSize:10,color:C.success,fontWeight:700}},"✅ Count saved to Firebase")
      )
    )
  );
}

// ─── HRIS: CA / LOAN REQUEST PAGE ────────────────────────
function CALoanPage({user,branchId,curBranch,db,hrisDB,showT,mode,hrisEmps=[]}){
  const isCA = mode === "ca";
  const [amount, setAmount]     = useState("");
  const [reason, setReason]     = useState("");
  const [installments, setInst] = useState("2");
  const [myRequests, setMyReqs] = useState([]);
  const [loading, setLoading]   = useState(true);
  const today = new Date().toISOString().slice(0,10);

  useEffect(()=>{ setLoading(false); },[hrisEmps]);

  // Load my requests from POS Firestore
  useEffect(()=>{
    const q = query(
      collection(db,"hris_requests"),
      where("staffName","==",user.name),
      where("type","==",isCA?"Cash Advance":"Cash Loan"),
      orderBy("timestamp","desc"),
      limit(20)
    );
    const unsub = onSnapshot(q, snap=>{
      setMyReqs(snap.docs.map(d=>({...d.data(),_docId:d.id})));
    }, ()=>{});
    return()=>unsub();
  },[user.name, isCA]);

  // Find matching HRIS employee record
  const hrisEmp = hrisEmps.find(e=>
    e.name?.toLowerCase().trim()===user.name.toLowerCase().trim() ||
    e.name?.toLowerCase().includes(user.name.split(" ")[0].toLowerCase())
  );

  const submit = async()=>{
    if(!amount||parseFloat(amount)<=0){showT("Enter amount","warn");return;}
    if(!reason.trim()){showT("Enter reason","warn");return;}
    const amt = parseFloat(amount);
    const cutoffDeduct = isCA ? amt : Math.ceil(amt/parseInt(installments));

    // 1. Save request to POS Firestore (for approval tracking)
    const reqRef = await addDoc(collection(db,"hris_requests"),{
      type: isCA?"Cash Advance":"Cash Loan",
      staffName: user.name,
      branch: branchId,
      branchName: curBranch.full,
      amount: amt,
      reason,
      installments: isCA?1:parseInt(installments),
      cutoffDeduct,
      status: "pending",
      hrisEmpId: hrisEmp?.id||null,
      date: today,
      timestamp: serverTimestamp(),
    });

    showT((isCA?"Cash Advance":"Cash Loan")+" request submitted! Waiting for approval ✓");
    setAmount(""); setReason(""); setInst("2");
  };

  const pendingOwn  = myRequests.filter(r=>r.status==="pending");
  const approvedOwn = myRequests.filter(r=>r.status==="approved");
  const totalOwed   = myRequests.filter(r=>r.status==="approved"&&r.balance>0)
                        .reduce((s,r)=>s+(r.balance||0),0);

  if(loading) return h("div",{style:{textAlign:"center",padding:"40px",color:C.muted}},"Loading...");

  return h("div",null,
    // Header
    h("div",{style:{background:isCA?`linear-gradient(135deg,${C.primary},${C.dark})`:`linear-gradient(135deg,#1565C0,#0D47A1)`,borderRadius:13,padding:"16px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",null,
        h("div",{style:{color:C.accent,fontSize:9,fontWeight:700,letterSpacing:2}},isCA?"CASH ADVANCE REQUEST":"CASH LOAN REQUEST"),
        h("div",{style:{color:"#fff",fontSize:15,fontWeight:900,marginTop:2}},user.name),
        h("div",{style:{color:"rgba(255,255,255,.6)",fontSize:9,marginTop:1}},curBranch.full+" · "+today),
        hrisEmp
          ?h("div",{style:{color:"#4ade80",fontSize:9,marginTop:3}},"✅ HRIS linked: "+hrisEmp.name+" ("+hrisEmp.pos+")")
          :h("div",{style:{color:"#fbbf24",fontSize:9,marginTop:3}},"⚠️ Name not found in HRIS — admin will link manually")
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{color:"rgba(255,255,255,.5)",fontSize:9}},"OUTSTANDING BALANCE"),
        h("div",{style:{color:totalOwed>0?C.warning:"#4ade80",fontSize:20,fontWeight:900}},"₱"+totalOwed.toFixed(2))
      )
    ),

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},

      // LEFT: Request form
      h("div",null,
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px"}},
          h("div",{style:{fontWeight:800,fontSize:13,marginBottom:14,color:isCA?C.primary:"#1565C0"}},
            isCA?"💵 New Cash Advance":"💸 New Cash Loan"),

          // Amount
          h("div",{style:{marginBottom:11}},
            h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"AMOUNT REQUESTED (₱)"),
            h("input",{type:"number",value:amount,onChange:e=>setAmount(e.target.value),
              placeholder:"0.00",
              style:{width:"100%",padding:"12px",border:`2px solid ${isCA?C.primary:"#1565C0"}`,
                borderRadius:9,fontSize:20,fontWeight:700,outline:"none",
                boxSizing:"border-box",color:isCA?C.primary:"#1565C0"}})
          ),

          // Reason
          h("div",{style:{marginBottom:11}},
            h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"REASON / PURPOSE"),
            h("textarea",{value:reason,onChange:e=>setReason(e.target.value),
              placeholder:isCA?"e.g. Emergency medical expense, school fees...":"e.g. House repair, tuition fee, medical...",
              style:{width:"100%",padding:"10px 12px",border:"1px solid "+C.border,borderRadius:9,
                fontSize:12,outline:"none",resize:"none",height:80,boxSizing:"border-box",fontFamily:"inherit"}})
          ),

          // Installments (loan only)
          !isCA&&h("div",{style:{marginBottom:11}},
            h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"NUMBER OF CUTOFFS TO PAY"),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}},
              ["2","3","4","6"].map(n=>h("button",{key:n,onClick:()=>setInst(n),
                style:{padding:"10px 0",borderRadius:8,border:`2px solid ${installments===n?"#1565C0":C.border}`,
                  background:installments===n?"#E3F2FD":"#fff",
                  color:installments===n?"#1565C0":C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}},
                n+" cutoffs"))
            ),
            amount&&parseFloat(amount)>0&&h("div",{style:{marginTop:8,padding:"9px 12px",background:"#E3F2FD",borderRadius:8,fontSize:11,color:"#1565C0",fontWeight:600}},
              "₱"+Math.ceil(parseFloat(amount)/parseInt(installments)).toFixed(2)+" deducted per cutoff × "+installments+" = ₱"+parseFloat(amount).toFixed(2)
            )
          ),

          // CA deduction note
          isCA&&amount&&parseFloat(amount)>0&&h("div",{style:{marginBottom:11,padding:"9px 12px",background:"#FFF8E1",borderRadius:8,fontSize:11,color:"#795548",fontWeight:600}},
            "💡 Full ₱"+parseFloat(amount).toFixed(2)+" will be deducted on your NEXT CUTOFF payroll"
          ),

          h("button",{onClick:submit,
            style:{width:"100%",padding:"13px",

              border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}},
            isCA?"📤 Submit CA Request":"📤 Submit Loan Request")
        )
      ),

      // RIGHT: My requests history
      h("div",null,
        h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"14px",marginBottom:10}},
          h("div",{style:{fontWeight:800,fontSize:12,marginBottom:10}},"📋 My Requests"),
          myRequests.length===0
            ?h("div",{style:{textAlign:"center",padding:"20px",color:C.muted,fontSize:11}},"No requests yet")

// ─── HRIS: ADMIN APPROVAL DASHBOARD ──────────────────────
function HRISDashPage({user,db,hrisDB,showT,branches:BRANCHES,hrisEmps=[]}){
  const [requests, setRequests] = useState([]);
  const [filterStatus, setFilter] = useState("pending");
  const [filterBranch, setFilterBranch] = useState("all");
  const [rejectModal, setRejectModal] = useState(null);
  const [rejectReason, setRejectReason] = useState("");

  useEffect(()=>{
    const q = query(collection(db,"hris_requests"), orderBy("timestamp","desc"), limit(200));
    const unsub = onSnapshot(q, snap=>{
      setRequests(snap.docs.map(d=>({...d.data(),_docId:d.id})));
    }, ()=>{});
    return()=>unsub();
  },[]);

  const approve = async(req)=>{
    // 1. Update POS Firestore status
    await updateDoc(doc(db,"hris_requests",req._docId),{
      status:"approved",
      approvedBy: user.name,
      approvedAt: serverTimestamp(),
      balance: req.amount,
    });

    // 2. Push to HRIS Realtime DB as loan deduction entry
    if(hrisDB && req.hrisEmpId){
      try{
        // Load current loans
        const snap = await get(ref(hrisDB,"loans"));
        const existing = snap.val();
        const loans = existing ? (Array.isArray(existing)?existing:Object.values(existing)) : [];
        const newLoan = {
          emp:      req.hrisEmpId,
          empName:  req.staffName,
          type:     req.type==="Cash Advance"?"Cash Advance":"Company Loan",
          amount:   req.amount,
          monthly:  req.cutoffDeduct,
          start:    req.date,
          status:   "Active",
          balance:  req.amount,
          posReqId: req._docId,
          branch:   req.branch,
          reason:   req.reason,
        };
        loans.push(newLoan);
        await set(ref(hrisDB,"loans"), loans);
        showT("Approved & synced to HRIS payroll ✓");
      }catch(e){
        console.warn("HRIS sync failed:",e);
        showT("Approved in POS — HRIS sync failed, add manually","warn");
      }
    } else {
      showT("Approved! No HRIS link — add deduction manually in HRIS","warn");
    }
  };

  const reject = async(req)=>{
    await updateDoc(doc(db,"hris_requests",req._docId),{
      status:"rejected",
      rejectedBy: user.name,
      rejectedAt: serverTimestamp(),
      rejectReason,
    });
    setRejectModal(null);
    setRejectReason("");
    showT("Request rejected");
  };

  const filtered = requests
    .filter(r=>filterStatus==="all"||r.status===filterStatus)
    .filter(r=>filterBranch==="all"||r.branch===filterBranch);

  const pending  = requests.filter(r=>r.status==="pending");
  const approved = requests.filter(r=>r.status==="approved");
  const totalCA  = approved.filter(r=>r.type==="Cash Advance").reduce((s,r)=>s+r.amount,0);
  const totalLoan= approved.filter(r=>r.type==="Cash Loan").reduce((s,r)=>s+r.amount,0);

  return h("div",null,
    h(SectionHeader,{title:"HRIS — CA & Loan Approvals"}),

    // KPI cards
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}},
      h(Stat,{label:"Pending Approval",value:pending.length,icon:"⏳",color:C.warning}),
      h(Stat,{label:"Approved CA",value:"₱"+totalCA.toLocaleString(),icon:"💵",color:C.primary}),
      h(Stat,{label:"Approved Loans",value:"₱"+totalLoan.toLocaleString(),icon:"💸",color:C.info}),
      h(Stat,{label:"HRIS Linked",value:hrisEmps.length+" employees",icon:"🔗",color:C.success})
    ),

    // HRIS link status
    h("div",{style:{background:hrisDB?"#E8F5E9":"#FFF8E1",border:"1px solid "+(hrisDB?"#A5D6A7":"#FFE082"),borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:11,color:hrisDB?"#1B5E20":"#795548"}},
      hrisDB
        ?"✅ Connected to HRIS (chowtime-hris) — approved CAs will auto-sync to payroll deductions"
        :"⚠️ HRIS connection unavailable — approvals will save to POS only"
    ),

    // Filters
    h("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}},
      h("div",{style:{display:"flex",gap:5}},
        ["pending","approved","rejected","all"].map(s=>h("button",{key:s,onClick:()=>setFilter(s),
          style:{padding:"5px 12px",borderRadius:20,border:`1px solid ${filterStatus===s?C.primary:C.border}`,
            background:filterStatus===s?"#FFF0F0":"#fff",color:filterStatus===s?C.primary:C.muted,
            fontSize:10,fontWeight:filterStatus===s?700:400,cursor:"pointer"}},
          s.toUpperCase()+" "+(s==="all"?requests.length:requests.filter(r=>r.status===s).length)))
      ),
      h("select",{value:filterBranch,onChange:e=>setFilterBranch(e.target.value),
        style:{padding:"5px 10px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}},
        h("option",{value:"all"},"All Branches"),
        ...branches.map(b=>h("option",{key:b.id,value:b.id},b.name))
      )
    ),

    // Requests table
    h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
      h("div",{style:{display:"grid",gridTemplateColumns:"100px 130px 1fr 80px 90px 110px 110px",padding:"8px 14px",background:"#f9f9f9",borderBottom:"1px solid #eee"}},
        ["Type","Staff","Reason / Branch","Amount","Cutoff Ded.","Status","Action"].map(h2=>
          h("div",{key:h2,style:{fontSize:8,fontWeight:700,color:C.muted,textTransform:"uppercase"}},h2))
      ),
      filtered.length===0
        ?h("div",{style:{textAlign:"center",padding:"30px",color:C.muted,fontSize:12}},"No requests")
        :filtered.map(req=>h("div",{key:req._docId,
            style:{display:"grid",gridTemplateColumns:"100px 130px 1fr 80px 90px 110px 110px",
              padding:"10px 14px",borderBottom:"1px solid #f5f5f5",alignItems:"center",
              background:req.status==="pending"?"#FFFDE7":"#fff"}},
          h("div",null,
            h(Badge,{label:req.type==="Cash Advance"?"💵 CA":"💸 Loan",
              color:req.type==="Cash Advance"?C.primary:"#1565C0",
              bg:req.type==="Cash Advance"?"#FFF0F0":"#E3F2FD"})
          ),
          h("div",null,
            h("div",{style:{fontSize:11,fontWeight:700}},req.staffName),
            h("div",{style:{fontSize:9,color:C.muted}},branches.find(b=>b.id===req.branch)?.name||req.branch),
            req.hrisEmpId
              ?h("div",{style:{fontSize:8,color:C.success,fontWeight:600}},"🔗 HRIS linked")
              :h("div",{style:{fontSize:8,color:C.warning,fontWeight:600}},"⚠️ No HRIS link")
          ),
          h("div",{style:{fontSize:10,color:C.muted}},req.reason||"—"),
          h("div",{style:{fontSize:12,fontWeight:800,color:C.primary}},"₱"+req.amount.toFixed(2)),
          h("div",null,
            h("div",{style:{fontSize:11,fontWeight:700,color:"#1565C0"}},"₱"+req.cutoffDeduct.toFixed(2)),
            h("div",{style:{fontSize:8,color:C.muted}},req.type==="Cash Advance"?"Full @ cutoff":req.installments+"x cutoffs")
          ),
          h("div",null,h(Badge,{label:req.status.toUpperCase(),
            color:{pending:C.warning,approved:C.success,rejected:C.danger,released:C.info}[req.status]||C.muted})),
          h("div",{style:{display:"flex",gap:5}},
            req.status==="pending"&&h("button",{onClick:()=>approve(req),
              style:{padding:"4px 10px",background:"#E8F5E9",border:"none",borderRadius:6,
                color:C.success,fontSize:10,fontWeight:700,cursor:"pointer"}},"✓ Approve"),
            req.status==="pending"&&h("button",{onClick:()=>setRejectModal(req),
              style:{padding:"4px 9px",background:"#FFEBEE",border:"none",borderRadius:6,
                color:C.danger,fontSize:10,fontWeight:700,cursor:"pointer"}},"✗"),
            req.status==="approved"&&h("div",{style:{fontSize:9,color:C.success,fontWeight:600}},"✅ In payroll")
          )
        ))
    ),

    // Reject modal
    rejectModal&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900}},
      h("div",{style:{background:"#fff",width:360,borderRadius:14,padding:"20px",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
        h("div",{style:{fontWeight:800,fontSize:14,marginBottom:4}},"✗ Reject Request"),
        h("div",{style:{fontSize:11,color:C.muted,marginBottom:14}},"Rejecting CA/Loan of "+rejectModal.staffName+" (₱"+rejectModal.amount+")"),
        h("div",{style:{fontSize:9,fontWeight:700,color:C.muted,marginBottom:5,letterSpacing:1}},"REASON FOR REJECTION"),
        h("textarea",{value:rejectReason,onChange:e=>setRejectReason(e.target.value),
          placeholder:"e.g. Outstanding balance not yet paid, over limit...",
          style:{width:"100%",padding:"9px",border:"1px solid "+C.border,borderRadius:8,
            fontSize:12,outline:"none",resize:"none",height:72,boxSizing:"border-box",fontFamily:"inherit"}}),
        h("div",{style:{display:"flex",gap:8,marginTop:12}},
          h("button",{onClick:()=>reject(rejectModal),
            style:{flex:1,padding:"10px",background:C.danger,border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer"}},"Reject"),
          h("button",{onClick:()=>{setRejectModal(null);setRejectReason("");},
            style:{flex:1,padding:"10px",background:C.bg,border:"1px solid "+C.border,borderRadius:8,fontWeight:700,cursor:"pointer"}},"Cancel")
        )
      )
    )
  );
}

// ─── HRIS: BRANCH TEAM VIEW ───────────────────────────────
function HRISBranchPage({user,branchId,curBranch,db,hrisDB,showT}){
  const [myTeamReqs, setTeamReqs] = useState([]);
  const [hrisEmps, setHrisEmps]   = useState([]);

  useEffect(()=>{
    const q = query(collection(db,"hris_requests"),
      where("branch","==",branchId),orderBy("timestamp","desc"),limit(50));
    const unsub = onSnapshot(q, snap=>{
      setTeamReqs(snap.docs.map(d=>({...d.data(),_docId:d.id})));
    }, ()=>{});
    return()=>unsub();
  },[branchId]);

  useEffect(()=>{
    if(!hrisDB)return;
    onValue(ref(hrisDB,"employees"), snap=>{
      const data=snap.val();
      if(data) setHrisEmps(Array.isArray(data)?data:Object.values(data));
    });
  },[hrisDB]);

  const branchEmps = hrisEmps.filter(e=>
    e.branch===branchId||e.branch===curBranch.name||e.branch===curBranch.full||
    BRANCHES?.find(b=>b.id===branchId)?.name===e.branch
  );

  return h("div",null,
    h(SectionHeader,{title:"My Team — "+curBranch.name}),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}},
      h(Stat,{label:"Pending CA/Loan",value:myTeamReqs.filter(r=>r.status==="pending").length,icon:"⏳",color:C.warning}),
      h(Stat,{label:"Approved This Month",value:myTeamReqs.filter(r=>r.status==="approved").length,icon:"✅",color:C.success}),
      h(Stat,{label:"Total Approved",value:"₱"+myTeamReqs.filter(r=>r.status==="approved").reduce((s,r)=>s+r.amount,0).toLocaleString(),icon:"💵",color:C.primary})
    ),
    h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
      h("div",{style:{padding:"10px 14px",background:"#f9f9f9",borderBottom:"1px solid #eee",fontSize:10,fontWeight:700,color:C.muted}},"TEAM CA & LOAN REQUESTS"),
      myTeamReqs.length===0
        ?h("div",{style:{textAlign:"center",padding:"30px",color:C.muted,fontSize:12}},"No requests from your branch yet")
        :myTeamReqs.map(r=>h("div",{key:r._docId,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #f9f9f9",background:r.status==="pending"?"#FFFDE7":"#fff"}},
          h("div",{style:{width:36,height:36,borderRadius:9,background:r.type==="Cash Advance"?"#FFF0F0":"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}},
            r.type==="Cash Advance"?"💵":"💸"),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:11,fontWeight:700}},r.staffName+" · "+r.type),
            h("div",{style:{fontSize:9,color:C.muted}},r.reason+" · "+r.date),
            r.status==="approved"&&h("div",{style:{fontSize:9,color:C.success,fontWeight:600}},"✅ In payroll · ₱"+r.cutoffDeduct+"/cutoff")
          ),
          h("div",{style:{fontSize:13,fontWeight:900,color:r.type==="Cash Advance"?C.primary:"#1565C0"}},"₱"+r.amount.toFixed(2)),
          h(Badge,{label:r.status.toUpperCase(),color:{pending:C.warning,approved:C.success,rejected:C.danger}[r.status]||C.muted})
        ))
    )
  );
}
