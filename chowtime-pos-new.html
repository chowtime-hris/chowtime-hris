// ─── SALES ANALYTICS + EXPORT ────────────────────────────
function AnalyticsPage({orders,branchId,curBranch,user,db,showT}){
  const [period,setPeriod]   = useState("today");
  const [dateFrom,setFrom]   = useState(new Date().toISOString().slice(0,10));
  const [dateTo,setTo]       = useState(new Date().toISOString().slice(0,10));

  const today = new Date().toISOString().slice(0,10);
  const getWeekStart = ()=>{
    const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().slice(0,10);
  };
  const getMonthStart = ()=>new Date().toISOString().slice(0,8)+"01";

  const periodFrom = period==="today"?today:period==="week"?getWeekStart():period==="month"?getMonthStart():dateFrom;
  const periodTo   = period==="custom"?dateTo:today;

  // Filter orders for this branch+period
  const branchOrders = orders.filter(o=>{
    if(branchId!=="all"&&o.branch!==branchId)return false;
    if(o.status==="void"||o.status==="cancelled")return false;
    const d=(o.timestamp?.toDate?.()?.toISOString()||o.date||"").slice(0,10);
    return d>=periodFrom&&d<=periodTo;
  });

  // Sales by item
  const itemSales = {};
  branchOrders.forEach(o=>{
    (o.items||[]).forEach(item=>{
      if(!itemSales[item.name]) itemSales[item.name]={name:item.name,qty:0,revenue:0,orders:0};
      itemSales[item.name].qty += item.qty||1;
      itemSales[item.name].revenue += (item.price||0)*(item.qty||1);
      itemSales[item.name].orders += 1;
    });
  });
  const itemRanked = Object.values(itemSales).sort((a,b)=>b.qty-a.qty);

  // Sales by payment method
  const payBreakdown = {};
  branchOrders.forEach(o=>{
    const pm = o.payMethod||"cash";
    if(!payBreakdown[pm]) payBreakdown[pm]={method:pm,count:0,total:0};
    payBreakdown[pm].count++;
    payBreakdown[pm].total += o.total||0;
  });

  // Sales by day (for chart data)
  const byDay = {};
  branchOrders.forEach(o=>{
    const d=(o.timestamp?.toDate?.()?.toISOString()||o.date||"").slice(0,10);
    if(!byDay[d]) byDay[d]={date:d,total:0,orders:0};
    byDay[d].total += o.total||0;
    byDay[d].orders++;
  });
  const dayData = Object.values(byDay).sort((a,b)=>a.date.localeCompare(b.date));
  const maxDay = Math.max(...dayData.map(d=>d.total),1);

  const totalRev = branchOrders.reduce((s,o)=>s+(o.total||0),0);
  const totalTxns = branchOrders.length;
  const avgTxn = totalTxns>0?totalRev/totalTxns:0;
  const topItem = itemRanked[0];
  const voidCount = orders.filter(o=>o.branch===branchId&&o.status==="void").length;

  // Export to CSV
  const exportCSV = ()=>{
    const rows=[["Date","Order ID","Items","Qty","Payment","Total","Cashier","Branch"]];
    branchOrders.forEach(o=>{
      rows.push([
        (o.timestamp?.toDate?.()?.toISOString()||"").slice(0,10),
        o.id||"",
        (o.items||[]).map(i=>i.qty+"x "+i.name).join("; "),
        (o.items||[]).reduce((s,i)=>s+(i.qty||1),0),
        o.payMethod||"cash",
        (o.total||0).toFixed(2),
        o.cashier||"",
        o.branch||""
      ]);
    });
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download="chowtime-sales-"+periodFrom+"-to-"+periodTo+".csv";
    a.click();
    URL.revokeObjectURL(url);
    showT("Exported "+branchOrders.length+" orders as CSV ✓");
  };

  // Export item summary
  const exportItemSummary = ()=>{
    const rows=[["Item","Qty Sold","Revenue","# Orders"]];
    itemRanked.forEach(i=>rows.push([i.name,i.qty,"₱"+i.revenue.toFixed(2),i.orders]));
    const csv = rows.map(r=>r.join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download="chowtime-items-"+periodFrom+"-to-"+periodTo+".csv";
    a.click();
    URL.revokeObjectURL(url);
    showT("Item summary exported ✓");
  };

  const pmColors={cash:"#2E7D32",gcash:"#0070FF",maya:"#00C853",bank:"#1565C0",foodpanda:"#D70F64",grabfood:"#00B14F"};
  const pmLabels={cash:"💵 Cash",gcash:"💙 GCash",maya:"🟢 Maya",bank:"🏦 Bank Transfer",foodpanda:"🐼 FoodPanda",grabfood:"🟢 GrabFood"};

  return h("div",null,
    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        h("h2",{style:{margin:0,fontSize:17,fontWeight:800}},"📈 Sales Analytics"),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},curBranch.name+" · "+periodFrom+(periodFrom!==periodTo?" to "+periodTo:""))
      ),
      h("div",{style:{display:"flex",gap:7}},
        h("button",{onClick:exportCSV,
          style:{padding:"7px 13px",background:"#E8F5E9",border:"1px solid #A5D6A7",
            borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",color:"#1B5E20"}},
          "📥 Export Orders CSV"),
        h("button",{onClick:exportItemSummary,
          style:{padding:"7px 13px",background:"#E3F2FD",border:"1px solid #90CAF9",
            borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",color:"#1565C0"}},
          "📥 Export Items CSV")
      )
    ),

    // Period selector
    h("div",{style:{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}},
      ["today","week","month","custom"].map(p=>h("button",{key:p,onClick:()=>setPeriod(p),
        style:{padding:"6px 14px",borderRadius:20,
          border:`1px solid ${period===p?C.primary:C.border}`,
          background:period===p?"#FFF0F0":"#fff",
          color:period===p?C.primary:C.muted,
          fontWeight:period===p?700:400,fontSize:11,cursor:"pointer"}},
        {today:"Today",week:"This Week",month:"This Month",custom:"Custom"}[p])),
      period==="custom"&&h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        h("input",{type:"date",value:dateFrom,onChange:e=>setFrom(e.target.value),
          style:{padding:"5px 8px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}}),
        h("span",{style:{fontSize:11,color:C.muted}},"to"),
        h("input",{type:"date",value:dateTo,onChange:e=>setTo(e.target.value),
          style:{padding:"5px 8px",border:"1px solid "+C.border,borderRadius:7,fontSize:11,outline:"none"}})
      )
    ),

    // KPI Cards
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}},
      h(Stat,{label:"Total Revenue",value:"₱"+totalRev.toFixed(2),icon:"💰",color:C.primary}),
      h(Stat,{label:"Transactions",value:totalTxns,icon:"🧾",color:C.info}),
      h(Stat,{label:"Avg per Txn",value:"₱"+avgTxn.toFixed(2),icon:"📊",color:C.success}),
      h(Stat,{label:"Top Item",value:topItem?.name||"—",sub:topItem?topItem.qty+"x sold":"",icon:"🏆",color:C.warning}),
      h(Stat,{label:"Void Orders",value:voidCount,icon:"🚫",color:C.danger})
    ),

    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:12}},

      // Sales trend chart (bar)
      h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px"}},
        h("div",{style:{fontWeight:800,fontSize:12,marginBottom:12}},"📊 Sales Trend"),
        dayData.length===0
          ?h("div",{style:{textAlign:"center",padding:"20px",color:C.muted,fontSize:11}},"No data for this period")
          :h("div",{style:{display:"flex",alignItems:"flex-end",gap:4,height:120,overflowX:"auto"}},
            dayData.map(d=>h("div",{key:d.date,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1,minWidth:32}},
              h("div",{style:{fontSize:8,color:C.muted,fontWeight:600}},"₱"+Math.round(d.total/1000)+"k"),
              h("div",{style:{width:"100%",background:`linear-gradient(180deg,${C.primary},${C.dark})`,
                borderRadius:"4px 4px 0 0",
                height:Math.max(4,(d.total/maxDay)*100)+"px",transition:"all .3s"}}),
              h("div",{style:{fontSize:7,color:C.muted,textAlign:"center"}},d.date.slice(5))
            ))
          )
      ),

      // Payment breakdown
      h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"16px"}},
        h("div",{style:{fontWeight:800,fontSize:12,marginBottom:10}},"💳 By Payment"),
        Object.values(payBreakdown).length===0
          ?h("div",{style:{textAlign:"center",padding:"20px",color:C.muted,fontSize:11}},"No data")
          :Object.values(payBreakdown).sort((a,b)=>b.total-a.total).map(pm=>
            h("div",{key:pm.method,style:{marginBottom:8}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                h("span",{style:{fontSize:10,fontWeight:700}},pmLabels[pm.method]||pm.method),
                h("span",{style:{fontSize:10,fontWeight:800,color:pmColors[pm.method]||C.text}},
                  "₱"+pm.total.toFixed(2))
              ),
              h("div",{style:{height:6,borderRadius:3,background:"#f5f5f5"}},
                h("div",{style:{height:"100%",borderRadius:3,transition:"all .3s",
                  background:pmColors[pm.method]||C.primary,
                  width:(pm.total/totalRev*100||0)+"%"}}))
            )
          )
      )
    ),

    // Best sellers table
    h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
      h("div",{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",
        alignItems:"center",borderBottom:"1px solid #eee"}},
        h("div",{style:{fontWeight:800,fontSize:12}},"🏆 Best Sellers — "+periodFrom+(periodFrom!==periodTo?" to "+periodTo:"")),
        h("div",{style:{fontSize:10,color:C.muted}},itemRanked.length+" unique items sold")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"30px 1fr 80px 100px 90px",
        padding:"7px 14px",background:"#f9f9f9",borderBottom:"1px solid #eee"}},
        ["#","Item","Qty Sold","Revenue","% of Sales"].map(h2=>
          h("div",{key:h2,style:{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:1}},h2))
      ),
      itemRanked.length===0
        ?h("div",{style:{textAlign:"center",padding:"30px",color:C.muted,fontSize:11}},"No sales data for this period")
        :itemRanked.map((item,i)=>h("div",{key:item.name,
          style:{display:"grid",gridTemplateColumns:"30px 1fr 80px 100px 90px",
            padding:"10px 14px",borderBottom:"1px solid #f5f5f5",alignItems:"center",
            background:i===0?"#FFFDE7":i===1?"#F9FBE7":i===2?"#F1F8E9":"#fff"}},
          h("div",{style:{fontSize:12,fontWeight:900,
            color:i===0?"#F57F17":i===1?"#9E9E9E":i===2?"#6D4C41":C.muted}},
            i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1),
          h("div",null,
            h("div",{style:{fontSize:11,fontWeight:700}},item.name),
            h("div",{style:{fontSize:9,color:C.muted}},item.orders+" orders")
          ),
          h("div",{style:{fontSize:12,fontWeight:800,color:C.info}},item.qty+" pcs"),
          h("div",{style:{fontSize:11,fontWeight:700,color:C.primary}},"₱"+item.revenue.toFixed(2)),
          h("div",null,
            h("div",{style:{fontSize:10,fontWeight:700,color:C.text,marginBottom:3}},
              totalRev>0?(item.revenue/totalRev*100).toFixed(1)+"%":"0%"),
            h("div",{style:{height:5,borderRadius:3,background:"#f5f5f5"}},
              h("div",{style:{height:"100%",borderRadius:3,
                background:`linear-gradient(90deg,${C.primary},${C.dark})`,
                width:totalRev>0?(item.revenue/totalRev*100)+"%":"0%"}}))
          )
        ))
    )
  );
}

// ─── VOID BADGE (header alert) ───────────────────────────
function VoidBadge({branchId,db,setPage}){
  const [count,setCount] = useState(0);
  useEffect(()=>{
    if(!branchId)return;
    const q = query(collection(db,"void_requests"),
      where("branch","==",branchId),where("status","==","pending"));
    const unsub = onSnapshot(q,snap=>setCount(snap.size),()=>{});
    return()=>unsub();
  },[branchId]);
  if(!count)return null;
  return h("button",{onClick:()=>setPage("void_requests"),
    style:{padding:"4px 10px",background:"#FFEBEE",border:"1px solid #FFCDD2",
      borderRadius:20,fontSize:9,color:"#C62828",fontWeight:700,cursor:"pointer"}},
    "🚫 "+count+" void pending");
}

// ─── MAIN APP ─────────────────────────────────────────────
function App(){
  // Auth
  const [user,setUser]=useState(null);
  const [branches,setBranches]=useState(BRANCHES);
  const [branchOverrides,setBranchOverrides]=useState({});
  const [branchPerms,setBranchPerms]=useState({});
  const [authLoading,setAuthLoading]=useState(true);
  const [loginEmail,setLoginEmail]=useState("");
  const [loginPw,setLoginPw]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [loginLoading,setLoginLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);
  const [forgotSent,setForgotSent]=useState(false);
  // Keep these for edit PIN modal compatibility
  const [pin,setPin]=useState("");
  const [editingStaff,setEditingStaff]=useState(null);
  const [newPin,setNewPin]=useState("");
  // Nav
  const [page,setPage]=useState(null);
  // Firebase data (real-time)
  const [orders,setOrders]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [cashLog,setCashLog]=useState([]);
  const [advances,setAdvances]=useState([]);
  const [inventory,setInventory]=useState(INIT_INVENTORY);
  const [staff,setStaff]=useState([]);
  const [hrisEmps,setHrisEmps]=useState([]); // employees from HRIS RTDB
  const [menuItems,setMenuItems]=useState(MENU_CATALOG);
  // POS
  const [cart,setCart]=useState([]);
  const [customizing,setCustomizing]=useState(null);
  const [menuCat,setMenuCat]=useState("All");
  const [menuSrch,setMenuSrch]=useState("");
  const [cartOpen,setCartOpen]=useState(false);
  // Checkout fields
  const [chkDisc,setChkDisc]=useState(DISCS[0]);
  const [chkDiscId,setChkDiscId]=useState("");
  const [chkCust,setChkCust]=useState("");
  const [chkTable,setChkTable]=useState("");
  const [chkType,setChkType]=useState("dine-in");
  const [chkPay,setChkPay]=useState("cash");
  const [chkCash,setChkCash]=useState("");
  // Modals & forms
  const [modal,setModal]=useState(null);
  const [curOrd,setCurOrd]=useState(null);
  const [toast,setToast]=useState(null);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [hrisReady,setHrisReady]=useState(false);
  const [dbReady,setDbReady]=useState(false);
  const [newExp,setNewExp]=useState({cat:"Utilities",desc:"",amount:""});
  const [newCash,setNewCash]=useState({type:"in",desc:"",amount:""});
  const [newAdv,setNewAdv]=useState({staff:"",amount:"",reason:"",deductDate:""});
  const [newStaff,setNewStaff]=useState({name:"",role:"cashier",branch:"ct-wsfp",email:"",password:""});

  const [invSrch,setInvSrch]=useState("");
  const [ordCounter,setOrdCounter]=useState(1);

  const showT=(m,t="ok")=>setToast({msg:m,type:t});

  // ── AUTH HANDLERS ────────────────────────────────────────
  const handleLogin=async()=>{
    if(!loginEmail||!loginPw){setLoginErr("Enter your email and password");return;}
    setLoginLoading(true);setLoginErr("");
    try{
      await signInWithEmailAndPassword(auth,loginEmail.trim(),loginPw);
      // onAuthStateChanged will handle the rest
    }catch(e){
      const msgs={
        "auth/invalid-credential":"Wrong email or password",
        "auth/user-not-found":"Email not found. Contact your admin.",
        "auth/wrong-password":"Wrong password",
        "auth/invalid-email":"Invalid email format",
        "auth/too-many-requests":"Too many attempts. Try again later.",
        "auth/network-request-failed":"No internet connection",
      };
      setLoginErr(msgs[e.code]||"Login failed: "+e.message);
      setLoginLoading(false);
    }
  };

  const handleForgotPw=async()=>{
    if(!loginEmail){setLoginErr("Enter your email first");return;}
    try{
      await sendPasswordResetEmail(auth,loginEmail.trim());
      setForgotSent(true);
      setTimeout(()=>setForgotSent(false),5000);
    }catch(e){setLoginErr("Could not send reset email");}
  };

  const handleSignOut=async()=>{
    await signOut(auth);
    setCart([]);setPage(null);setOrders([]);
    setExpenses([]);setCashLog([]);setAdvances([]);
    setLoginEmail("");setLoginPw("");setLoginErr("");
  };

  // ── ONLINE STATUS ────────────────────────────────────────
  useEffect(()=>{
    const on=()=>setIsOnline(true);
    const off=()=>setIsOnline(false);
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  // ── FIREBASE LISTENERS ───────────────────────────────────
  useEffect(()=>{
    if(!user)return;
    const unsubs=[];
    const isOwner=user.role==="owner";
    const bId=user.branch==="all"||user.branch==="comm"?"ct-wsfp":user.branch;

    // Orders
    try{
      // Owner gets ALL orders (no where filter = no index needed)
      // Branch staff gets filtered by branch
      const oq=isOwner
        ?query(collection(db,"orders"),limit(300))
        :query(collection(db,"orders"),where("branch","==",bId),limit(100));
      unsubs.push(onSnapshot(oq,snap=>{
        const all=snap.docs.map(d=>({...d.data(),_docId:d.id}));
        // Sort client-side to avoid needing composite index
        all.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));
        setOrders(all);
        setDbReady(true);
      },err=>{console.warn("Orders:",err.message);setDbReady(true);}));
    }catch(e){console.warn("Orders query:",e);}

    // Expenses
    try{
      const eq=isOwner
        ?query(collection(db,"expenses"),orderBy("timestamp","desc"),limit(100))
        :query(collection(db,"expenses"),where("branch","==",bId),orderBy("timestamp","desc"),limit(50));
      unsubs.push(onSnapshot(eq,snap=>setExpenses(snap.docs.map(d=>({...d.data(),_docId:d.id}))),()=>{}));
    }catch(e){}

    // Cash log
    try{
      const cq=isOwner
        ?query(collection(db,"cash_log"),orderBy("timestamp","desc"),limit(100))

          h(SectionHeader,{title:"Receive Stocks — Check DR vs PO"}),
          h("div",{style:{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:10,padding:"10px 14px",marginBottom:13,fontSize:11,color:"#795548"}},"⚖️ Check actual delivered quantities against your PO. Flag any discrepancy before confirming receipt."),
          advances.filter(a=>a._type==="po"&&a.branch===branchId&&a.status==="approved").length===0
            ?h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"30px",textAlign:"center",color:C.muted,fontSize:12}},"No pending deliveries. Orders for delivery will appear here.")
            :advances.filter(a=>a._type==="po"&&a.branch===branchId&&a.status==="approved").map(po=>
              h(DRCheckForm,{key:po._docId,po,db,branchId,user,showT,INIT_INVENTORY,setAdvances,advances})
            )
        ),

        // ══ PO MONITOR (Owner sees all POs across branches) ══
        page==="po_monitor"&&h("div",null,
          h(SectionHeader,{title:"Purchase Order Monitor — All Branches"}),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:13}},
            h(Stat,{label:"Total POs",value:advances.filter(a=>a._type==="po").length,icon:"📋",color:C.primary}),
            h(Stat,{label:"Pending",value:advances.filter(a=>a._type==="po"&&a.status==="pending").length,icon:"⏳",color:C.warning}),
            h(Stat,{label:"For Delivery",value:advances.filter(a=>a._type==="po"&&a.status==="approved").length,icon:"🚚",color:C.info}),
            h(Stat,{label:"Unpaid DRs",value:advances.filter(a=>a._type==="po"&&a.paymentStatus==="Unpaid"&&a.status==="delivered").length,icon:"💳",color:C.danger})
          ),
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}},
            h("div",{style:{display:"grid",gridTemplateColumns:"90px 100px 1fr 110px 110px 100px 90px",padding:"8px 14px",background:"#f9f9f9",borderBottom:"1px solid #eee"}},
              ["PO #","Branch","Items","Requested","Delivery","Status","Payment"].map(h2=>h("div",{key:h2,style:{fontSize:8,fontWeight:700,color:C.muted,textTransform:"uppercase"}},h2))
            ),
            advances.filter(a=>a._type==="po").length===0
              ?h("div",{style:{textAlign:"center",padding:"30px",color:C.muted,fontSize:12}},"No POs yet")
              :advances.filter(a=>a._type==="po").map(po=>h("div",{key:po._docId,style:{display:"grid",gridTemplateColumns:"90px 100px 1fr 110px 110px 100px 90px",padding:"10px 14px",borderBottom:"1px solid #f5f5f5",alignItems:"center"}},
                h("div",{style:{fontSize:10,fontWeight:800,color:C.primary}},po.poNum||"—"),
                h("div",null,
                  h("div",{style:{fontSize:9,fontWeight:700}},branches.find(b=>b.id===po.branch)?.name||po.branch),
                ),
                h("div",{style:{fontSize:9,color:C.muted}},(po.items||[]).map(i=>i.qty+"x "+i.name).join(", ").slice(0,45)),
                h("div",{style:{fontSize:9}},po.date||"—"),
                h("div",{style:{fontSize:9,fontWeight:po.deliveryDate?700:400,color:po.deliveryDate?C.info:C.muted}},po.deliveryDate||"TBD"),
                h("div",null,h(Badge,{label:po.status||"pending",color:{pending:C.warning,approved:C.info,delivered:C.success,cancelled:C.danger}[po.status]||C.muted})),
                h("div",{style:{display:"flex",flexDirection:"column",gap:3}},
                  h(Badge,{label:po.paymentStatus||"Unpaid",color:{Unpaid:C.danger,Partial:C.warning,Paid:C.success}[po.paymentStatus]||C.muted}),
                  po.status==="delivered"&&(po.paymentStatus==="Unpaid"||po.paymentStatus==="Partial")&&user.role==="owner"&&
                    h("button",{onClick:async()=>{
                      if(po._docId)await updateDoc(doc(db,"advances",po._docId),{paymentStatus:"Paid",paidBy:user.name,paidAt:serverTimestamp()});
                      showT(po.poNum+" marked Paid ✓");
                    },style:{fontSize:8,padding:"2px 7px",background:C.success,border:"none",borderRadius:5,color:"#fff",cursor:"pointer",fontWeight:700}},"Mark Paid")
                )
              ))
          )
        ),

        // ══ COMM DR (Commissary issues DR to branch) ══
        page==="comm_dr"&&h("div",null,
          h(SectionHeader,{title:"Issue Delivery Receipt (DR)"}),
          h("div",{style:{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:10,padding:"10px 14px",marginBottom:13,fontSize:11,color:"#1B5E20"}},"🚚 Approve a branch PO, set the delivery date, enter actual quantities delivered, then issue the DR."),
          advances.filter(a=>a._type==="po"&&(a.status==="pending"||a.status==="approved")).length===0
            ?h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid "+C.border,padding:"30px",textAlign:"center",color:C.muted,fontSize:12}},"No pending branch orders.")
            :advances.filter(a=>a._type==="po"&&(a.status==="pending"||a.status==="approved")).map(po=>
              h(DRIssueForm,{key:po._docId,po,db,user,showT,INIT_INVENTORY,advances,setAdvances})
            )
        ),


                (page==="commissary"||page==="comm_dash"||page==="comm_inv"||page==="comm_orders")&&h("div",null,
          page==="commissary"&&h("div",null,
            h(SectionHeader,{title:"Order from Commissary"}),
            h("div",{style:{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:9,padding:"8px 13px",marginBottom:11,fontSize:10,color:"#795548"}},"📦 Frozen products — delivered 24-48 hrs · Orders synced to Firebase"),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:7}},
              inventory.map(item=>h("div",{key:item.id,style:{background:"#fff",borderRadius:10,padding:"11px 12px",border:`1px solid ${(item._order||0)>0?C.primary:C.border}`}},
                h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                  h("div",null,h("div",{style:{fontWeight:700,fontSize:11}},item.name),h("div",{style:{fontSize:9,color:C.muted}},"₱"+(item.price||0)+"/"+(item.unit||""))),
                  h("span",{style:{fontSize:8,padding:"2px 6px",background:"#E8F5E9",color:C.success,borderRadius:20,fontWeight:700}},(item.stock||0)+" avail")
                ),
                h("div",{style:{display:"flex",alignItems:"center",gap:7}},
                  h("span",{style:{fontSize:9,color:C.muted,flex:1}},"Qty:"),
                  h("button",{onClick:()=>setInventory(p=>p.map(x=>x.id===item.id?{...x,_order:Math.max(0,(x._order||0)-1)}:x)),style:{width:23,height:23,borderRadius:5,border:"1px solid "+C.border,background:C.bg,cursor:"pointer",fontSize:13,fontWeight:900}},"−"),
                  h("span",{style:{minWidth:22,textAlign:"center",fontWeight:900,fontSize:12,color:(item._order||0)>0?C.primary:C.text}},item._order||0),
                  h("button",{onClick:()=>setInventory(p=>p.map(x=>x.id===item.id?{...x,_order:(x._order||0)+1}:x)),style:{width:23,height:23,borderRadius:5,border:`1px solid ${C.primary}`,background:"#FFF0F0",cursor:"pointer",fontWeight:900,color:C.primary,fontSize:13}},"+")
                )
              ))
            ),
            h("div",{style:{position:"sticky",bottom:0,background:`linear-gradient(transparent,${C.bg})`,paddingTop:10,marginTop:8}},
              h("div",{style:{background:"#fff",borderRadius:11,padding:"11px 16px",border:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -4px 14px rgba(0,0,0,.05)"}},
                h("div",null,h("b",null,inventory.reduce((s,i)=>s+(i._order||0),0)+" items"),h("div",{style:{fontSize:10,color:C.muted}},"Est. ₱"+inventory.reduce((s,i)=>s+(i._order||0)*(i.price||0),0).toLocaleString())),
                h("button",{onClick:async()=>{
                  if(!inventory.some(i=>i._order>0)){showT("Add items first","warn");return;}
                  const items=inventory.filter(i=>i._order>0).map(i=>({name:i.name,qty:i._order,unit:i.unit}));
                  await addDoc(collection(db,"comm_orders"),{
                    branch:branchId,
                    branchName:branches.find(b=>b.id===branchId)?.full||branchId,
                    items,status:"pending",
                    requestedBy:user.name,
                    timestamp:serverTimestamp()
                  });
                  setInventory(p=>p.map(x=>({...x,_order:0})));
                  showT("Order submitted to Commissary ✓");
                },style:{padding:"9px 20px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}},"Submit →")
              )
            )
          ),
          page==="comm_dash"&&h("div",null,
            h(SectionHeader,{title:"Commissary Dashboard"}),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}},
              h(Stat,{label:"Items in Stock",value:inventory.length,icon:"❄️",color:C.info}),
              h(Stat,{label:"Active Branches",value:BRANCHES.length,icon:"🏪",color:C.success}),
              h(Stat,{label:"Inventory Value",value:"₱"+inventory.reduce((s,i)=>s+(i.stock||0)*(i.cost||0),0).toLocaleString(),icon:"💰",color:C.primary})
            ),
            h("div",{style:{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:10,padding:"10px 14px",fontSize:11,color:"#795548"}},
              "💡 When you ",h("b",null,"Fulfill")," a branch order, stock is automatically added to that branch's freezer inventory in Firebase."
            )
          )
        )

      ) // end page content
    ) // end main
  ,

    // ITEM CUSTOMIZER MODAL
    customizing&&h(ItemCustomizer,{item:customizing,onAdd:addToCart,onClose:()=>setCustomizing(null)}),

    // CART SIDEBAR
    cartOpen&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:880,display:"flex",alignItems:"stretch",justifyContent:"flex-end"},onClick:e=>e.target===e.currentTarget&&setCartOpen(false)},
      h("div",{style:{background:"#fff",width:320,display:"flex",flexDirection:"column",boxShadow:"-8px 0 40px rgba(0,0,0,.15)"}},
        h("div",{style:{padding:"13px 15px 10px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between"}},
          h("b",{style:{fontSize:13}},"🛒 Order ("+cartCount+")"),
          h("button",{onClick:()=>setCartOpen(false),style:{width:26,height:26,borderRadius:"50%",background:C.bg,border:"none",fontSize:16,cursor:"pointer"}},"×")
        ),
        h("div",{style:{flex:1,overflowY:"auto",padding:"8px 14px"}},
          !cart.length
            ?h("div",{style:{textAlign:"center",padding:"36px 14px",color:C.muted}},h("div",{style:{fontSize:36,marginBottom:7}},"🛒"),h("div",{style:{fontSize:11}},"Tap + on menu items to add"))
            :cart.map(item=>h("div",{key:item.cartId,style:{background:C.bg,borderRadius:10,padding:"9px 11px",marginBottom:7}},
              h("div",{style:{display:"flex",gap:8,marginBottom:6}},
                h("span",{style:{fontSize:18,flexShrink:0}},item.emoji),
                h("div",{style:{flex:1}},
                  h("div",{style:{display:"flex",justifyContent:"space-between"}},
                    h("div",{style:{fontWeight:700,fontSize:11}},item.name),
                    h("button",{onClick:()=>rmCart(item.cartId),style:{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:12}},"🗑")
                  ),
                  item.variant&&h("div",{style:{fontSize:9,color:C.muted}},"📦 "+item.variant),
                  item.options?.length>0&&h("div",{style:{fontSize:9,color:C.muted}},"✓ "+item.options.join(" · ")),
                  item.isBogo&&h("div",{style:{fontSize:9,color:"#FF4B2B",fontWeight:700}},"🎉 BOGO – 1 FREE!"),
                  item.note&&h("div",{style:{fontSize:9,color:C.muted,fontStyle:"italic"}},'"'+item.note+'"')
                )
              ),
              h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:6,background:"#fff",borderRadius:7,padding:"3px"}},
                  h("button",{onClick:()=>chgQty(item.cartId,-1),style:{width:22,height:22,borderRadius:5,border:"none",background:item.qty>1?C.primary:"#eee",cursor:item.qty>1?"pointer":"default",color:item.qty>1?"#fff":"#ccc",fontSize:14,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}},"−"),
                  h("span",{style:{minWidth:18,textAlign:"center",fontWeight:800,fontSize:12}},item.qty),
                  h("button",{onClick:()=>chgQty(item.cartId,1),style:{width:22,height:22,borderRadius:5,border:"none",background:C.primary,cursor:"pointer",color:"#fff",fontSize:14,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}},"+")
                ),
                h("div",{style:{fontWeight:900,fontSize:13,color:C.primary}},"₱"+item.lineTotal.toFixed(2))
              )
            ))
        ),
        cart.length>0&&h("div",{style:{padding:"10px 14px 16px",borderTop:"1px solid "+C.border}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:800,marginBottom:9}},h("span",null,"Subtotal"),h("span",null,"₱"+cartTotal.toFixed(2))),
          h("button",{onClick:()=>{setCartOpen(false);setModal("checkout");},style:{width:"100%",padding:"12px",background:`linear-gradient(135deg,${C.primary},${C.dark})`,border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}},"Proceed to Checkout →")
        )
      )
    ),

    // CHECKOUT + RECEIPT MODALS
    modal==="checkout"&&h(CheckoutModal,null),
    modal==="receipt"&&curOrd&&h(ReceiptModal,{ord:curOrd}),
    toast&&h(Toast,{msg:toast.msg,type:toast.type,onDone:()=>setToast(null)})

  ); // end layout return
} // end App

try{
  createRoot(document.getElementById("root")).render(h(App));
}catch(err){
  document.getElementById("root").innerHTML=
    '<div style="font-family:monospace;padding:30px;background:#1a1a2e;min-height:100vh;color:#fff">'+
    '<div style="font-size:40px;margin-bottom:16px">⚠️</div>'+
    '<div style="font-size:20px;font-weight:900;color:#ff6b6b;margin-bottom:8px">ChowTime POS — Startup Error</div>'+
    '<div style="font-size:13px;color:#ffd93d;margin-bottom:16px">'+err.message+'</div>'+
    '<div style="font-size:11px;color:#aaa;background:#0d0d1a;padding:12px;border-radius:8px">'+
    'Steps to fix:<br>'+
    '1. Open Firebase Console → Firestore → Rules<br>'+
    '2. Set: allow read, write: if request.auth != null;<br>'+
    '3. Publish rules → refresh this page<br>'+
    '4. Make sure Authentication → Email/Password is enabled'+
    '</div></div>';
}
</script>
</body>
</html>
