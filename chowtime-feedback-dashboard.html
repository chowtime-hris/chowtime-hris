<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chowtime — Feedback Dashboard (Staff)</title>
<style>
  :root{
    --maroon:#7A1E2E;
    --maroon-dark:#5C1522;
    --gold:#C9A227;
    --gold-light:#E8C55A;
    --cream:#FDF8F0;
    --cream-card:#FFFFFF;
    --tan:#F3EAD8;
    --ink:#2B1A1D;
    --muted:#8A7A6D;
    --line:#E8DFCF;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
  }

  /* ---- PIN gate ---- */
  .gate{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .gate .logo-badge{
    width:52px;
    height:52px;
    background:var(--gold);
    color:var(--maroon-dark);
    border-radius:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:20px;
    margin-bottom:16px;
  }
  .gate h1{
    color:var(--maroon);
    font-size:19px;
    margin:0 0 6px;
  }
  .gate p{
    color:var(--muted);
    font-size:13.5px;
    margin:0 0 22px;
  }
  .pin-input{
    width:100%;
    max-width:220px;
    padding:14px;
    font-size:24px;
    letter-spacing:8px;
    text-align:center;
    border:1.5px solid var(--line);
    border-radius:10px;
    margin-bottom:14px;
  }
  .gate-btn{
    background:var(--maroon);
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:9px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .gate-error{
    color:#B8433A;
    font-size:13px;
    margin-top:10px;
    min-height:18px;
  }

  /* ---- Dashboard ---- */
  .dash-header{
    background:var(--maroon);
    color:#fff;
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .dash-header h1{margin:0;font-size:18px;}
  .dash-header button{
    background:none;
    border:1px solid rgba(255,255,255,.4);
    color:#fff;
    font-size:12px;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
  }
  main{padding:18px 16px 40px;}
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:16px;
  }
  .stat{
    background:var(--cream-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
  }
  .stat .num{font-size:22px;font-weight:800;color:var(--maroon);}
  .stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:2px;}
  .fb-filters select{
    padding:8px 10px;
    border-radius:7px;
    border:1px solid var(--line);
    font-size:13px;
    background:#fff;
    margin-bottom:14px;
  }
  .fb-card{
    background:var(--cream-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .fb-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
  }
  .fb-store{font-weight:700;color:var(--maroon-dark);font-size:14.5px;}
  .fb-date{font-size:11.5px;color:var(--muted);}
  .fb-stars-row{
    display:flex;
    gap:14px;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .fb-stars-row b{color:var(--gold-light);color:#B8860B;}
  .fb-comment{
    font-size:13.5px;
    color:var(--ink);
    background:var(--tan);
    padding:8px 10px;
    border-radius:7px;
    margin-top:4px;
  }
  .low-flag{
    display:inline-block;
    background:var(--maroon);
    color:#fff;
    font-size:10.5px;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    margin-left:6px;
  }
  .empty{
    text-align:center;
    color:var(--muted);
    padding:50px 20px;
    font-size:14px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="gate" id="gateScreen">
    <div class="logo-badge">CT</div>
    <h1>Feedback Dashboard</h1>
    <p>Staff access only. Enter your PIN to continue.</p>
    <input type="password" inputmode="numeric" maxlength="6" class="pin-input" id="pinInput" placeholder="••••">
    <button class="gate-btn" id="pinSubmit">Unlock</button>
    <div class="gate-error" id="pinError"></div>
  </div>

  <div id="dashboardScreen" style="display:none;">
    <div class="dash-header">
      <h1>Feedback Dashboard</h1>
      <button id="lockBtn">Lock</button>
    </div>
    <main>
      <div class="stat-grid" id="statGrid"></div>
      <div class="fb-filters">
        <select id="filterStore">
          <option value="">All Stores</option>
          <option>WSFP</option>
          <option>WMBL</option>
          <option>Store 3</option>
          <option>Store 4</option>
          <option>Store 5</option>
        </select>
      </div>
      <div id="fbList"></div>
    </main>
  </div>

</div>

<script>
// Change this PIN to whatever you want staff to use.
const STAFF_PIN = '1234';

function checkPin(){
  const val = document.getElementById('pinInput').value.trim();
  if (val === STAFF_PIN){
    sessionStorage.setItem('chowtime_fb_unlocked', '1');
    showDashboard();
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pinInput').value = '';
  }
}
document.getElementById('pinSubmit').addEventListener('click', checkPin);
document.getElementById('pinInput').addEventListener('keydown', (e)=>{
  if (e.key === 'Enter') checkPin();
});
document.getElementById('lockBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem('chowtime_fb_unlocked');
  document.getElementById('dashboardScreen').style.display = 'none';
  document.getElementById('gateScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
});

function showDashboard(){
  document.getElementById('gateScreen').style.display = 'none';
  document.getElementById('dashboardScreen').style.display = 'block';
  loadDashboard();
}

// Stay unlocked for this browser tab session only
if (sessionStorage.getItem('chowtime_fb_unlocked') === '1'){
  showDashboard();
}

document.getElementById('filterStore').addEventListener('change', loadDashboard);

async function waitForStorage(){
  let tries = 0;
  while (!window.storage && tries < 50){
    await new Promise(r=>setTimeout(r, 100));
    tries++;
  }
  if (!window.storage) throw new Error('Database connection not ready');
}

async function loadDashboard(){
  const listEl = document.getElementById('fbList');
  const statEl = document.getElementById('statGrid');
  listEl.innerHTML = '<div class="empty">Loading...</div>';
  try {
    await waitForStorage();
    const keys = await window.storage.list('feedback_', true);
    if (!keys || !keys.keys || keys.keys.length === 0){
      listEl.innerHTML = '<div class="empty">No feedback yet.</div>';
      statEl.innerHTML = '';
      return;
    }
    const records = [];
    for (const k of keys.keys){
      try {
        const res = await window.storage.get(k, true);
        if (res && res.value) records.push(JSON.parse(res.value));
      } catch(e){}
    }
    records.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));

    const filterStore = document.getElementById('filterStore').value;
    const filtered = filterStore ? records.filter(r=>r.store === filterStore) : records;

    if (records.length > 0){
      const avgAll = Math.round((records.reduce((s,r)=>s+r.avg,0)/records.length)*10)/10;
      const lowCount = records.filter(r=>r.avg <= 2.5).length;
      statEl.innerHTML = `
        <div class="stat"><div class="num">${records.length}</div><div class="lbl">Total Reviews</div></div>
        <div class="stat"><div class="num">${avgAll}★</div><div class="lbl">Avg Rating</div></div>
        <div class="stat"><div class="num">${lowCount}</div><div class="lbl">Low Ratings</div></div>
      `;
    } else {
      statEl.innerHTML = '';
    }

    if (filtered.length === 0){
      listEl.innerHTML = '<div class="empty">No feedback for this store yet.</div>';
      return;
    }

    listEl.innerHTML = '';
    filtered.forEach(r=>{
      const div = document.createElement('div');
      div.className = 'fb-card';
      div.innerHTML = `
        <div class="fb-top">
          <div class="fb-store">${r.store} ${r.avg <= 2.5 ? '<span class="low-flag">LOW</span>' : ''}</div>
          <div class="fb-date">${new Date(r.createdAt).toLocaleDateString()}</div>
        </div>
        <div class="fb-stars-row">
          <div>Food: <b>${r.food}★</b></div>
          <div>Service: <b>${r.service}★</b></div>
          <div>Clean: <b>${r.clean}★</b></div>
        </div>
        ${r.comment ? `<div class="fb-comment">"${r.comment}"</div>` : ''}
        ${r.contact ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;">Contact: ${r.contact}</div>` : ''}
      `;
      listEl.appendChild(div);
    });
  } catch(e){
    listEl.innerHTML = '<div class="empty">Could not load feedback.</div>';
    console.error(e);
  }
}
</script>

<!-- Firebase sync — connects this dashboard to the Chowtime HRIS database -->
<div id="fb-status-badge" style="position:fixed;top:8px;right:8px;z-index:999;font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(0,0,0,.4);color:#fff;">Connecting…</div>
<script type="module">
import { initializeApp, getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const HARDCODED_FB_CFG = {
  apiKey:      'AIzaSyB8PlWl-qfmAn2GDdrJ1Y5pZQs4RAjhTo4',
  projectId:   'chowtime-hris',
  databaseURL: 'https://chowtime-hris-default-rtdb.asia-southeast1.firebasedatabase.app',
  appId:       '1:443134962503:web:7959dc5a6c9cbc967d7a62',
};

function setBadge(ok){
  const b = document.getElementById('fb-status-badge');
  if (!b) return;
  b.textContent = ok ? '☁️ Connected' : '📴 Offline';
  b.style.background = ok ? 'rgba(45,125,58,.75)' : 'rgba(192,57,43,.75)';
}

let app;
try { app = initializeApp(HARDCODED_FB_CFG); }
catch(e) { app = getApp(); }
const db = getDatabase(app);

function nodeFor(key){ return key.startsWith('feedback_') ? 'feedback' : 'audits'; }

window.storage = {
  async set(key, value, shared){
    const data = typeof value === 'string' ? JSON.parse(value) : value;
    await set(ref(db, nodeFor(key) + '/' + key), data);
    return { key, value, shared };
  },
  async get(key, shared){
    const snap = await get(ref(db, nodeFor(key) + '/' + key));
    if (!snap.exists()) return null;
    return { key, value: JSON.stringify(snap.val()), shared };
  },
  async list(prefix, shared){
    const node = (prefix && prefix.startsWith('feedback')) ? 'feedback' : 'audits';
    const snap = await get(ref(db, node));
    const keys = snap.exists() ? Object.keys(snap.val()) : [];
    return { keys, prefix, shared };
  },
  async delete(key, shared){
    await remove(ref(db, nodeFor(key) + '/' + key));
    return { key, deleted:true, shared };
  }
};

setBadge(true);
</script>

</body>
</html>
